body:
  text: 卷之一神照集敘曰元戎不熟諳山陵川澤疆界險易則寇之巢穴部落出沒遠邇有所未知良醫不精明經絡孔穴陰陽逆順則邪之表裡溪谷原會俞募有所未達而欲戡亂去疾均悖之矣古昔神工洞照五內至今育之惟是考述明堂經穴如下署曰神照集手足三陰三陽流注總論一凡人兩手足各有三陰脈三陽脈以合為十二經也手之三陰從臟走至手手之三陽從手走至頭足之三陽從頭走至足足之三陰從足走入腹絡脈傳注周流不息故經脈者行血氣通陰陽以榮於身者也其始從中焦注手太陰肺陽明大腸陽明注足陽明胃太陰脾太陰注手少陰心太陽小腸太陽注足太陽膀胱少陰腎少陰注手心主包絡少陽三焦少陽注足少陽膽厥陰肝厥陰復還注手太陰肺其氣常以平旦為紀以漏水下百刻晝夜流行與天同度終而復始也十二官相使貴賤心者君主之官也神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳導之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安以此養生則壽歿世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下其宗大危戒之戒之手足六陰經及任脈經穴起止詳後手太陰肺經起於中府穴終於少商穴手少陰心經起於極泉穴終於少衝穴手厥陰心包絡起於天池穴終於中衝穴足太陰脾經起於隱白穴終於大包穴足少陰腎經起於湧泉穴終於俞府穴足厥陰肝經起於大敦穴終於期門穴任脈起於會陰穴終於承漿穴手足六陽經及督脈經穴起止詳後手陽明大腸經起於商陽穴終於迎香穴手太陽小腸經起於少澤穴終於聽宮穴手少陽三焦經起於關衝穴終於絲竹空穴足太陽膀胱經起於睛明穴終於至陰穴兌穴足陽明胃經起於頭維經於歷兌穴足少陽膽經起於瞳子髎穴終於竅陰穴督脈起於長強穴終於齦交穴正人明堂經穴總圖二伏人明堂經穴總圖三靈樞骨度四法以人長七尺五寸為則頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸發所復者顱至項長尺二寸發以下至頤長一尺結喉以下至缺盆中長四寸缺盆以下至𩩲骬長九寸𩩲骬即鳩尾𩩲骬以下至天樞長八寸天樞以下至橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以至下廉長三寸半內輔下廉至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺四寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項發以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上七節每節長一寸四分分之一中七節每節長一寸六分分之一下七節每節長一寸二分之六以上為眾人骨度取穴者准而分之則無差矣明堂取穴法五頭面腹背手足橫用橫尺寸直用直尺寸橫法不可以准直直不可以准橫前髮際至後髮際均作一尺二寸其髮際不明者取眉中心後至大椎共折作一尺八寸頭部橫寸以眼內眥角至外眥角為一寸神庭至曲差曲差至本神本神至頭維各一寸五分自神庭至頭維共四寸半背部自大椎至尾骶共二十一椎上中下長短不同詳在前骨度中夾脊第二行相去四寸取之針經相去三寸夾脊第三行相去七寸取之針經相去六寸腹部膺部用乳間橫折作八寸為則其直者自天突至膻中折作六寸八分下行一寸六分為中庭上取岐骨下至臍心共折作九寸取之臍中至橫骨共折作五寸手足部並依骨度均折取之或以中指第二節內度兩橫紋為一寸諸穴有眉發筋骨約紋陷下肉際者即取之不必度也明堂取穴終正人臟腑圖六伏人臟腑圖七手太陰肺經圖穴八手太陰肺經靈樞經曰肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺入肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也肺重三斤三兩六葉兩耳凡八葉主藏魄手太陰肺經所發十一穴左右共二十二穴中府二穴一名膺中俞在雲門下一寸夾任脈華蓋穴兩旁各六寸居乳上三肋間動脈應手肺之募也足陽明手太陰之會針經刺入三分留五呼灸五壯竇氏刺入一分沿皮向外一寸半灸二七壯雲門二穴在巨骨下二骨間夾任脈璇璣穴兩旁各六寸動脈應手舉臂取之針經刺入七分留五呼灸五壯竇氏刺入一分沿皮向外一寸半禁灸針經云刺太深令人逆息是所當慎天府二穴在腋下三寸臂臑內廉動脈應手又法以手伸直用鼻尖點到處是穴又法垂手與乳相平是穴針經刺入四分留三呼禁不可灸灸之氣逆俠白二穴在天府下去肘五寸動脈中手太陰之別針經刺入四分留三呼灸五壯尺澤二穴水也在肘內橫紋筋骨罅中動脈應手手太陰之所入也為合針經刺入三分留三呼灸五壯孔最二穴在腕上七寸手太陰之郄針經刺入三分留三呼灸五壯列缺二穴手太陰之絡別走陽明者去腕一寸五分用手交叉食指點到處是穴當筋骨罅中針經刺入三分留三呼灸五壯竇氏刺入一分沿皮向前一寸半透太淵穴灸二七壯列缺為八法之一以其合任脈行肺系而會陰蹻也經渠二穴金也在寸口陷中手太陰之所行也為經針經刺入三分留三呼禁不可灸灸之傷人神明太淵二穴避唐祖諱一名太泉土也在掌後寸口頭陷中是為脈會手太陰之所注也為俞針經刺入二分留二呼灸三壯魚際二穴火也在手大指本節後內側散脈中為手三陰諸絡之會手太陰之所溜也為滎針經刺入二分留三呼灸三壯少商二穴木也在手大指內側端去爪甲如韭葉手太陰脈之所出也為井針經刺入一分留一呼灸三壯竇氏刺入一分更沿皮向後三分肺經穴法分寸歌肺手太陰出中府雲門之下一寸許雲門氣戶旁二寸人迎之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘內約紋中孔最腕上七寸取列缺腕上寸有半經渠寸口陷中爾太淵掌後寸口頭魚際大指節後舉少商甲後一韭葉一十一穴斟酌取手陽明大腸經圖穴九手陽明大腸經大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出夾口交人中左之右右之左上夾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也大腸重二斤十二兩長二丈一尺廣四寸徑一寸三分少半當臍右回疊積十六曲盛谷一斗水七升半手陽明大腸經所發二十穴左右共四十穴商陽二穴金也一名絕陽在手大指次指內側端去爪甲如韭葉手陽明脈之所出也為井針經刺入一分留一呼灸三壯竇氏針入一分更沿皮向後三分二間二穴水也一名間谷在手大指次指本節前內側陷中手陽明脈之所溜也為滎針經刺入三分留三呼灸三壯三間二穴木也一名少谷在手大指次指本節後陷中手陽明之所注也為俞針經刺入三分留三呼灸三壯合谷二穴一名虎口在手大指次指岐骨間動脈應手手陽明之所過也為原或云捻拳取之針經刺入三分留六呼灸三壯竇氏刺入五分虛實皆拔之孕娠禁針此穴一云可瀉不可補補即下胎陽谿二穴一名中魁火也在手腕上側橫紋前兩筋間陷中手陽明之所行也為經針經刺入三分留七呼灸七壯偏歷二穴在手腕後三寸手陽明絡別走太陰者針經刺入三分留七呼灸三壯竇氏刺入一分沿皮向前一寸半透列缺穴灸七壯溫溜二穴一名逆注一名池頭手陽明郄在腕後少士五寸大士六寸針經刺入三分灸三壯下廉二穴在輔骨下去上廉穴一寸輔兌肉分外斜縫中針經刺入五分留五呼灸五壯上廉二穴在三里下一寸其分抵三陽會外針經斜入五分灸七壯三里二穴在曲池下二寸按之肉起兌肉之端針經刺入三分灸三壯竇氏針入二寸半或曰此穴為諸絡會不可輕灸曲池二穴土也在肘間輔骨肘骨之中屈手拱胸橫紋尖陷中是穴手陽明之所入也為合針經刺入五分留七呼灸三壯銅人云得氣先瀉後補竇氏刺入二寸半灸二七壯肘髎二穴在曲池穴橫紋尖上向外二寸大骨外廉陷中手拱胸取之針經刺入四分灸三壯竇氏針入一寸半灸二七壯五里二穴在肘上三寸行向里大脈中央是穴針經灸三壯禁刺禁多灸臂臑二穴在肘上七寸臑肉之端舉臂取之手陽明絡手足太陽陽維之會針經刺入五分灸三壯肩髃二穴一名中肩井一名偏肩在肩端兩骨間舉臂有空手陽明蹻脈之會平手取之針經刺入六分留六呼灸三壯一方刺入一寸竇氏針入二寸半灸二七壯巨骨二穴在肩端上行兩叉骨間陷中手陽明陽蹻之會針經刺入一寸五分灸五壯天鼎二穴在缺盆上直扶突當氣舍後一寸五分針經刺入四分灸三壯扶突二穴在人迎後一寸五分當曲頰下一寸針經刺入三分灸三壯禾髎二穴取法鼻孔下三分是人中穴兩旁各開五分即此穴也針經刺入三分迎香二穴一名衝陽在鼻下孔旁五分當約口紋手足陽明之會針經刺入三分留三呼禁灸大腸經穴法分寸歌大腸陽明二十穴食指內側起商陽本節前取二間定本節後取三間強岐骨陷中尋合谷陽谿腕中上側詳腕後三寸走偏歷歷上二寸溫溜當下廉上廉各一寸廉上一寸三里隍屈肘紋尖曲池得肘髎大骨外廉陷五里肘後三寸量臂臑肘後七寸是肩髃肩端兩骨當巨骨肩端叉骨內天鼎缺盆上之藏扶突氣舍後寸半禾髎水溝五分旁迎香禾髎上一寸孔旁五分約紋當足陽明胃經圖穴十足陽明胃經胃足陽明之脈起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出夾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下夾臍入氣街中其支者起胃下口下循腹裡下至氣街中而合以下髀關抵伏兔下膝髕中下循脛外廉下足跗入中指內間其支者下膝三寸而別下入中指外間其支者別跗上入大指間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝髕腫痛循膺乳氣街股伏兔胻外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也胃重二斤十四兩紆曲屈伸長二尺六寸大一尺五寸徑五寸容谷二斗水一斗五升足陽明胃經所發四十五穴左右共九十穴承泣二穴一名鼷穴一名面髎在目下七分直目瞳子陽蹻任脈足陽明之會針經刺入三分不可灸一方用艾如麥大灸二壯不可針四白二穴在目珠下一寸向顴空令病人正視取之針經刺入三分灸七壯近古禁不宜灸巨髎二穴在夾鼻孔旁八分直瞳子蹻脈足陽明之會針經刺入三分得氣即瀉灸七壯地倉二穴一名會維夾口旁四分直縫中如近下是穴有脈微動蹻脈手足陽明之會針經刺入三分竇氏針更沿皮透頰車灸七壯或二七壯銅人云得氣即瀉不宜留針右病治左左病治右大迎二穴一名髓孔在曲頷前一寸三分骨陷者中動脈應手針經刺入三分留七呼灸三壯頰車二穴一名機關一名曲牙在耳垂下三分曲頰端陷中張口取之針經刺入三分灸三壯銅人得氣即瀉不宜留針竇氏針入一分沿皮透地倉穴左病治右右病治左下關二穴在客主人下耳前動脈下空下廉合口有空開口即閉足陽明少陽之會針經刺入三分留七呼灸三壯銅人云得氣即瀉不得久留針耳中有幹不可灸頭維二穴在額角入髮際夾本神一寸半夾神庭四寸五分足少陽陽維之會針經刺入五分禁不可灸竇氏刺入一分沿皮向下一寸半人迎二穴一名天五會在頸大動脈動應手夾結喉兩旁一寸五分以候五臟氣針經禁灸刺入四分禁過深不幸殺人水突二穴一名水門在頸大筋前直人迎下氣舍上夾喉嚨旁一寸五分針經刺入三分灸三壯氣舍二穴在頸直人迎下夾天突陷中一寸五分針經刺入三分灸五壯缺盆二穴一名天蓋在肩上橫骨陷中夾天突兩旁各四寸針經刺入三分留七呼禁不可太深太深則氣泄令人逆息咳喘灸三壯氣戶二穴在巨骨下輸府兩傍各二寸陷者中夾任脈兩旁各四寸仰而取之針經刺入四分灸五壯庫房二穴在氣戶下一寸六分陷者中夾任脈兩旁各四寸仰而取之針經刺入四分灸五壯屋翳二穴在庫房下一寸六分夾任脈兩旁各四寸仰而取之針經刺入四分灸五壯膺窗二穴在屋翳下一寸六分夾任脈兩旁各四寸針經刺入四分灸五壯乳中二穴當乳頭禁不可刺灸刺灸之不幸生蝕瘡瘡中有膿血清汁者可治有息肉若蝕瘡者死乳根二穴在乳下一寸六分陷中夾任脈兩旁各四寸仰而取之針經刺入四分灸五壯竇氏刺入一分沿皮向外一寸半灸二七壯不容二穴在幽門旁各一寸五分夾任脈兩旁各二寸五分直四肋間針經刺入五分灸五壯承滿二穴在不容下一寸夾任脈兩旁各二寸五分針經刺入八分灸五壯梁門二穴在承滿下一寸夾任脈兩旁各二寸五分針經刺入八分灸五壯關門二穴在梁門下太乙上各一寸穴少外沿針經刺入八分灸五壯太乙二穴在關門下一寸夾任脈兩旁各二寸五分針經刺入八分灸五壯滑肉門二穴在太乙下一寸夾任脈兩旁各二寸五分針經刺入八分灸五壯天樞二穴一名長溪一名谷門去肓俞一寸五分夾臍兩旁各二寸大腸募也針經刺入五分留七呼灸五壯竇氏針入二寸半灸五十壯外陵二穴在天樞穴下一寸夾任脈兩旁各二寸針經刺入八分灸五壯竇氏針入二寸半灸二七壯大巨二穴一名腋門在外陵下一寸夾任脈兩旁各二寸針經刺入八分灸五壯水道二穴在大巨下三寸夾任脈兩旁各二寸針經刺入三分半灸五壯一方刺入二寸五分歸來二穴一名溪穴在水道穴下二寸夾任脈兩旁各二寸針經刺入八分灸五壯竇氏針入二寸五分或一寸五分灸二七壯氣衝二穴一名氣街在歸來下鼠鼷上一寸當橫骨兩端夾任脈兩旁各二寸動脈應手針經刺入三分留七呼灸三壯灸之不幸使人不得息明堂云氣至即瀉自氣戶至乳根去中行各四寸自不容至滑肉門去中行各三寸自天樞至氣衝去中行各二寸髀關二穴在膝上伏兔後交分中針經刺入六分灸三壯伏兔二穴在膝上六寸起肉間正跪坐而取之針經刺入五分禁不可灸癰疽死地有九伏兔居一陰市二穴又名陰鼎在膝蓋上三寸垂手中指點到處是穴一方拜而取之針經刺入三分留七呼禁不可灸竇氏針入五分灸五十壯梁丘二穴時名鶴頂穴在膝蓋上兩筋間陷中去膝蓋二寸足陽明郄針經刺入三分灸三壯竇氏針入五分灸二七壯一方云宜三稜針出血犢鼻二穴在膝蓋骨下胻骨上夾解大筋中形如牛鼻故名針經刺入六分灸三壯三里二穴土也在膝下三寸大脛骨外廉兩筋間舉足取之以虎口當膝端中指盡處是穴針經刺入一寸五分留七呼灸三壯上廉二穴一名上巨虛在三里下三寸當舉足取之針經刺入八分灸三壯條口二穴在下廉上一寸舉足取之針入五分針經刺入八分灸三壯下廉二穴一名下巨虛在上廉下三寸針經刺入三分灸三壯豐隆二穴在外踝上八寸下廉胻外廉陷中針經刺入三分灸三壯解谿二穴繫鞋帶處是穴足陽明脈所行為經針經刺入三分留五呼灸三壯陷谷二穴木也在足大指次指外間本節後陷中去內庭穴二寸足陽明脈所注為俞針經刺入五分留十呼灸三壯衝陽二穴一名會原在跗上五寸陷中動脈應手去陷谷三寸足陽明之所過也為原針經刺入五分留七呼灸三壯竇氏針入五分內庭二穴水也在足大指次指外間陷中兩岐骨後三分足陽明脈所溜為滎針經刺入二分留二十呼灸三壯竇氏針入五分灸七壯仲景曰傷寒欲作再經者針足陽明使不傳則愈此穴近之厲兌二穴金也在足大指次指之端外側向中指邊去爪甲如韭葉足陽明脈所出為井針經刺入一分留一呼灸三壯竇氏針入一分更沿皮向後三分陽明經穴法分寸歌四十五穴足陽明頭維本神寸五分下關耳前動脈是頰車耳下八分針承泣目下七分取四白一寸不可深巨髎孔傍八分定地倉夾吻四分迎大迎頷前一寸三人迎結旁各寸半水突在頸大筋前氣舍直下夾天突缺盆橫骨陷中親氣戶俞府旁二寸至乳六寸三四分庫房屋翳膺窗近乳中正在乳中心次有乳根出乳下各一寸六不相侵穴夾幽門二寸五是曰不容依法數其下承滿至梁門關門太乙從頭舉節次續排滑肉門各是一寸為君語天樞夾臍二寸旁外陵樞下一寸當一寸大巨三水道道下二寸歸來將氣衝曲骨旁二寸衝下一寸鼠鼷鄉髀關兔後約紋中伏兔市上三寸強梁丘二寸膝上量陰市膝上三寸許膝眼四穴膝兩旁膝髕胻上尋犢鼻膝下三寸三里場里下三寸名上廉條口上廉下二寸條下一寸下廉當上踝八寸分明詳豐隆下廉外一寸解谿衝陽上寸半衝陽陷上三寸長陷谷內庭後二寸內庭次指外間量厲兌大指次指端去爪如韭胃經藏足太陰脾經圖穴十一足太陰脾經脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈夾咽連舌本散舌下其支者復從胃別上膈注心中是動病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛便溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎足太陰脾經所發二十一穴左右共四十二穴隱白二穴木也在足大指端內側去爪甲如韭葉足太陰脈所出為井針經刺入一分留三呼灸三壯竇氏針入一分更沿皮向後三分灸七壯大都二穴火也在足大指本節後內側陷中赤白肉際足太陰脈所溜為滎針經刺入三分留七呼灸一壯若本節痛腫者三稜針出血脾重二斤三兩扁廣三寸長五寸有散膏半斤主裹血溫五臟主藏榮太白二穴土也在足大指內側核骨下陷者中足太陰脈所注為俞針經刺入三分留七呼灸三壯竇氏刺入五分灸二七壯公孫二穴在足大指本節後內側一寸足太陰絡別走陽明者舉足取之針經刺入四分留二十呼灸三壯竇氏針入一寸灸五壯如本節紅腫者宜出血諸病宜下不下者取此穴公孫為八法之一以其合衝脈會陰維於心胸也商丘二穴金也在足內踝下微前陷中足太陰脈所行為經針經刺入三分留七呼灸三壯竇氏針入五分灸七壯三陰交二穴在足內踝上三寸骨下陷中足太陰少陰厥陰三脈之會針經刺入三分留七呼灸三壯竇氏刺入一寸半直透絕骨穴灸二七壯傳曰宋太子出苑逢妊婦診曰女徐文伯曰一男一女太子性急欲視文伯瀉三陰交補合谷胎應針而下果如文伯之診後世遂以二穴為妊婦禁一方云補三陰交瀉合谷則胎反安漏谷二穴在內踝上六寸骨下陷中足太陰絡針經刺入三分留七呼灸三壯地機二穴一名脾舍在膝內側輔骨下陷中足太陰郄別走上一寸空在膝下五寸伸足取之針經刺入三分灸三壯陰陵泉二穴水也在膝下內側輔骨下一指陷中屈足取之足太陰脈所入為合針經刺入五分留七呼灸三壯竇氏刺入二寸半直透陽陵泉穴灸二七壯血海二穴一名血郄一名百蟲窠在膝上內廉輔骨上二寸半赤白肉際宛宛中一方以患人手按膝蓋骨上大指向內餘四指向外大指盡處是穴針經刺入五分灸五壯竇氏刺入二寸半灸三七壯箕門二穴在魚腹上越兩筋間動脈應手上血海六寸下氣衝五寸足太陰內市針經刺入三分留六呼灸三壯一方禁刺衝門二穴一名慈宮上直兩乳去大橫五寸在府舍下橫骨兩端約紋中動脈應手夾任脈兩旁各四寸足太陰厥陰之會針經刺入七分灸五壯府舍二穴在腹結下三寸上直兩乳夾任脈兩旁各四寸足太陰陰維厥陰之會此脈上下入腹絡胸結心肺從脅至肩此太陰郄三陰陽明支別針經刺入七分灸五壯腹結二穴一名腹屈在大橫下一寸三分上直兩乳夾任脈兩旁各四寸針經刺入七分灸五壯大橫二穴在腹哀下三寸橫直臍旁大橫紋中上直兩乳夾任脈兩旁各四寸足太陰陰維之會針經刺入七分灸五壯腹哀二穴在日月下一寸五分上直兩乳俠任脈兩傍各四寸足太陰陰維之會針經刺入七分灸五壯食竇二穴在天溪下一寸六分陷者中夾任脈兩旁各六寸仰而取之一云直兩乳外旁開一寸半舉臂取之針經刺入四分灸五壯天溪二穴在胸鄉下一寸六分陷者中夾任脈兩旁各六寸仰而取之針經刺入四分灸五壯胸鄉二穴在周榮下一寸六分陷中夾任脈兩旁各六寸仰而取之針經刺入四分灸五壯周榮二穴在中府下一寸六分陷中夾任脈兩旁各六寸仰而取之針經刺入四分灸五壯大包二穴在淵液下三寸直脅下六寸為脾大絡布胸脅中出九肋間及季脅端別絡諸陰總統陰陽由脾灌溉五臟針經刺入三分灸三壯脾經穴法分寸歌二十一穴足太陰大拇內側隱白侵大都節後陷中取太白核骨後陷尋公孫節後一寸取商丘踝下微前真踝上三寸三陰交漏谷踝上六寸親膝下五寸名地機陰陵內側膝輔際血海分明膝髕上內廉肉際二寸半箕門血海上六寸筋間動脈須詳諦衝門五寸大橫下三寸三分尋府舍腹結橫下寸三分大橫夾臍非所詐腹哀寸半日月旁直與食竇相連亞食竇天溪又胸鄉周榮各一寸六定淵液三寸下大包九肋之間當熟諳手少陰心經圖穴十二手少陰心經心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上夾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內廉抵掌後兌骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之不盛不虛以經取之盛者寸口大二倍於人迎虛者寸口反小於人迎也手少陰心經所發九穴左右共一十八穴極泉二穴在腋下筋間聚毛中動脈入胸針經刺入三分灸五壯心重十二兩中有七孔三毛盛精汁三合主藏神青靈二穴在肘上三寸伸肘舉臂取之灸七壯不宜用針少海二穴一名曲節水也在肘內廉節後去肘內大骨端五分陷中動脈應手屈肘向頭取之在肘骨大筋內手少陰脈所入為合針經刺入五分灸三壯靈道二穴金也去腕骨後一寸五分手少陰脈所行為經針經刺入三分灸三壯竇氏刺入二分沿皮向後一寸半灸七壯通里二穴在手內側腕骨後一寸手少陰絡別走太陽者針經刺入三分灸三壯陰郄二穴手少陰郄也在手掌後前直小指去腕五分動脈中針經刺入三分灸三壯竇氏針入五分灸五壯神門二穴土也一名兌沖一名中都在小指掌後兌骨端陷者中手少陰脈所注為俞針經刺入三分灸三壯竇氏針入二分沿皮向後一寸少府二穴火也在手小指本節後兩指中間陷中直勞宮手少陰脈之所溜也為滎針經刺入三分灸三壯少衝二穴一名經始木也在手小指內側去爪甲如韭葉手少陰脈所出為井針經刺入一分灸一壯竇氏針入一分更沿皮向後三分心經穴法分寸歌少陰九穴始極泉臂內腋下兩筋間青靈肘節上三寸少海肘後五分端靈道腕後一寸半通里腕後一寸占陰郄腕後五分是神門掌後兌骨端少府衝下勞宮對少衝小指內肚靈手太陽小腸經圖穴十三手太陽小腸經小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大二倍於寸口虛者人迎反小於寸口也手太陽小腸經所發一十九穴左右共三十八穴少澤二穴一名小吉金也在手小指外側端去爪甲如韭葉手太陽脈所出為井針經刺入一分留三呼灸一壯竇氏針入一分更沿皮向後三分前谷二穴水也在手小指外側本節前次節後橫紋陷中握手取之手太陽脈所溜為滎針經刺入一分留三呼灸三壯竇氏針入二分小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲容谷二斗四升水六升三合合之大半後谿二穴木也在手小指外側本節後一寸大橫紋尖上陷中捏拳取之手太陽脈所注為俞針經刺入二分留二呼灸一壯竇氏針入五分灸二七壯後谿為八法之一以其合督脈而會陽蹻於內眥與頸也腕骨二穴在手外側腕前起骨縫中必轉手向內腕骨中分為毒乃下針手太陽脈所過為原虛實皆拔之針經刺入二分留三呼灸三壯竇氏針入三分或透神門穴灸二七壯陽谷二穴火也在手外側宛中兌骨下二分陷者中手太陽脈所行為經針經刺入二分留二呼灸三壯竇氏針入三分灸七壯養老二穴手太陽郄在手踝上一空腕後一寸陷中針經刺入三分支正二穴在手腕後五寸手太陽絡別走少陰者針經刺入三分留七呼灸三壯竇氏針入一分沿皮向前一寸半一方以腕骨肘節為兩端居中是穴當臂之中故曰支正小海二穴土也在肘內大骨外大筋內去肘端五分陷中屈手入腰取之手太陽脈所入為合針經刺入二分留七呼灸七壯竇氏針入五分灸二七壯肩貞二穴在肩曲胛下兩骨解間肩髃後陷中針經刺入八分灸三壯竇氏針入一寸半灸二七壯臑俞二穴在肩髎後大骨下胛上廉陷者中手太陽陽維蹻脈之會舉臂取之針經刺入八分灸三壯天宗二穴在秉風后大骨下陷者中針經刺入五分留六呼灸三壯秉風二穴夾天髎在外肩上小髃骨後舉臂有空手陽明太陽手足少陽之會舉臂取之針經刺入五分灸五壯曲垣二穴在肩中央曲胛陷者中按之動脈應手針經刺入八分或九分灸十壯肩外俞二穴在肩胛上廉去脊三寸陷者中針經刺入六分灸三壯肩中俞二穴在肩胛內廉去脊二寸陷者中針經刺入三分留七呼灸三壯天窗二穴一名窗籠在頸大筋前曲頰下扶突穴後動脈應手陷中針經刺入六分灸三壯竇氏針入三分灸七壯天容二穴在耳下曲頰後針經刺入三分灸三壯顴髎二穴一名兌骨在面頄骨下廉陷者中手少陽太陽之會針經刺入三分禁不宜灸聽宮二穴在耳中珠子大如赤小豆是穴手足少陽手太陽之會謂之聽宮者宮閫之名言在內也居耳輪之內故名宮針經刺入三分灸三壯竇氏針入一分輕彈出血禁灸小腸經穴法分寸歌小腸少澤小指端前谷外側節前論節後陷中後谿是掌盡外側腕骨存腕中骨下陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞在肩曲胛下臑俞胛上夾肩杳天宗大骨下陷中秉風髎後舉有空曲垣肩中曲胛陷肩外去脊三寸中肩中二寸大椎旁天窗頰下動脈詳天容耳下曲頰後顴髎面頰兌端量聽宮耳前如赤豆一十九穴手太陽足太陽膀胱經圖穴十四足太陽膀胱經膀胱足太陽之脈起於目內眥上額交巔上其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內夾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下夾脊貫臀入膕中其支者從膊內左右別下貫胛夾脊內過髀樞循髀外後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側端是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結腨如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭頸項痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大二倍於寸口虛者人迎反小於寸口也膀胱重九兩二銖縱廣九寸盛溺九升合足太陽膀胱經所發六十三穴左右共一百二十六穴睛明二穴一名淚孔在目內眥手足太陽足陽明之會針經刺入六分留六呼灸三壯一方刺入一分半竇氏針入一寸禁灸東垣曰刺太陽睛明出血則目愈明蓋此經多血少氣故目翳赤痛從內眥起者刺之以宣瀉太陽之熱攢竹二穴一名光明一名始光一名員柱一名夜光在兩眉尖陷中針經刺入三分留六呼灸三壯竇氏針入一分沿皮透魚腰穴曲差二穴一名鼻沖夾神庭兩旁各開一寸五分在髮際正頭取之針經刺入三分灸三壯竇氏針入一分沿皮向外透臨泣穴灸七壯五處二穴在上星穴兩旁各開一寸五分上曲差一寸針經刺入三分禁不可灸銅人灸三壯明堂灸五壯竇氏針入一分沿皮向外透目窗穴灸七壯又宜三稜針出血承光二穴在五處後一寸五分夾督脈兩旁亦各一寸五分針經刺入三分禁不可灸通天二穴一名天臼在承光後一寸五分夾督脈兩旁亦各一寸五分針經刺入三分留七呼灸三壯絡卻二穴一名強陽一名腦蓋在通天後一寸五分夾督脈兩旁亦一寸五分針經刺入三分留五呼灸三壯玉枕二穴在絡卻後一寸五分夾腦戶旁各一寸三分起肉枕骨上入髮際三寸針經刺入三分留三呼灸三壯天柱二穴在夾項後髮際大筋外廉陷者中甲乙刺入三分留六呼灸三壯銅人云得氣即瀉竇氏針入二寸半左右相透灸二七壯大杼二穴在項後第一椎下兩旁各開一寸五分陷者中正坐取之督脈別絡手足太陽之會針經刺入五分留七呼灸七壯竇氏針入一分沿皮向外一寸半灸七壯風門二穴一名熱府在背部第二椎下兩旁各開一寸五分陷者中正坐取之督脈足太陽之會針經刺入五分留五呼灸三壯竇氏針入一分沿皮向外一寸半灸五十壯肺俞二穴在第三椎下兩旁各開一寸五分陷中針經刺入三分留七呼灸三壯竇氏針入一分沿皮向外一寸半灸五十壯心包俞二穴在第四椎下兩旁各開一寸五分陷中正坐取之針經刺灸缺銅人針三分灸七壯竇氏針入一分沿皮向外一寸半灸七壯心俞二穴在第五椎下兩旁各開一寸五分針經刺入三分留七呼得氣即瀉禁不可灸竇氏針入一分沿皮向外一寸半灸七壯膈俞二穴即崔知悌患門穴在第七椎下兩旁各開一寸五分血之所會針經刺入三分留七呼灸三壯竇氏針入一分沿皮向外一寸半灸七壯肝俞二穴在第九椎下兩旁各開一寸五分針經刺入三分留七呼灸三壯竇氏針入一分沿皮向外一寸半灸二七壯膽俞二穴在第十椎下兩旁各開一寸五分更廣五分即崔知悌四花旁二穴也針經刺入五分灸三壯竇氏針入一分沿皮向外一寸半脾俞二穴在第一十椎下兩旁各開一寸五分針經刺入三分留七呼灸三壯竇氏針入一分沿皮向外一寸半灸五十壯胃俞二穴在第十二椎下兩旁各開一寸五分針經刺入三分留七呼灸三壯竇氏針入一分沿皮向外入寸半灸二七壯一方隨年為壯三焦俞二穴在十三椎下兩旁各開一寸五分針經刺入五分灸三壯竇氏針入一分沿皮向外一寸半禁灸腎俞二穴在第十四椎下兩旁各開一寸五分針經刺入三分留七呼灸三壯竇氏針入一分沿皮向外一寸半灸五十壯至百壯一方云植杖度之與臍平是穴大腸俞二穴在第十六椎下兩旁各開一寸五分伏而取之針經刺入三分留六呼灸三壯竇氏針入一分沿皮向外一寸半灸三七壯小腸俞二穴在第十八椎下兩旁各開一寸五分伏而取之齋經刺入三分留六呼灸三壯竇氏針入一分沿皮向外一寸半灸三七壯膀胱俞二穴在第十九椎下兩旁各開一寸五分伏而取之針經刺入三分留六呼灸三壯竇氏針入一分沿皮向外一寸半灸三七壯中膂俞二穴在第二十椎下兩旁各開一寸五分夾脊胂而起伏而取之針經刺入三分留六呼灸三壯白環俞二穴在第二十一椎下兩旁各開一寸五分取法挺身伏地以兩手支額縱息令皮膚俱緩乃取其穴針經刺入八分得氣即瀉瀉訖多補之禁不宜灸竇氏針入一寸半灸三七壯上髎二穴在腰髁骨下一寸第一空夾脊陷中足太陽少陽之絡針經刺入三分留七呼灸三壯次髎二穴在腰髁骨第二空夾脊陷中針經刺入三分留七呼灸三壯中髎二穴在腰髁骨第三空夾脊陷中針經刺入三分留十呼灸三壯下髎二穴在腰髁骨第四空夾脊陷中足太陽少陽厥陰所結針經刺入三分留十呼灸三壯會陽二穴一名利機在陰尻骨兩旁去長強一分針經刺入八分灸五壯附分二穴在第二椎下附項內廉去脊兩旁各開三寸手足太陽之會正坐取之針經刺入八分灸五壯魄戶二穴在第三椎下兩旁各開三寸上直附分正坐取之針經刺入三分灸三壯竇氏針入一分沿皮向外一寸半灸三七壯一方云得氣即瀉又宜久留針膏肓二穴在四椎下微帶五椎骨上兩旁各開三寸正坐開肩取之禁不宜針灸三七壯至百壯針經未有此穴唐真人孫思邈始指而論之無所不療一切痰飲虛損勞瘵傳屍骨蒸癰疽發背並治之竇文貞云若針此穴泄人五臟真氣是在所忌昔秦和緩不救晉候之疾以其病在膏之下肓之上針砭湯液皆所不及即此穴也一方云灸膏肓二穴宜取臍下氣海丹田關元中極四穴中灸一穴以應之又灸足三里引火氣下行方為盡善又曰人言二十以上不宜灸膏肓恐致虛火上炎又多不針瀉三里是不經師授而妄作也神堂二穴在第五椎下兩旁各開三寸陷者中針經刺入三分灸五壯譩譆二穴在肩膊內廉第六椎下兩旁各三寸正坐取之令病人呼噫嘻其動應手針經刺入六分留七呼灸五壯一方云多灸益善膈關二穴在第七椎下兩旁各三寸陷中正坐開肩取之針經刺入五分灸三壯魂門二穴在第九椎下兩旁各開三寸正坐取之針經刺入五分灸五壯竇氏針入一分沿皮向外一寸半灸二七壯陽綱二穴在第十椎下兩旁各三寸陷中正坐開肩取之針經刺入五分灸三壯意舍二穴在第十一椎下兩旁各三寸陷中針經刺入五分灸三壯銅人灸五十壯至百壯胃倉二穴在第十二椎下兩旁各三寸陷中針經刺入五分灸三壯一方灸五十壯肓門二穴在第十三椎下兩旁各三寸平巨闕針經刺入五分灸三壯志室二穴在第十四椎下兩旁各三寸陷者中正坐取之針經刺入五分灸三壯胞肓二穴在第十九椎下兩旁各三寸陷中伏而取之針經刺入五分灸三壯秩邊二穴在第二十椎下兩旁各三寸陷者中伏而取之針經刺入五分灸三壯承扶二穴一名肉郄一名陰闕一名皮部在尻臀下股陰上約紋中針經刺入二寸留七呼灸三壯殷門二穴在肉郄下六寸針經刺入五分留七呼灸七壯浮郄二穴在委陽上一寸屈膝而展得之針經刺入五分灸三壯委陽二穴在承扶下六寸與殷門並屈伸取之出於膕中外廉兩筋間太陽之前少陽之後足太陽之別絡也為三焦下輔俞針經刺入七分留五呼灸三壯委中二穴一名血郄土也在膝後約紋中央兩筋之間動脈是穴伏臥取之足太陽脈所入為合針經刺入五分留七呼灸三壯竇氏針入二寸五分禁灸四畔紫脈上宜鋒針出血大經不宜出血合陽二穴在膝後約紋中央下二寸是穴針經刺入六分灸五壯竇氏針入二寸半灸二七壯承筋二穴一名腨腸在腨中央陷中針經禁不可刺灸三壯承山二穴一名肉柱一名魚腰在足兌腨腸下分肉間陷中伏臥用兩足大指堅挺乃取之針經刺入七分灸三壯明堂云得氣即瀉速出針灸不及針竇氏針入二寸半灸三七壯飛揚二穴一名厥陽在足外踝上七寸足太陽絡別走少陰者針經刺入三分灸三壯附陽二穴陽蹻之郄在啼外踝上三寸太陽前少陽後筋骨間針經刺入六分留七呼灸三壯崑崙二穴火也在足外踝骨後下五分足跟骨上陷中動脈應手足太陽脈所行為經針經刺入五分留十呼灸三壯竇氏橫透呂細穴灸三七壯或五十壯僕參二穴一名安邪陽蹻之本在足後跟骨下陷中拱足取之針經刺入五分留十呼灸七壯申脈二穴陽蹻所生也在足外踝下五分陷中容爪甲許一方云取外踝尖下二寸赤白肉際針經刺入三分留六呼灸三壯竇氏針入一寸灸二七壯申脈為八法之一以其合陽蹻會督脈於內眥也金門二穴一名關梁在足外踝下陷中足太陽郄陽維別屬也針經刺入五分灸三壯京骨二穴在足外側大骨下赤白肉際陷中按而得之足太陽脈所過為原針經刺入三分留七呼灸三壯竇氏針入五分灸七壯一方虛實皆拔之束骨二穴木也在足小指外側本節後赤白肉際陷中足太陽脈所注為俞針經刺入三分留七呼灸三壯通谷二穴水也在足小指外側本節前陷中足太陽脈所溜為滎針經刺入三分留五呼灸五壯本節紅腫彈針出血腳背紅腫鋒針出血一方云五臟氣亂於頭宜深取通谷束骨此知根結者也至陰二穴金也在足小指外側去爪甲如韭葉足太陽脈所出為井針經刺入一分留五呼灸五壯竇氏針入一分沿皮向後三分膀胱經穴法分寸歌六十三穴膀胱經目眥內角始睛明攢竹眉端陷中是曲差寸五伴神庭五處挨排夾上星承光五處後寸半通天絡卻一停勻玉枕橫夾於腦戶一寸三分相旁助天柱髮際大筋外大杼在項一椎下夾脊相去寸五分第一大杼二風門肺俞三椎心包四心俞五椎之下淪督俞膈俞相梯級第六第七次第立第八椎下穴無有肝俞相椎當第九十椎膽俞脾十一十二椎下胃俞取三焦腎俞氣海俞十三十四十五主大腸關元俞要量十六十七椎兩旁十八椎下小腸俞十九椎下尋膀胱中膂內俞椎二十白環二十一椎當上髎次髎中與下一空二空夾腰胯並同夾脊四個髎載在針經人勿訝會陽在尾髎骨旁相看督脈一分詳第二椎下外附分夾脊相去古法云先除脊後量三寸不爾灸之能傷筋魄戶三椎膏肓四四椎微多五椎上虛損灸之精神旺第五椎下索神堂第六譩譆穴最強膈關第七魂門九陽綱意舍依次數胃倉肓門屈指彈椎看十二與十三志室次之胞十九秩邊二十椎下詳承扶臀下紋中央殷門承扶下六寸浮郄一寸上委陽委陽卻與殷門並膕中外廉兩筋鄉委中膝膕約紋里此下三寸尋合陽承筋腨腸中央是承山腨下分肉陷飛揚外踝上七寸附陽踝上三寸量金門正在外踝下崑崙踝後跟骨上僕參跟骨後陷是申脈分明踝下容京骨外側大骨下束骨本節後陷中通谷本節前陷索至陰小指外側當足少陰腎經圖穴十五足少陰腎經腎足少陰之脈起於小指之下斜走足心出然谷之下循內踝之後別入跟中以上貫腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨夾舌本其支者從肺出絡心注胸中是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸癖脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶被髮拽杖重履而步盛者寸口大二倍於人迎虛者寸口反小於人迎也足少陰腎經所發二十七穴左右共五十四穴湧泉二穴木也一名地衝在足心陷中屈足蜷指宛宛內跪取之一方云蜷足第三縫中與大指本節平等一方用線於中指量至後跟盡處折中是穴足少陰脈所出為井針經刺入三分留三呼灸三壯銅人云無令出血明堂云灸不及針此各有見竇氏針入一分沿皮向後三分然谷二穴火也一名龍淵在足內踝前起大骨下陷中足少陰脈所溜為滎太陰蹻脈之郄針經刺入三分留三呼灸三壯竇氏針入五分灸二七壯甲乙云刺之多見血使人立飢欲食太谿二穴土也一名呂細在足內踝後跟骨上動脈陷中足少陰脈所注為俞針經刺入三分留七呼灸三壯竇氏針透崑崙穴灸五十壯東垣曰治痿宜導濕熱不令濕土克堅腎水其穴在太谿照海二穴陰蹻脈所生在足內踝骨下一寸赤白肉際針經刺入四分留六呼灸三壯竇氏針入五分灸二七壯照海為八法之一以其合陰蹻任脈於喉嚨也太鍾二穴在足後跟沖中足少陰絡別走太陽者針經刺入二分留七呼灸三壯竇氏針入三分灸七壯水泉二穴足少陰郄去太谿穴一寸在足內踝下針經刺入四分灸三壯腎有二枚重一斤二兩主藏志復溜二穴一名昌陽一名伏白金也在足內踝上二寸筋骨陷中足少陰脈所行為經針經刺入三分留三呼灸五壯交信二穴在足內踝上二寸少陰前太陰後筋骨間居復溜之後二穴相平前旁骨是復溜後旁筋是交信二穴只隔一筋為陰蹻之郄針經刺入四分灸三壯築賓二穴陰維之郄在足內踝上六寸腨分中針經刺入三分灸五壯陰谷二穴水也在膝內輔骨後大筋下小筋上按之動脈應手屈膝取之縫尖是穴足少陰脈所入為合針經刺入四分灸三壯竇氏針入五分灸二七壯橫骨二穴一名下極在腹部大赫下一寸肓俞下五寸針經云夾任脈兩旁各五分衝脈足少陰之會針經刺入一寸灸五壯大赫二穴一名陰維一名陰關在氣穴下一寸夾任脈兩旁各五分衝脈足少陰之會針經刺入一寸灸五壯氣穴二穴一名胞門一名子戶在四滿下一寸夾任脈各五分衝脈足少陰之會針經刺入一寸灸五壯四滿二穴一名髓府在中注下一寸夾任脈各五分衝脈足少陰之會針經刺入一寸灸五壯中注二穴在肓俞下一寸夾任脈各五分衝脈足少陰之會針經刺入一寸灸五壯肓俞二穴在商曲下一寸直臍中兩旁各五分衝脈足少陰之會針經刺入一寸灸五壯商曲二穴在石關下一寸夾任脈各五分衝脈足少陰之會針經刺入一寸灸五壯食關二穴在陰都下一寸夾任脈各五分衝脈足少陰之會針經刺入一寸灸五壯陰都二穴一名食宮在通谷下一寸夾任脈各五分衝脈足少陰之會針經刺入一寸灸五壯通谷二穴在幽門下一寸夾任脈各五分衝脈足少陰之會針經刺入五分灸五壯幽門二穴一名上門在巨闕兩旁各五分陷中衝脈足少陰之會針經刺入五分灸五壯自橫骨至幽門十一穴針經云夾任脈兩旁各半寸千金方云幽門在巨闕旁半寸肓俞直臍旁各五分與針經符合明堂穴法王冰素問注去中行一寸資生經作夾任脈兩旁一寸五分諸家不同如此今從上古針經以五分為訓步廊二穴在神封下一寸六分陷者中夾任脈兩旁各二寸仰而取之針經刺入四分灸五壯神封二穴在靈墟下一寸六分陷中夾任脈兩旁各二寸仰而取之針經刺入四分灸五壯靈墟二穴在神藏下一寸六分陷中夾任脈各二寸仰而取之針經入四分灸五壯神藏二穴在彧中下一寸六分陷中夾任任脈各二寸仰而取之針經刺入四分灸五壯彧中二穴在俞府下一寸六分陷中夾任脈各二寸仰而取之針經刺入四分灸五壯竇氏針入一分沿皮向外一寸半灸二七壯俞府二穴在巨骨下去璇璣穴兩旁各開二寸仰而取之針經刺入四分灸五壯竇氏針入一分沒皮向外一寸半灸二七壯腎經穴法分寸歌湧泉屈足蜷指取腎經起處須記此然谷踝前大骨下踝後跟上太谿主後跟沖中尋大鐘水泉溪下一寸許照海踝下陰蹻生踝上二寸復溜與溜旁筋骨取交信築賓六寸之端取陰谷膝內輔骨後橫骨有陷如仰月大赫氣穴四滿處中注肓俞正夾臍每穴一寸逐一數商曲食關上陰都通谷幽門一寸居幽門寸半夾巨闕此去中行各五分步廊神封過靈墟神藏彧中入俞府各一寸六不差殊欲知俞府君當問璇璣之旁各二寸心主手厥陰心包絡經圖穴十六手厥陰心包經手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也心包絡又名心主心主乃無形之臟故不及圖手厥陰心包絡脈所發九穴左右共一十八穴一名手心主脈天池二穴一名天會在乳後一寸腋下三寸著脅直掖撅肋間手厥陰足少陽之會針經刺入七分灸三壯天泉二穴一名天溫在曲腋下去腋居臑間二寸舉臂取之針經刺入六分灸三壯曲澤二穴水也在手肘內廉下陷中屈肘得之橫紋兩筋中間用手拄腰便於下針手厥陰脈所入為合針經刺入五分留七呼灸二七壯郄門二穴手心主郄在掌後去腕五寸針經刺入三分灸三壯間使二穴金也在手掌後橫紋上三寸兩筋間陷中手厥陰心主脈所行為經針經刺入六分留七呼灸三壯竇氏針透支溝穴內關二穴在掌後橫紋上二寸兩筋間陷中手心主絡別走少陽者握拳取之針經刺入二分灸五壯竇氏針透外關穴諸病宜吐不得吐者取此內關為八法之一以其合陰維而會衝脈於心胸也大陵二穴土也在手掌後橫紋兩筋間陷中手厥陰脈所注為俞針經刺入二分留七呼灸三壯勞宮二穴火也一名五里在掌中央動脈中屈無名指點到處是穴手厥陰脈所溜為滎針經刺入三分留六呼灸三壯明堂云得氣即瀉又云不可多灸令人息肉日加中衝二穴木也在手中指之端去爪甲如韭葉陷者中手厥陰心主脈所出為井針經刺入一分留三呼灸一壯竇氏針入一分更沿皮向後三分灸七壯心包絡經部穴分寸歌包絡穴共一十八乳後一寸天池索天泉腋下二寸求曲澤中紋動脈覺郄門去腕上五寸間使掌後三寸逢內關去腕乃二寸大陵掌後兩筋中勞宮掌內屈指取中指之末是中衝手少陽三焦經圖穴十七手少陽三焦經三焦者喉嚨至膈為上焦膈下至臍為中焦臍下至曲骨為下焦五臟六腑皆三焦所貯盡有形物也前臟腑總圖皆其具耳舊云三焦為無形之腑恐不其然謂之焦者生物納之皆成腐爛故以為名三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下膈歷屬三焦其支者從膻中上出缺盆上頸系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也手少陽三焦經所發二十三穴左右共四十六穴關衝二穴金也在手小指次指端去爪甲角如韭葉手少陽脈所出為井針經刺入一分留三呼灸三壯竇氏針入一分沿皮向後三分液門二穴水也在小指次指間陷者中手少陽脈所溜為滎針經刺入三分灸三壯中渚二穴木也在小指次指本節後五分陷者中手少陽脈所注為俞針經刺入二分留三呼灸三壯竇氏針入一分沿皮向後一寸半陽池二穴一名別陽在手表腕上陷中手少陽脈所過為原針經刺入二分留三呼灸五壯一方透大陵虛實皆拔之腫痛宜彈針出血外關二穴在腕後二寸陷者中正坐覆手取之手少陽絡別走心主者針經刺入三分留七呼灸三壯竇氏針透內關穴外關為八法之一以其合陽維而會帶脈也支溝二穴一名飛虎火也在手腕後三寸兩骨之間陷者中手少陽脈所行為經針經刺入二分留七呼灸三壯竇氏針透間使穴會宗二穴手少陽郄在腕後三寸如外五分針經刺入三分灸三壯三陽絡二穴在臂上大交脈支溝上一寸針經禁刺灸七壯四瀆二穴在肘前五寸外廉陷者中針經刺入六分留七呼灸五壯天井二穴土也在肘尖骨上後一寸兩筋間陷中屈時拱胸取之甄權叉手按膝取之手少陽脈所入為合針經刺入一分留七呼灸三壯竇氏針入五分灸二七壯清冷淵二穴在肘上二寸伸肘舉臂取之針經刺入三分灸三壯消濼二穴在肩下臂外開腋斜肘分下針經刺入六分灸三壯臑會二穴一名臑髎在肩前廉去肩端三寸手陽明之絡一云少陽陽維之會針經刺入五分灸五壯肩髎二穴在肩端臑上斜舉臂取之針經刺入七分灸三壯天髎二穴在肩缺盆中毖骨之間陷者中善針者取缺盆上突起肉上針之若誤針陷處傷人五臟氣令人咳逆喘手少陽陽維之會針經刺入八分灸三壯天牖二穴在頸大筋外缺盆上天容後天柱前完骨下髮際上針經刺入一分灸三壯銅人針一寸留七呼不宜補不宜灸明堂針五分得氣即瀉瀉盡更留三呼瀉三吸不宜補翳風二穴在耳後尖角陷中按之引耳中開口得穴諸方先以銅錢二十文令患人咬之尋取穴手足少陽之會針經刺入四分灸三壯瘛脈二穴一名資脈在耳本後雞足青絡脈針經刺入一分出血如豆許灸三壯顱息二穴在耳後青絡中針經刺入一分出血如豆多則殺人灸三壯角孫二穴在耳上廓外間髮際之下開口有孔手足少陽手陽明之會針經刺入二分灸三壯一云禁針耳門二穴在耳前起肉當耳缺陷中針經刺入三分留三呼灸三壯和髎二穴在耳前銳發下橫脈應手手足少陽手太陽之會針經刺入三分灸三壯絲竹空二穴一名目髎在眉後入髮際陷中針經刺入三分留三呼禁不宜灸灸之不幸令人目小及盲竇氏治偏正頭風沿皮向後一寸五分透率谷穴治眼目赤腫沿皮向前一寸五分透瞳子髎穴宜彈針出血三焦經穴法分寸歌三焦名指外關衝小指次指間液門中渚次指本節後陽池表腕上陷中腕上二寸外關絡支溝腕上三寸約會宗三寸空中求消詳五分毋令錯腕前四寸臂大脈此是三陽絡穴宅四瀆腕前五寸量天井肘上一寸側腕上二寸清冷淵消濼臂外腋肘分臑會肩端去三寸肩髎肩端臑上斜天髎盆上毖骨際天牖旁頸後天容翳風耳後尖角陷瘛脈耳後雞足青顱息耳後青脈內角孫耳角開口空絲竹眉後陷中看和髎耳前兌發橫耳門耳前當耳缺此穴禁灸分明說足少陽膽經圖穴十八足少陽膽經膽在肝之短葉間重三兩三銖盛精汁二合膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆下胸中貫膈絡肝屬膽循脅裡出氣沖繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指間循大指岐骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足反大熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀夾癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前諸節皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也足少陽膽經所發四十四穴左右共八十八穴瞳子髎二穴一名太陽一名前關在目外去眥五分尖盡處是穴手太陽手足少陽之會針經刺入三分灸三壯竇氏針入一分沿皮向上透魚腰穴聽會二穴在耳前陷中上關穴下一寸動脈應手開口得穴針經刺入四分灸三壯銅人得氣即瀉不須補竇氏橫入四分一方口銜尺方可下針此為直入四分設也蓋銜尺有孔便可下針故耳客主人二穴一名上關在耳前上廉起骨端開口有孔乃取之手足少陽陽明之會針經刺入三分留七呼灸三壯刺不宜深太深令人耳無聞明堂針一分留之得氣即瀉頷厭二穴在曲角下顳顬上廉顳顬者腦有空之名手足少陽陽明之會針經刺入七分留七呼灸三壯深刺令人耳聾懸顱二穴在曲角顳顬中手足少陽陽明之會針經刺入三分留七呼灸三壯曲鬢二穴一名曲發在耳上入髮際曲隅陷者中鼓頷有空足太陽少陽之會針經刺入三分灸三壯深刺令人耳無聞懸釐二穴在曲角顳顬下廉手足少陽陽明之會針經刺入三分留七呼灸七壯率谷二穴在耳上入髮際一寸五分足太陽少陽之會嚼而取之針經刺入四分灸三壯竇氏針入一分沿皮向前透絲竹空穴天衝二穴在耳上入髮際二寸如前三分足太陽少陽之會針經刺入三分灸三壯浮白二穴在耳後入髮際一寸足太陽少陽之會針經刺入三分灸三壯竅陰二穴一名枕骨在完骨上枕骨下搖動有空足太陽手足少陽之會針經刺入四分灸五壯難經曰髓會絕骨非懸鐘也當作枕骨乃此穴之謂完骨二穴在耳後入髮際四分足太陽少陽之會針經刺入二分留七呼灸七壯明堂依年為壯本神二穴入髮際四分在曲差旁一寸五分夾神庭兩旁各三寸足少陽陽維之會針經刺入三分灸三壯陽白二穴在眉上一寸直瞳子手足陽明少陽陽維之會針經刺入三分灸三壯臨泣二穴當目上眥直入髮際五分陷中足太陽少陽陽維之會正視取之針經刺入三分留七呼灸五壯目窗二穴一名至榮在臨泣後一寸足少陽陽維之會針經刺入三分灸五壯銅人云三度刺之目大明正營二穴在目窗後一寸足少陽陽維之會針經刺入三分灸五壯承靈二穴在正營後一寸五分足少陽陽維之會針經刺入三分灸五壯腦空二穴一名顳顬在承靈後一寸五分夾玉枕骨下陷者中足少陽陽維之會針經刺入四分灸五壯銅人云得氣即瀉魏武患頭風發即心亂目眩針腦空立愈風池二穴在腦空後大筋上髮際陷中夾風府兩旁各開二寸按之引於耳中足少陽陽維之會陽蹻之所入也針經刺入三分留三呼灸三壯一方累灸百壯明堂云灸不及針竇氏針入七分或橫針三寸半肩井二穴一名膊井取法肩上陷是缺盆其上一寸半是柱骨如取左穴用本人右手小指按於左肩柱骨尖上平排三指取中指下第一節中是穴取左穴亦如是足少陽陽維之會針經刺入五分灸三壯竇氏針入二寸半灸二七壯淵液二穴一名泉液在腋下三寸宛宛中舉臂取之針經刺入三分禁不可灸灸之不幸生腫蝕馬刀內潰者死寒熱馬瘍可治輒筋二穴在腋下三寸復前行一寸著脅陷中針經刺入六分灸三壯日月二穴一名神光膽募也在期門穴下五分夾任脈兩旁各四寸平蔽骨足太陰少陽之會針經刺入七分灸五壯竇氏針入一分沿皮向外一寸半京門二穴一名氣俞一名氣府腎之募也在監骨下腰中脅脊季肋下一寸八分針經刺入三分留七呼灸三壯竇氏針入一分沿皮向外一寸半灸七壯帶脈二穴在季脅下一寸八分足少陽帶脈之會針經刺入六分灸五壯五樞二穴在帶脈下三寸環跳上五寸一曰在水道穴旁一寸五分是夾任脈兩旁三寸五分也足少陽帶脈之會針經刺入一寸灸五壯竇氏針入一寸半灸二七壯維道二穴名外樞在章門下五寸三分足少陽帶脈之會針經刺入八分灸三壯居髎二穴在章門下八寸三分髂骨上陷中居腹部度與環跳穴上一寸相平足少陽陽蹻之會針經刺入八分灸三壯環跳二穴一名髖骨一名分中在髀樞中側臥屈上足伸下足以左手按穴右手搖撼取之穴在陷中足少陽太陽之會針經刺入一寸留二十呼灸五十壯竇氏針入三寸半已刺不可搖恐傷針唐仁壽宮患腳氣偏風甄權奉敕針環跳陽陵泉陽輔巨虛下廉而能起行環跳穴痛者恐生附骨疽風市二穴針經無之千金方有風市取法在膝上七寸股外側兩筋間垂手中指點到處是穴針入五分灸五十壯中瀆二穴在髀骨外膝上五寸分肉間陷中針經刺入五分留七呼灸五壯陽關二穴在陽陵泉上三寸犢鼻外陷者中針經刺入五分禁不可灸陽陵泉二穴土也在膝下一寸胻外廉陷者中是為筋會足少陽脈所入為合針經刺入六分留十呼灸三壯竇氏針入二寸半橫透陰陵泉得氣即瀉宜久留針陽交二穴一名別陽一名足蹻陽維之郄在足外踝上七寸斜屬三陽分肉間針經刺入六分留七呼灸七壯竇氏針入二寸半透中都穴灸二七壯外丘二穴在外踝上七寸與陽交平差後一寸足少陽郄針經刺入三分灸三壯光明二穴在足外踝上五寸陷中足少陽絡別走厥陰者針經刺入六分留七呼灸五壯竇氏針入二寸半透蠡溝穴灸七壯陽輔二穴名分肉火也在足外踝上四寸輔骨前絕骨端如前三分去丘墟七寸足少陽脈所行為經針經刺入五分留七呼灸三壯竇氏針入二寸半懸鐘二穴一名絕骨在足外踝上三寸動脈是穴足三陽絡按之陽明脈絕針經刺入六分留七呼灸五壯竇氏針入二寸半灸三七壯丘墟二穴在足外廉踝下如前三分陷中去臨泣穴三寸足少陽脈所過為原針經刺入五分留七呼灸三壯虛實皆拔之臨泣二穴木也在足小指次指本節外側後筋骨縫陷者中去俠谿穴一寸五分足少陽脈之所注也為俞針經刺入二分留五呼灸三壯竇氏針入五分出血水針隨皮過一寸臨泣為八法之一以其連帶脈行目銳而會陽蹻也地五會二穴在足小指次指本節後陷中去俠谿一寸針經刺入三分禁不可灸灸之令人瘦不出三年死俠谿二穴水也在足小指次指二岐骨間本節前陷中足少陽脈之所溜也為滎針經刺入三分留三呼灸三壯竅陰二穴金也在足小指次指端去爪甲如韭葉足少陽脈之所出也為井針經刺入三分留三呼灸三壯竇氏針入一分沿皮向後三分膽經穴法分寸歌少陽瞳子髎目外耳前陷中尋聽會客主耳前開有空懸顱曲角顳顬中懸釐腦空下廉揣頷厭腦空上廉看曲鬢偃耳正尖上率谷耳發寸半安本神差旁一寸半入髮際中四分是陽白眉上一寸取記真瞳子睛明貫臨泣有穴當兩目直入髮際五分屬目窗正營各一寸承靈營後寸五錄天衝耳上二寸居浮白髮際一分殊完骨耳後際四分竅陰枕下動有空腦空正夾玉枕骨風池腦後髮際陷肩井柱骨旁有空淵液腋下三寸中輒筋淵前平半寸日月期門下五分京門脅脊監骨下帶脈季脅寸八分五樞帶下三寸斷維道章下五寸三居髎章下八寸三環跳髀樞宛宛中兩手著腿風市攻中瀆膝上五寸逢陽關陽陵上三寸陽陵膝側一寸下陽交外踝斜七寸外丘踝上七寸正光明外踝上五寸陽輔踝上又四寸懸鐘三寸動脈中丘墟踝前陷中出臨泣後俠谿寸半丘墟踝前陷中出臨泣後俠谿寸半五會小指次指本俠谿小指岐骨間竅陰小指次指端足厥陰肝經圖穴十九足厥陰肝經肝足厥陰之脈起於大指叢毛之上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中環陰器抵少腹夾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則病腰痛不可以俯仰丈夫㿗疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也足厥陰肝經所發一十三穴左右共二十六穴大敦二穴木也在足大指端直甲後去爪甲如韭葉及三毛中足厥陰脈之所出也為井針經刺入三分留十呼灸三壯竇氏針入一分沿皮向後三分灸三七壯肝重三斤四兩左三葉右四葉凡七葉主藏魄行間二穴火也在足大指岐骨間動脈陷中足厥陰脈之所溜也為滎針經刺入六分留十呼灸三壯膝頭足趺紅腫並宜出血浮腫宜出水太衝二穴土也在足大指本節後內間二寸陷中動脈應手或曰一寸五分陷中足厥陰脈之所注也為俞針經刺入三分留十呼灸三壯竇氏刺入五分中封二穴一名懸泉金也在足內踝前一寸筋里陷中仰足取之足厥陰脈之所行也為經針經刺入四分留七呼灸三壯蠡溝二穴一名交儀足厥陰絡別走少陽者在足內踝上五寸針經刺入三分留三呼灸三壯竇氏針入二寸半橫透光明穴灸二七壯中都二穴足厥陰郄在內踝上七寸胻中與太陰相直針經刺入三分留六呼灸五壯竇氏針入二寸半橫透陽交穴膝關二穴一名陰關在膝蓋骨下內側陷中與犢鼻平相去二寸針經刺入四分灸五壯竇氏橫透陽關穴曲泉二穴水也在膝內輔骨下大筋下小筋上陷者中屈膝橫紋盡處是穴足厥陰脈之所入也為合針經刺入六分留十呼灸三壯竇氏針入一寸半陰包二穴在膝上四寸股內廉兩筋間足厥陰別絡蜷足取之膝內側虛陷中是穴針經刺入六分灸三壯五里二穴在陰廉下一寸去氣衝三寸去外廉二寸陰股中動脈針經刺入六分灸五壯竇氏針入二寸五分陰廉二穴在羊矢下羊矢者膚中有核如羊矢也去氣衝二寸動脈中針經刺入八分灸三壯章門二穴脾之募也一名長平一名季脅一名脅髎在大橫外直季脅端肘盡處是穴夾下脘兩旁各九寸側臥屈上足伸下足舉臂取之足少陽厥陰之會針經刺入八分留六呼灸三壯銅人累灸百壯經曰臟會章門以其能統五臟之氣故也期門二穴肝之募也在乳下第二肋端夾不容穴旁一寸五分足太陰厥陰陰維之會舉臂取之針經刺入四分灸五壯竇氏針入二分沿皮向外一寸半肝經穴法分寸歌大敦拇指叢毛際行間縫尖動脈處太衝本節後二寸中封內踝前一寸蠡溝內踝上五寸中都內踝上七寸膝關犢平二寸所曲泉屈膝橫紋盡陰包膝髕上四寸在股內廉兩筋間五里氣衝下三寸陰廉穴在橫紋胯章門臍上二寸量橫在季脅看兩旁期門不容旁寸半上直兩乳二肋詳督脈圖穴二十督脈督之為言都也行背部之中行為諸陽之都綱奇經八脈之一也督脈者起於下極之俞並於脊裡上至風府入屬於腦上巔循額至鼻柱經素髎歷水溝兌端至齦交而終焉為陽脈之海也是病脊強而厥督脈所發二十七穴長強一穴一名氣之陰郄一名橛骨伏而取之督脈別走任脈者在脊骶端足少陰少陽所會針經刺入三分留七呼灸三壯刺之大痛無喜是穴一方灸三十壯累灸至二百壯腰俞一穴一名背解一名髓空一名腰柱一名腰戶在二十一椎下間患人昂首伏地縱四體乃取其穴針經刺入二分留七呼灸五壯一方刺八分灸七七壯陽關一穴在第十六椎下間坐取之針經刺入五分灸三壯命門一穴一名屬累在第十四椎下間伏而取之針經刺入五分灸三壯懸樞一穴在第十三椎下間伏取之針經刺入三分灸三壯脊中一穴一名神宗一名脊俞在第十一椎下間俯而取之針經刺入五分禁不可灸灸之令人傴僂筋縮一穴在第九椎下間俯而取之針經刺入五分灸三壯至陽一穴在第七椎下間俯而取之針經刺入五分灸三壯靈臺一穴在第六椎下間禁不可灸上古無主治神道一穴在第五椎下間俯而取之針經刺入五分留五呼灸三壯一方灸七壯累至百壯身柱一穴在第三椎下間俯取之針經刺入五分留五呼灸三壯一方灸七七壯止百壯陶道一穴在第二椎下間俯而取之督脈足太陽之會針經刺入五分留五呼灸五壯大椎一穴一名百勞在第一椎下陷者中手足三陽督脈之會針經刺入五分灸九壯竇氏灸二七壯啞門一穴一名舌橫一名舌厭在風府後五分入髮際五分項中央宛宛中仰頭取之督脈陽維之會入系舌本針經刺入四分不可更深不可灸灸之令人啞風府一穴一名舌本在項後入髮際一寸大筋內宛宛中去腦戶一寸五分疾言其肉立起言休其肉立下督脈陽維之會針經刺入四分留三呼禁不可深不可灸逆之令人喑腦戶一穴一名匝風一名合顱在枕骨上強間下一寸五分督脈足太陽之會針經刺入三分禁不可深深刺中腦立死禁不可妄灸妄灸令人啞強間一穴一名大羽在後頂後一寸五分針經刺入三分灸五壯後頂一穴一名交沖在百會後一寸五分枕骨上是穴針經刺入四分灸五壯百會一穴一名三陽五會一名天滿在前頂後一寸五分頂中央直兩耳尖陷可容指北溪陳氏曰略退纖子猶天之極星居北一方以草前後齊發際量折當中是穴手足三陽督脈之會針經刺入三分灸三壯竇氏針入二分前病者沿皮向前一寸後病者沿皮向後一寸左右如法灸七壯前頂一穴在囟會後一寸五分骨間陷中針經刺入四分灸五壯囟會一穴在上星後一寸骨間陷中針經刺入四分灸五壯小兒八歲以下囟會未合刺之恐傷其骨令人夭風熱上攻宜出血上星一穴在顱上直鼻中央入髮際一寸陷中可容豆一方以掌後橫紋按於鼻尖中指點到處是穴針經刺入三分留六呼灸三壯神庭一穴入髮際五分直鼻督脈足太陽陽明之會針經禁勿刺令人癲疾目失明灸三壯張子和曰目痛目腫翳腫針神庭上星囟會前頂翳者可使立退腫者可使立消此以邪氣作實而弗禁針也素髎一穴一名面王在鼻端針經刺入三分禁灸水溝一穴一名人中在鼻柱下三分口含水凸珠是穴督脈手足陽明之會直唇取之針經刺入三分留七呼灸三壯兌端一穴在唇上端針經刺入三分留六呼灸三壯齦交一穴在唇內上齒齦縫中督任足陽明之會針經刺入三分灸三壯督脈經穴分寸歌歌內增神聰四穴亦太醫所傳累用神良今並存之齦交唇內齦縫間兌端正在唇中央水溝鼻下溝內索素髎宜向鼻端詳頭形北高南面下先以前後髮際量分為一尺有二寸發上五分神庭當庭上五分上星位囟會星上一寸強上至前頂一寸半寸半百會居中央神聰百會四面取各開一寸風癇主後頂強間腦戶三相去腦戶一寸五後發五分定啞門門上五分定風府上有大椎下尾骶分為二十有一椎古來自有折量法針經凜凜不可欺九寸八分分之七每椎一寸四分一上之七節如是推中之七節依法量一寸六分一釐強每椎一寸二分六下之七節忒真詳共長三尺少四釐此是督脈脊中央大椎第一節上是節下便為陶道知身柱第三椎節下神道第五無足疑靈臺第六至陽七筋縮第九椎下司脊中在脊十一椎懸樞命門十三四陽關十六椎下看二十一椎腰俞參其下長強趺地取痔疾主之效不難任脈圖穴二十一任脈任之為言妊也行腹部中行為夫人生養之本奇經八脈之一也任脈者起於中極之下以上毛際循腹裡上關元至咽喉承漿環唇上至齦交分系目系會承泣而終焉為陰脈之海是病其內若結男子為七疝女子為瘕聚氣盛則充膚熱肉血盛則溢灌皮膚生毫毛婦人月事數下衝任有虧脈不榮於口唇內宦以刑身傷其衝任故髭鬚並不生焉任脈所發二十四穴會陰一穴一名屏翳一名海底在兩陰之間男人取陰囊後盡處中縫是穴任督沖三脈所會針經刺入二寸留三呼灸三壯曲骨一穴在臍下五寸中極下一寸橫骨之上毛際之中動脈應手是穴任脈足厥陰之會針經刺入一寸五分留七呼灸三壯竇氏針入一寸五分灸三七壯中極一穴一名氣原一名玉泉膀胱募也在臍下四寸足三陰任脈之會針經刺入二寸留七呼灸三壯一方灸五十壯宜三灸之關元一穴一名次門一名下紀在臍下三寸小腸募也足三陰任脈之會針經刺入二寸留七呼灸三壯一方灸五十壯累百壯石門一穴一名利機一名精露一名丹田一名命門在臍下二寸三焦募也針經刺入五分留十呼灸三壯一方灸五十壯女子禁不可刺灸令人絕子氣海一穴一名脖胦一名下肓在臍下一寸五分針經刺入一寸三分灸五壯一方灸五十壯止百壯是穴為生氣之原諸虛不足並宜取之陰交一穴一名橫戶一名少關在臍下一寸當膀胱上口足三陰沖任之會針經刺入八分灸五壯窺工針入二寸五分灸五十壯神闕一穴一名氣舍一名維會在臍中禁不可刺刺之令人惡瘍遺矢者死不治灸一百壯徐平仲中風不蘇桃源簿為灸臍中百壯始蘇水分一穴在下脘下一寸臍上一寸針經刺入一寸灸五壯竇氏針入二寸灸七七壯止百壯一方水脹病灸百壯大良禁針針之水出盡死矣下脘一穴在建里下一寸臍上二寸足太陰任脈之會針經刺入一分灸五壯竇氏針入二寸五分灸五十壯建里一穴在中脘下一寸臍上三寸針經刺入五分灸五壯竇氏針入二寸五分灸五十壯中脘一穴一名太倉一名上紀胃之募也居膻中與臍之中在上脘下一寸臍上四寸手太陽少陽足陽明任脈之會又曰腑會中脘針經刺入八分灸七壯竇氏針入二寸五分灸三七壯止百壯上脘一穴在巨闕下一寸五分去蔽骨三寸臍上五寸手足陽明任臍之會針經刺入八分灸五壯竇氏針入二寸五分灸五十壯巨闕一穴心之募也在鳩尾下一寸針經刺入六分留七呼灸五壯竇氏針入二寸五分針頭向下施鳩尾一穴一名尾翳一名𩩲骬在臆前蔽骨下五分任脈之別膏肓之原也針經禁刺灸一方刺三分灸三壯竇氏針入一寸五分針頭向下施禁不宜直入人無蔽骨者從岐骨際下行一寸是穴非高手不能下中庭一穴在膻中穴下一寸六分陷中仰以取之針經刺入三分灸五壯膻中一穴在玉堂下一寸六分陷中居兩乳間是為氣之所會仰臥取之針經刺入三分灸五壯玉堂一穴一名玉英在紫宮下一寸六分陷中仰頭取之針經刺入三分灸三壯紫宮一穴在華蓋下一寸六分陷中仰頭取之針經刺入三分灸五壯華蓋一穴在璇璣下一寸陷中仰頭取之針經刺入三分灸五壯璇璣一穴在天突下一寸陷中仰頭取之針經刺入三分灸五壯天突一穴一名玉戶在頸結喉下三寸中央宛宛中陰維任脈之會仰頭取之針經刺入一寸留七呼灸三壯針頭宜向下施所謂直下是也廉泉一穴一名本池在頷下結喉上舌本下陰維任脈之會針經刺入三分留三呼灸三壯一方刺入一寸低針取之承漿一穴一名懸漿在頤前唇下三分陷中足陽明任脈之會合口取之針經刺入三分留六呼灸三壯靈樞本輸篇云任脈一次足陽明人迎二次手陽明扶突三次手太陽天窗四次足少陽天容五次手少陽天牖六次足太陽天柱七次於督脈之風府故七穴皆主暴喑喉痹咽中諸疾任脈穴法分寸歌會陰正在兩陰間曲骨臍下毛際安中極臍下四寸取三寸關元二石門氣海臍下一寸半陰交臍下一寸論分明臍內號神闕水分一寸臍上列下脘建里中上脘各穴一寸為君談巨闕上脘一寸半鳩尾蔽骨五分安中庭膻中寸六分膻中兩乳中間看玉堂紫宮至華蓋相去各寸六分算華蓋璣下一寸量璇璣突下一寸當天突結下宛宛中廉泉頷下骨尖強承漿地閣唇稜下任脈二十四穴詳衝脈二十二衝脈者與任脈起於胞中上循脊裡為經絡之海其浮於外者循腹上行會於咽喉別而絡唇口經又曰衝脈者起於會陰並足少陰之經夾臍上行至胸中而散其為病也令人氣逆而裡急針經衝脈所發一十二穴左右共二十四穴會陰衝脈之會橫骨大赫氣穴四滿中注肓俞商曲食關陰都通谷幽門上十一穴皆衝脈足少陰之會衝脈經穴歌衝脈所發十二穴會陰橫骨大赫列氣穴四滿中注存肓俞商曲食關接陰都通谷及幽門悉是少陰經里穴帶脈二十三帶脈者起於季脅回身一周其為病也腰腹縱溶溶如囊水之狀若坐水中針經帶脈所發二穴帶脈穴維道二穴與足少陽會帶脈穴歌此脈環腰束一周幾希犀玉束人流穴惟帶脈與維道足少陽經圖所收陽蹻脈二十四陽蹻者起於跟中循外踝上行入風池其為病也陰緩而陽急以邪氣在陽經故陽脈緊急陰不受邪其脈自舒緩也陽蹻脈本太陽之別合於太陽其氣上行氣並相還則為濡目氣不營則目不合針經陽蹻脈所發一十穴左右共二十穴僕參陽蹻之本申脈陽蹻所生也附陽陽蹻之郄居髎足少陽陽蹻會肩髎手陽明蹻脈會巨骨手陽明蹻脈會臑俞手太陽陽蹻會地倉手足陽明陽蹻會巨髎足陽明蹻脈會承泣足陽明任脈陽蹻會陽蹻穴歌陽蹻十穴本僕參申脈附陽居髎安肩髃巨骨臑俞並地倉巨髎承泣完陰蹻脈二十五陰蹻脈者亦起於跟中循內踝上行至喉嚨交貫衝脈為病陽緩而陰急陰蹻脈者足少陰之別別於然谷之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入鼻屬目內眥合於太陽女子以為經男子以為絡針經陰蹻脈所發二穴左右共四穴照海陰蹻所生交信陰蹻之郄陰蹻穴歌陰颺脈起足跟中循內踝上至喉嚨穴惟照海與交信少陰所發是其蹤陽維脈二十六陽維者起於諸陽之會維絡諸陽溢蓄環流溉灌諸經者也陽維不能維諸陽則溶溶不能自收持其為病也苦寒熱針經陽維脈所發一十三穴左右共二十四穴金門陽維所別屬陽交陽維郄臑俞手太陽陽維陽蹻天髎手少陽陽維會肩井足少陽陽維會陽白足少陽陽維會本神足少陽陽維會臨泣足少陽陽維會正營足少陽腦空足少陽風池足少陽風府督脈啞門督脈陽維穴歌陽維經穴一十三金門陽交臑俞安天髎肩井與陽白本神臨泣正營迨腦空風池風府同更有啞門在其中陰維脈二十七陰維者起於諸陰之交維絡諸陰流環溉灌者也陰維不能維諸陰則悵然失志其為病也苦心痛針經陰維脈所發七穴左右共十二穴築賓陰維郄腹哀足太陰大橫足太陰府舍足太陰厥陰期門足太陰厥陰天突任脈廉泉任脈陰維穴歌陰維七穴有築賓腹哀大橫府舍承期門天突廉泉序載在針經予所聞附針經不載諸家奇穴二十八十宣十穴在手十指端上是穴宜三稜針出血禁灸治傷寒不識尊卑發痧等證手鬼眼二穴在手大拇指端外側去爪甲韭許用線縛定兩大指縫內是穴灸七壯禁針治五癇呆癡傷寒發狂等證五虎四穴在手第二指與第四指上四穴俱是指背第二節尖上是穴灸七壯禁針治手拘攣不開龍囦二穴又名龍玄在手側腕上交叉紫脈上是穴灸七壯治牙齒疼痛瀉小骨空二穴在手小指第二節紋尖灸七壯禁針治目羞明怕風日爛眼迎風冷淚大骨空二穴在手大指拇本節側橫紋尖灸七壯禁針治目痛失明怕日風沿爛眼迎風下淚中魁二穴在手中指第一節尖灸七壯禁針治翻胃吐食眼疾心疼痛中都二穴在手次指本節陷中針入一分沿皮透陽池穴治手背紅腫痛瀉宜三稜針出血上都二穴在手小指次指岐骨間針入一分沿皮透陽池穴治手臂紅腫生瘡二白四穴在手腕上四寸一穴在大筋內一穴在大筋外針入五分灸七壯一法用線量轉脛間除下將患人虎口量起到線頭盡處是穴治五腫痔漏便血膝眼四穴在膝蓋骨下犢鼻穴內外陷中針入五分灸七壯治膝紅腫疼痛鶴膝風肘尖二穴在手肘大骨尖上是穴灸七壯禁針治眼目疼翳膜冷淚風沿眼爛與肩髃並灸治瘰癧金津一穴在舌底在左紫脈上是穴禁灸宜用三稜針出血治小兒重舌大人乳蛾等症出血妙玉液一穴在口舌底右紫脈上是穴禁灸宜用三稜針出血治五疳重舌乳蛾等症海泉一穴在口舌底根當中紫脈上是穴宜三稜針出血禁灸治舌上諸病針不宜深內迎香二穴在鼻孔內用箬葉做一箬管搐動出血治眼紅腫一法在鼻柱兩旁珠上陷中是穴針入二分治鼻息肉不聞香臭癭俞一穴在廉泉穴下近結喉骨上是穴針入三分灸七壯治癭等症魚腰二穴一名吊睛在兩眉中間針入一分沿皮向外透魚尾穴禁灸治眼紅腫疼痛瀉之良子宮二穴在臍下四寸中極穴兩旁各開三寸是穴針入二寸五分灸三七壯治血崩漏下及男子婦人無子關元二穴在曲骨穴微上兩旁各開三寸是穴針入三寸灸五十壯治乳痃疝氣肚腹膨脹偏墜木腎遺尿先補後瀉腋縫二穴在肩柱骨前縫尖是穴針入五分灸七壯治肩胛疼痛蘭門二穴在曲骨穴兩旁各開二寸針入一寸五分灸三七壯治膀胱七疝之氣髖骨四穴在膝上梁丘穴兩旁各開五分針入五分灸二七壯治腰腿腳膝無力麻木補多瀉少膝蓋紅腫瀉之又法在梁丘穴兩旁一寸獨陰二穴在足第二指節下橫紋縫中灸二七壯禁針治難產胎衣不下偏墜木腎鬼哭四穴在手足大指端去爪甲外側用繩縛定取兩指縫內是穴灸七壯禁針治傷寒發狂癇疾呆癡太陽二穴在頭額角髮際下紫脈上用三稜針出血治目疼腦堂一穴在頭後風府穴上一寸五分玉枕骨下陷中針入二分灸三七壯治腦頂頭暈痛胛縫二穴在肩背胛縫尖盡處直針入三分灸三七壯治肩背膊臂痛瀉手足無力補鼻柱一穴在鼻柱尖上專治鼻上酒醉風宜三稜針出血耳尖二穴在耳尖上卷耳取尖上是穴治眼生翳膜用小艾炷灸五壯聚泉一穴在舌上當舌中吐出舌直縫陷中用三稜針出血治喘咳久嗽不愈舌苔舌強肩柱骨尖二穴在肩端起骨尖上灸五壯治瘰癧手不能舉動內踝尖二穴在足內踝骨尖上灸五壯治下牙痛足內廉轉筋外踝尖二穴在足外踝骨尖上灸七壯治足外廉轉筋腳氣寒熱宜三稜針出血囊底一穴在陰囊十字紋中用艾如小豆大灸七壯治腎臟風瘡小腸疝氣家一切症候印堂一穴在兩眉陷中針入一分灸五壯治小兒驚風八邪八穴在左右手十指岐骨間縫中其一大都二穴在手大指次指虎口赤白肉際間握拳取之針入一分灸七壯治頭風牙痛其二上都二穴在手食指中指本節岐骨間縫中握拳取之針入一分灸五壯治手臂紅腫其三中都二穴在手中指無名指本節岐骨間縫中一名液門針入一分灸五壯治手臂紅腫其四下都二穴在手無名指小指本節岐骨間縫中一名中渚穴中渚在液門下五分針入一分灸五壯治手背紅腫竇氏針八邪穴針入一分更沿皮向後一寸五分宜出血治手膊紅腫手上諸疾八風八穴在足十指陷中竇氏針直入五分宜出血治紅腫腳氣天應穴即千金方阿是穴玉龍歌謂之不定穴但痛處就於左右穴道上臥針透痛處瀉之經所謂以痛為腧是也若青腫痠疼麻木不仁寒痛等症補灸五七壯紅腫毒痛宜三稜針出血睛中穴主治內障二十九龍木居士金針撥轉瞳人妙訣睛中二穴在眼青白珠縫中法以暑月先用布搭目外以冷水淋一刻方將三稜針於目外角離黑珠一分許刺入半分取出然後用金針針入數分深自上層轉撥向瞳人輕輕而下斜插定目角即能見物一飯頃出針輕扶偃臥仍用青布搭目外再以冷水淋三日夜止初針盤膝正坐將箸一把兩手握於胸前寧心正視其穴易得治一切內障年久不能視物頃刻光明神秘穴也針內障秘訣歌內障由來十八般精醫明哲用心看分明一一知形色知得行針自入玄察他冷熱虛和實多驚先服定心丸弱翳細針粗撥老針形不可一般般病虛新瘥懷妊月針後應知將息難不風不雨兼吉日清齋三日在針前安心定坐存真氣醫師全要靜心田有血莫驚須住手裹封如舊勿頻看若然頭痛不能忍熱茶和服草烏煙七日解封方視物花生水動莫開言還睛圓散堅心服百日冰輪流九淵針內障要歌內障金針針了時醫師治法要精微綿包黑豆如球子眼上安排慢熨之頭邊鎮枕須平穩仰臥三朝莫厭遲封后或然微有痛腦風牽動莫狐疑或針或烙依前法痛極仍將火熨宜鹽白梅含止咽吐大小便起與扶持高聲叫喚私人慾驚動睛輪見雪飛三七不須湯洗面針痕濕著痛微微五辛酒面周年慎出戶升堂緩步移雙眸了了光明日狂吝嗔予泄聖機
