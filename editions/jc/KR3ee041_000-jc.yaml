body:
  text: 序良醫者兆人司命任不啻與九鼎爭昂然必針藥並詣其極始為無忝隆古聖神即嘗百草而示人以藥復作九針而喻人以刺亦以人命至重拯救之術不得不詳且悉也正統中聖慮宋制銅人日久漫滅命復範銅為之建諸醫官式廣教詔又礱石圖經序由御製心之保民也弘矣其所望一醫者至矣語曰不針不神不灸不良良有以也近世刀圭之徒才能不及中庸分科療病更不講求神良精藝者萬夫一轍無亦法妙無方探之猶望洋爾昆自束髮修儒遊心靈素諸砭焫針經皆時討究蓋未及壯年負笈萬里虛衷北面不減七十二師念在取善發蒙不謂一吷非律一簣非山故也時以所授針方對證施治種種神驗然窮其所以神者牴牾背馳阻於頓悟益之三十餘年覺以歲積始破前迷今樗櫟之年六十有七視昔考醫方時年則倍矣志在公善於人成斯六集首神照次開蒙次尊經次旁通次紛署次兼羅其間一得之愚是千慮之所開也良工之心獨苦今乃驗之藉是以翼圖經豈云自與朔瞻天朝軫念疲癃澤同雨露茲六集者倘有補於聖政亦桔槔之助甘霖耳遑自功哉所跂望者一人有慶壽域同躋林總萬方家松齡而人鶴算參苓不餌針石永捐俾池上神工挾術而無所施則巖穴之私慰矣他尚何求歲丁巳海陽程處士標病劇得起進不肖為醫林長側弁六集而左袒焉復捐阿堵以鳩剞劂義之紀也惟是並序皇明萬曆四十六年歲次戊午長至日書
