body:
  text: 卷之五紛署集敘曰人身頭面肢體部穴不同經傳所署何紛紛也然或得之針或得之灸以去疾即安紀為妙義文之委瑣胥不足陋語曰一曲之言大方不棄作紛署集列於左方針灸同法頭直鼻中髮際旁行至頭維凡七穴第一每穴各開一寸五分神庭一穴主身反吐舌癲癇目上視不識人鼻流清涕目出冷淚頭痛喘喝曲差二穴治雷頭風頭疼身熱汗不出眼視不明鼽衄鼻塞鼻瘡頂腫心煩本神二穴主目眩項強驚癇嘔吐涎沫胸脅相引不得轉側偏風頭維二穴主頭痛如破目痛如脫眼赤目潤乘風流淚視物不明頭直鼻中入髮際一寸循督脈卻行至風府凡八穴第二上星一穴主頭風面腫鼻淵鼻塞無聞時生息肉目眩睛痛口鼻出血不止宜出血以泄諸陽熱氣囟會一穴主頭風頭疼腦虛衄血面赤暴腫頭皮腫顏青目眩鼻塞不聞香臭驚癇目上視不識人風熱上攻宜出血小兒囟未合者禁刺前頂一穴主頭風目眩面赤腫痛驚癇鼻流清涕鼻塞鼻痔百會一穴主頭風中風言語蹇澀口噤不開半身不遂心煩驚悸健忘精神恍惚痎瘧脫肛風癇青風心風身反羊鳴悲哭妄言發時即死汗出吐沫而嘔面赤腦重鼻塞頭痛目眩食無味百痛絶陽虢太子尸厥扁鵲取三陽五會有間太子蘇蓋此穴也唐高宗風眩頭重目不能視秦鳴鶴為之刺頭出血而愈亦此穴也後頂一穴主頭項強急惡寒風眩目䀮䀮額顱痛歷節汗出狂癲不臥癇發瘛瘲頭風偏痛強間一穴主頭風頭痛目眩腦旋煩心嘔吐涎沫項強狂走不臥目中冷淚腦戶一穴主面赤目黃面痛頭重腫痛癭瘤禁不可深刺妄灸風府一穴主中風舌緩不語振寒汗出身重惡寒頭重如石頂急不得回顧目眩鼻衄咽痛頭中百病頭直夾督脈各一寸五分卻行至玉枕凡十穴第三足太陽經五處二穴主脊強反折瘛瘲癲疾偏頭風鼻塞時時嚏不已目昏目上戴不識人內障頭生瘡疥宜三稜針出血承光二穴主鼻塞不聞香臭口喎風眩頭痛嘔吐心煩鼻多清涕目生白膜通天二穴主頸項難轉鼻中塞悶偏風口喎鼻多清涕衄血頭重旋暈尸厥喘息項有大氣癭瘤絡卻二穴主清風內障目無所見頭旋耳鳴狂走瘛瘲恍惚不樂腹脹玉枕二穴主腦風目如脫項如拔不可左右顧風眩頭寒多汗鼻窒不聞頭直目上入髮際五分卻行至腦空凡十穴第四足少陽經臨泣二穴主中風不識人目眩目疼內障白翳多眵淚鼻塞淵涕目外眥痛驚癇反視枕骨合顱痛目窗二穴主頭面浮腫旋眩眥痛目視不明頭痛寒熱汗不出惡寒正營二穴主目眩牙疼唇吻強急頭項偏痛齲齒承靈二穴主腦風頭痛惡寒鼻塞鼽衄喘息不利腦空二穴主腦風頭痛目瞤眩瞑項強不得回顧心悸癲風勞疾羸瘦頭緣耳上卻行至完骨凡十二穴第五天衝二穴主偏頭風頭角痛癲風強痙牙齦腫善驚恐率谷二穴主偏正頭風腦兩角強痛頭重痰氣膈痛酒風膚腫煩悶胃寒嘔吐目痛曲鬢二穴主頷頰腫引牙車不得開急痛口噤不能言頸項不得顧腦兩角痛為癲風引目眇浮白二穴主寒熱喉痹耳鳴無聞齒痛頸強生癰癭氣胸滿不得息肩背痛咳逆痰沫竅陰二穴主四肢轉筋手足煩熱頭痛如錐刺不可以動中風語言蹇澀咳逆喉痹項強頷痛口苦厲鼻管內生疽耳鳴目痛項毒癭氣癰疽發厲熱病汗不出舌強脅痛骨蒸勞熱難經曰髓會絶骨一云非懸鐘也當作枕骨於理尤勝完骨二穴主頭面腫眼喎口僻耳鳴項腫牙車急耳後痛喉痹齒齲煩心小便黃赤足痿不收癲疾頭後髮際中央旁行凡五穴第六啞門一穴禁不可灸治舌強失音諸陽熱盛鼻衄不止頭痛項脊強反折瘛瘲天柱二穴主肩背痛目瞑視鼻不知香臭頭項筋急不能回顧偏正頭風頭旋腦痛風池二穴主灑淅寒熱汗不出頭痛頭眩目暈偏正頭風頸項強急腰背傴僂目赤鼽衄癇瘧中風氣塞涎上不語昏危癭氣不能發汗背自第一椎循督脈行至脊骶凡十三穴第七大椎一穴治五勞七傷骨蒸發熱盜汗痎瘧氣疰頸項不能回顧背膊拘急咳嗽瘰癧諸虛潮熱陶道一穴主痎瘧寒熱灑淅脊強煩滿汗不出頭重目瞑瘛瘲恍惚不樂身柱一穴主腰脊痛癲癇瘛瘲妄見妄言咳嗽哮喘小兒驚癇神道一穴主傷寒發熱頭痛往來痎瘧恍惚悲愁健忘驚悸小兒風癇背反靈臺一穴禁灸古無治法至陽一穴主腰脊痛胃中寒不能食胸脅支滿羸瘦背中氣上下行腹中鳴寒熱解㑊四肢痠痛少氣難言卒疰攻心筋縮一穴主癲疾狂走脊膂強痛目反視癇病多言心痛寒熱進退四肢拘攣脊中一穴禁灸治風癇癲邪黃疸腹滿不嗜食五痔便血溫病積聚下利小兒疳疾脫肛懸樞一穴治腰脊強痛不得屈伸積氣上下水穀不化下利腹中留疾命門一穴主腎虛腰痛目眩不明頭痛身熱痎瘧腰腹相引痛骨蒸五臟熱男子遺精女子赤白帶下小兒發癇張口搖頭角弓反折陽關一穴主膝外不可屈伸風痹不仁筋攣不行腰俞一穴治腰脊痛不可俯仰溫瘧無汗足痹不仁傷寒肢熱不已女人月閉溺赤長強一穴治九般痔瘻臟毒大便洞泄小便不通五淋𧈟食下部頭重顫搖腰僂脊痛狂病小兒囟陷驚癇瘛瘲嘔血驚恐失神瞻視不正背自第一椎兩旁夾脊各一寸五分下至節凡四十四穴第八大杼二穴主傷寒汗不出頭痛項強脊痛身熱振寒目眩瘛瘲瘧疾喉痹煩滿勞氣咳嗽胸中鬱熱腹痛煩滿裡急癲癇身蜷經曰骨會大杼宜主骨痿骨蒸東垣曰五臟氣亂於頭取之天柱大杼不補不瀉以導氣而已風門二穴主傷寒項強目眩胸中熱嘔喘背痛腠理不密易受風寒咳嗽噴涕不已鼻流清水若腠密玄府不泄取是穴頻刺瀉去熱氣背永不發癰疽肺俞二穴主癆瘵勞熱骨蒸痰飲嗽喘嘔吐支滿背僂肺中風偃臥胸滿短氣不嗜食五勞七傷盜汗久嗽不愈肺脹腰背強痛食後吐水黃疸癭氣小兒龜背心包俞二穴治氣逆嘔吐心痛留結煩悶古缺治心俞二穴主心風狂走虛驚夜夢失精盜汗偃臥不得傾側癇癲悲泣悶亂煩滿嘔吐不食咳血吐血鼻衄喑塞不言黃疸丹毒健忘小兒心氣不足數歲不語膈俞二穴主心痛周痹吐食翻胃胸滿咳逆嘔吐痰飲食不下脅痛腹脹水腫積癖喉痹胃脘當心痛四肢怠惰嗜臥身重自汗盜汗熱病汗不出一方云心生血肝藏血此穴居於心肝二俞之間故為血會血病宜主此肝俞二穴主肝中風踞坐不得低頭目額青脅痛不得息目眩淚出吐血咳逆口乾疝氣小腹痛多怒衄血鼻酸雀目夜眩生翳筋寒熱痓筋急肋下與脊相引而反折轉筋入腹將死目上視黃疸驚狂癥瘕痞滿膽俞二穴主頭痛振寒汗不出膽熱多睡膽寒不寢眠中涕淚交流口苦舌燥咽痛目黃胸脅急痛脹滿不得臥嘔無所出食不下骨蒸勞熱脾俞二穴主多食身瘦黃疸脅下滿瀉利體重怠惰痃癖積聚腹痛痰瘧寒熱水腫氣脹引脊痛喜欠不嗜食胃俞二穴主中濕霍亂胃寒腹脹不進飲食胃熱結胸心疼多食羸瘦不生肌肉胸脅滿目不明三焦俞二穴竇氏禁灸主臟腑積聚脹滿羸瘦不能飲食吐逆飧泄腸鳴目眩頭痛肩背痛腰脊強不能俯仰腎俞二穴主腎臟虛寒腰疼遺精白濁羸瘦面黑耳鳴及聾頭重目昏足脛痠疼四肢淫濼洞泄食不化心腹滿兩脅滿小腹急脹少氣身腫如水膝脛中寒消渴五勞七傷虛憊婦人赤白帶下月經不調下元虛損子戶中寒一方云植杖度之與臍平是穴大腸俞二穴主中燥大小便不通腸澼泄利不止腸鳴引腰脊痛腹脹繞臍㽱痛多食身瘦洞泄脊強不能俯仰小腸俞二穴主大小腸寒熱疝氣小便赤澀淋瀝小腹脹㽱痛大便膿血泄利下重五痔疼脹三焦津液少口渴不可忍婦人帶下膀胱俞二穴主風勞脊強腰疼小便赤澀遺溺小腹滿大便難足胻拘急不能屈伸腳膝無力陰瘡女人癥瘕月事不調中膂俞二穴主赤白痢腎虛消渴腰脊強不能俯仰腹脹脅痛腸冷疝痛汗不出白環俞二穴主夜夢鬼交遺精勞損虛風腰脊髖骨不利筋攣痹縮虛熱無汗大小不利腳膝不仁上髎二穴主偏風腰膝冷痛不能起跪鼻衄寒熱大小不利嘔逆男子陽痿婦人絶嗣陰挺不收次髎二穴主腰痛不得轉搖疝氣偏墜痛引陰器足清不仁背腠寒腸鳴注泄小便淋瀝胸中堅脹婦人赤白帶下中髎二穴主腰痛大小便難腹脹下利淋瀝滑泄男子五勞七傷六極婦人絶子帶下月事不調下窖二穴主腰痛不能轉側大小便不利寒濕內傷腸鳴注泄便血婦人漏下蒼汁陰中痛引小腹會陽二穴主腹中寒熱冷氣泄利不止久痔腸澼下血陽氣虛乏陰汗時出背自第二椎兩旁夾脊各三寸行至二十一椎下凡二十八穴第九附分二穴主風寒客於腠理肩背拘急頸項強痛不得回顧肘臂不仁魄戶二穴主三尸走注肩膊痛咳逆上氣嘔吐煩滿虛勞喘痿頸項強急不得回顧體熱百節痛夜夢鬼交膏肓二穴針經未有唐真人孫思邈始指無所不療考在神照集神堂二穴主多夢虛驚狂走肩脊強急不可俯仰胸腹滿灑淅寒熱氣逆上攻時噎譩嘻二穴主勞損不得臥背悶氣滿腋脅拘急目眩鼻衄膈脹胸中痛氣逆肩膊內痛不得回顧大風汗不出溫瘧寒熱膈關二穴主背痛惡寒脊強難以俯仰飲食不下嘔噦吐涎胸中噫悶大便不節小便黃魂門二穴主尸厥走注胸背引心痛食飲不下渾身筋攣骨痛體熱勞嗽氣不升降腹中雷鳴大便不節小便黃赤陽綱二穴主腸鳴腹痛食不下大便泄利不節小便淋瀝身熱目黃腹脹怠惰意舍二穴主腹滿虛脹背惡寒泄瀉溺黃食不下嘔吐消渴目黃身熱胃倉二穴主腹滿虛脹水腫食飲不下背痛惡寒不得俯仰肓門二穴主心下痛大便祕婦人乳癰志室二穴主腰背強痛飲食不消腹中堅急陰痛下腫遺精小便淋瀝吐逆霍亂胞肓二穴主腰痛惡寒不得俯仰食不消小腹堅急癃閉脊背引痛傴僂秩邊二穴主腰痛不能俯仰小便淋瀝五痔發腫面部凡三十九穴第十懸顱二穴禁深刺主偏頭風痛目外眥赤齒痛身熱面膚赤腫鼻洞濁不止傳為鼽衄瞑目熱病煩滿汗不出頷厭二穴深刺令人聾主頭風痛目眩耳鳴頸項強急目外眥急喜嚏頸痛驚癇歷節風汗出懸釐二穴主麵皮赤腫頭偏痛目鋭眥赤痛煩心不欲食中焦客熱熱病汗不出陽白二穴主瞳子癢痛目內紅腫胬肉熱淚濕爛冷淚重衣不溫頭痛嘔吐痰沫背腠寒栗攢竹二穴主火邪乘目失明睛昏目赤脹痛者宜三稜針出血三次瀉去火氣則目復明一方主臉動不得臥頰痛眩嚏瞳子癢尸厥癲狂絲竹穴二穴禁灸治眼疼目赤腫沿皮向前一寸五分透瞳子髎穴宜彈針出血專治迎風爛眼冷淚出目眩目赤目戴上不識人眼睫倒毛發狂吐涎沫偏正頭風睛明二穴禁灸治目內眥胬肉侵睛及生翳膜迎風冷淚憎寒頭痛小兒疳積患眼東垣曰刺太陽睛明出血則目愈明蓋此經多血少氣故目翳赤痛從內眥起者刺之以宣泄太陽之熱瞳子髎二穴主頭痛喉痹青盲目紅腫目癢冷淚垂簾翳膜胬肉扳睛患由外眥始者承泣二穴不可灸治口眼喎斜目瞤面葉葉動眼視䀮䀮目盲赤痛耳鳴耳聾一方用艾如麥大灸二壯不可針四白二穴近古禁不宜灸主頭痛目眩赤癢生翳微風目瞤口眼喎僻顴髎二穴禁不宜灸主口喎眼斜面瞤目赤䪼腫齒痛素髎一穴禁灸主鼻喎僻鼽衄窒塞喘息不利息肉不消多涕生瘡迎香二穴主鼻塞不聞香臭生息肉流清濁涕口喎面癢牽動葉葉狀如蟲行唇腫痛喘息不利鼻喎鼻內生瘡巨髎二穴主目障白膜目盲無見翳覆瞳子鼻塞面風頰腫口喎瘛瘲腳氣膝腫禾髎二穴主尸厥口禁中風口眼喎斜唇吻腫鼻瘡鼻衄鼻淵鼻塞不聞香臭不灸水溝一穴治脊強膂痛一切腰痛中風不省人事中惡鬼擊喘喝目不可視牙關不開唇瞤喎僻戲笑消渴飲水無度癲癇不