body:
  text: 卷之三尊經集敘曰道不師古雖善無徵而欲作則垂訓尼父猶然難之豫憫針失其傳欲令世人精明針法旦暮奉行必也尸祝神蹤而後可不然師心自用誰則從之乃考古昔針方如下署曰尊經集靈樞九針一一曰鑱針長一寸六分頭大末鋭令無深入而陽氣出主熱在頭身故曰病在皮膚無常處者取之鑱針於病所膚白勿取二曰圓針長一寸六分筒身圓末其鋒如卵以瀉肉分之氣令不傷肌肉則邪氣得竭故曰病在分肉間取以圓針三曰匙針長三寸五分身大末圓如黍米之鋭令可以按脈勿陷以致其氣使邪獨出故曰病在脈少氣當補之以匙針針於井榮分俞四曰鋒針長一寸六分筒其身而鋒其末刃三隅令可行瀉熱出血發泄痼病故曰病在五臟固居者取以鋒針瀉於井滎分俞取以四時也五曰鈹針廣二分半長四寸末如劍鋒可以取大膿故曰病為大膿血取以鈹針六曰圓利針長一寸六分尖如犛且圓且鋭中身微大以取癰腫暴痹故曰痹氣暴發者取以圓利針七曰毫針長一寸六分尖如蚊虻喙靜以徐往微以久留正氣因之令邪俱往出針而養以去痛痹在絡也故曰病痹氣補而去之者取之毫針八曰長針長七寸身薄而鋒其末取虛風內舍於骨解腰脊節腠之間為深邪遠痹者故曰病在中者取以長針九曰大針長四寸其鋒微圓以瀉機關內外大氣之不能過關節者也故曰虛風淫邪流溢於身如風水之狀不能過於機關大節者取以大針九針之宜各有所為長短大小各有所施不得其用病不能移疾淺針深內傷良肉皮膚為癰疾深針淺病氣不瀉反為大膿病小針大氣瀉太甚後必為害病大針小大氣不瀉亦為後敗上九針主治靈樞之訓也用之各盡其妙古今何異焉所云毫針又名小針取用益多猶布帛菽粟為日用之所急也其見於素難針經神妙之旨並述後方候氣二經曰謹候氣之所在而刺之是謂逢時病在陽分者必候其氣加在於陽分乃刺之病在陰分者必候其氣加在於陰分乃刺之見氣三左手見氣來至乃納針針入見氣盡乃出針取氣置氣四當補之時從衛取氣當瀉之時從營置氣不得氣五不得氣者十死不治定氣六乘車來者臥而休之如食頃乃刺之步行來者坐而休之如行十里頃乃刺之大驚大怒必定其氣乃刺之受氣七陽受氣於四肢陰受氣於五臟故瀉者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽調氣八知其內外表里隨其陰陽而調之故曰調氣之方必先陰陽邪氣穀氣九邪氣之來也緊而堅穀氣之來也徐而遲守形十粗守形者粗工但守刺法不問氣血有餘不足可補可瀉也守神十一上守神者守人之氣血有餘不足可補瀉也守關十二粗守關者守四肢而不知氣血邪正之往來也守機十三上守機者知守氣也知氣之虛實用針之疾徐針已得氣密意守之勿失也先後治十四病生於內者先治其陰後治其陽病生於外者先治其陽後治其陰刺其病之所從生十五病生於頭者頭重生於手者臂重生於足者足重治病者刺其病之所從生也陰深陽淺以數調之十六刺陰者深而留之刺陽者淺而疾取之清濁相干者以數調之也悶針十七甚者瀉之則悶悶甚則僕不能言悶則急坐之也陰病治陽陽病治陰十八審其陰陽以別柔剛陰病治陽陽病治陰定其血氣各守其鄉血實者宜決之氣虛者宜掣引之有急治有無攻十九病有形而不痛者陽之類也無形而痛者陰之類也無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰導有餘推不足二十氣有餘於上者導而下之氣不足於上者推而往之迎稽留二十一其稽留而不至者因而迎之必明於經隧乃能持之出陳菀二十二寒與熱爭導而行之其菀陳血不結者即而取之出其瘀血迎隨補瀉二十三迎而奪之惡得無虛隨而濟之惡得無實疾徐補瀉二十四徐而疾則實疾而徐則虛母子補瀉二十五虛則補其母實則瀉其子動伸推納補瀉二十六動而伸之是謂瀉推而納之是謂補導氣同精以調亂氣二十七徐入徐出謂之導氣補瀉無形謂之同精是非有餘不足也調亂氣之相逆也陰深陽淺二十八病痛者陰也痛而以手按之不得者陰也深刺之病在上者陽也癢者陽也淺刺之先陽後陰二十九病先起於陽後入於陰者先取其陽後取其陰必審其氣之浮沉而取之脈氣淺者獨出其邪三十脈氣之淺者勿輕下針必按絶其脈刺之無令精氣出獨出其邪氣耳先補虛後瀉實三十一陽實而陰虛先補其陰後瀉其陽而和之陰實而陽虛先補其陽後瀉其陰而和之病在營在衛三十二寒熱少氣血上下出者病在營氣痛時來時止病在衛怫氣賁響風寒客於腸胃之中所生也刺虛者須其實刺實者須其虛三十三刺虛者必其氣至而實為驗刺實者必其邪散而虛為驗刺實須其虛刺虛須其實三十四刺實須其虛者留針陰氣隆至針下寒乃去針也刺虛須其實者留針陽氣隆至針下熱乃去針也刺營無傷衛刺衛無傷營三十五刺陽病者臥針而刺之刺陰病者先以左手攝按所針滎俞之處氣散乃納針是謂刺營無傷衛刺衛無傷營也熱厥寒厥留針功異三十六刺熱厥者留針反為寒刺寒厥者留針反為熱外內難易三十七形先病而未入臟者刺之半其日臟先病而形乃應者刺之倍其日此內外難易之應也疾之留之三十八疾之疾出其針也留之久留其針也不盛不虛以經取之三十九假令肝受病虛則補其母實則瀉其子是虛宜補腎實宜瀉心也若不實不虛是正經自病不中他邪則於肝脈調之而已是謂以經取之間甚刺法不同四十病間者淺之甚者深之間者少之甚者衆之隨變而調氣專深刺法四十一諸病專深者刺本臟迫臟刺背俞以臟氣會於俞也腹中寒熱去而止與刺之要髮針而淺出血要在淺出血二刺一刺深刺間日刺四十二刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也一陽者一刺陽也久病者邪氣入深刺此病者深納而久留之間日而復刺之必先調其左右去其血脈要在去其血脈上工治未病中工治已病四十三上工治未病者見肝之病則知肝當傳之脾故當實脾氣無令得受肝之邪故曰治未病焉中工治已病者見肝之病不曉相傳但一心治肝故曰治已病知為針者信其左不知為針者信其右四十四當刺之時必先以左手壓按所針滎俞之處彈而怒之爪而下之其氣之來如動脈之狀順針而刺之得氣推而納之是謂補動而伸之是謂瀉是所取信者在左手也是謂知針假令彈而不怒爪下之後不見有動脈之狀刺之不得氣乃與男外女內又不得氣乃知十死不治是所信者在右手是何悟之晚也是謂不知針迎而奪之安得無虛隨而濟之安得無實虛之與實若得若失實之與虛若有若無四十五然迎而奪之者瀉其子也隨而濟之者補其母也假令心病瀉手心主俞是謂迎而奪之也補手心主井是謂隨而濟之也所謂實之與虛者濡牢之意也氣來牢實者為得濡虛者為失故曰若得若失也知迎知隨四十六所謂迎隨者知榮衛之流行經脈之往來也隨其逆順而取之故曰迎隨東方實西方虛瀉南方補北方四十七然金木水火土當更相平東方實則知肝實西方虛則知肺虛瀉南方火補北方水火者肝之子水者肝之母子能令母實母能令子虛故瀉火補水欲令金得平木也經曰不能治其虛何問其餘此之謂也實實虛虛為害四十八假令肺實肝虛用針者不補其肝而反重實其肺是謂實實虛虛損不足而益有餘工之所害也瀉實針方四十九血氣已並病形已成陰陽相傾補瀉奈何然瀉實者氣盛乃納針針與氣俱納以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大瀉必切而出大氣乃屈補虛針方五十持針勿置以定其意候呼納針氣出針入針孔四塞精無從出方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動無後時近氣不失遠氣乃來是謂追之搖針五十一刺腫搖針經刺勿搖三刺則穀氣至五十二刺在陽分則陽邪出刺在陰分則陰邪出三刺則穀氣至而止所謂穀氣者已補而實已瀉而虛故以知穀氣至也又邪氣之來也緊而堅穀氣之來徐和是其別也瀉必用方補必用圓五十三瀉必用方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而納針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉必用方其氣易行也補必用圓圓者行也行者移也刺必中其榮復以吸排針也故圓與方非針也故養神者必知形之肥瘦營衛血氣之盛衰血氣者人之神不可不謹養離合真邪補瀉針方五十四邪之入於脈也如經水之得風也經之動脈其至也亦時隴起其至於寸口也時大時小大則邪至小則平其行無常處在陰在陽不可為度卒然逢之早遏其路吸則納針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉不足者必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神呼盡納針靜以久留以氣至為故如待所貴不知日暮其氣已至適而自護候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補去濁血五十五邪之去絡入於經也舍於血脈之中其寒溫未相得如湧波之起時來時去故不常在方其來也必按而止之止而取之去其濁血留之於經久則為痹刺因於形五十六皮厚色黑者深而留之多益其數皮薄色少者淺而疾出其針刺因於病五十七凡十二經之病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之刺因於脈五十八諸脈急者多寒刺急者深納而久留之緩者多熱刺緩者淺納而疾髮針以去其熱大者多氣少血刺大者微瀉其氣無出其血滑者陽氣盛微有熱刺滑者疾髮針而淺納之以瀉其陽氣而去其熱澀者少血少氣微有寒刺澀者必中其脈隨其逆順而久留之必先按而循之已髮針疾按其痏無令其血出以和其脈諸小者陰陽形氣俱不足勿取以針而調以甘藥也刺因於時五十九春刺井夏刺滎季夏刺俞秋刺經冬刺合然春刺井者邪在肝夏刺滎者邪在心季夏刺俞者邪在脾秋刺經者邪在肺冬刺合者邪在腎上實下虛針方六十一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之通而決之是謂解結上寒下熱上熱下寒針方六十一上寒下熱先刺其項太陽久留之已刺則火尉項與肩胛令熱上合乃止所謂推而上之者也上熱下寒視其虛脈而陷下於經絡者針而灸之氣下而止所謂引而下之者也五病五取六十二病在臟者取之井病變於色者取之滎病時間時盛者取之俞病變於音經滿而血者取之經病在胃及以飲食不節得病者取之合五主六十三井主心下滿滎主身熱俞主體重節痛經主喘咳寒熱合主逆氣而泄義詳開蒙集五門主治條下足陽明六十四足陽明五臟六腑之海其脈大血多氣盛熱壯刺此者不深不散不留不瀉也刺留呼則度六十五刺陽明者深六分留十呼古道也其它刺深五分四分三分二分一分留七呼五呼四呼三呼二呼一呼皆以氣血多少遠近為度當刺井者以滎瀉之六十六諸井者肌肉淺薄不足使也然諸井者母也滎者子也實者瀉其子故當刺井者以滎瀉之春夏致一陰秋冬致一陽六十七春夏溫必致一陰者初下針深而沉之至腎肝之部得氣引持之陽也秋冬寒必致一陽者初納針淺而浮之至心肺之部得氣推納之陰也下針之後或氣先針行或氣與針逢或針出而氣獨行或數刺乃知或髮針氣逆或數刺病益甚六十八陽盛之人其神易動其氣易往言語善疾臟氣有餘故神動而氣先針行陽多陰少之人多喜數怒陰陽之離合難故其神不能先行血氣滑利針入而氣出相逢也陰盛之人其神難動其氣難行陽氣沉而內藏故針已出氣乃隨其後而獨行也其又甚者多陰少陽其氣沉而難往故數刺乃知其氣逆與其數刺病益甚者非陰陽之氣使然此粗之所敗工之所失也五臟已傷針不可治六十九用針者觀察病人之態以知精神魂魄存亡得失之意五臟已傷針不可治也宜甘藥七十補陽則陰竭瀉陰則陽脫如是者可將以甘藥臟腑有病皆取其原七十一臍下腎間動氣人之生命也十二經之根本也故名曰原三焦者原氣之別使主通行三氣經歷於五臟六腑原者三焦之尊號也故所止輒為原五臟六腑之有病者皆取其原也十二原不同七十二針經論十二原與難經不同蓋以太淵太陵太衝太溪太白為五臟之原二五合為一十又膏之原出於鳩尾肓之原出於脖胦合為十二原主治五臟六腑之有病者也六腑所合七十三胃合於三里大腸合於巨虛上廉小腸合於巨虛下廉三焦合於委陽膀胱合於委中央膽合於陽陵泉六腑有病取此六合膺俞背俞七十四膺俞中膺背俞中背謂針入之度也五刺五應針方七十五淺納而疾髮針無及肌肉如拔毛狀以取皮氣肺之應也左右前後針之中脈為故以取經絡之血者心之應也左右雞足針於分肉之間者脾之應也直刺左右盡筋上以取筋痹慎無出血肝之應也直出直入深納之至骨所以上下摩骨以取骨痹腎之應也絡脈會者皆見於外刺甚血方七十六經脈者常不可見其虛實以氣口知之脈之見者皆絡脈也諸絡脈皆不能經大節之間必行絶道而出入復合於皮中其會皆見於外故諸刺絡脈者必刺其結上甚血者雖無血結急取之以瀉其邪出其血留之發為痹十五絡為病針方七十七手太陰之別名曰列缺起於腕上分間去腕一寸五分實則兌骨掌熱虛則欠呿音掐開口也小便遺數手少陰之別名曰通里在腕後一寸實則支膈虛則不能言手心主之別名曰內關去腕二寸出於兩筋之間實則心痛虛則煩心手太陽之別名曰支正上腕五寸實則筋弛肘廢虛則痂疥手陽明之別名曰偏歷去腕三寸實則齲齒耳聾虛則齒寒痹膈手少陽之別名曰外關去腕二寸實則肘攣虛則不收足太陽之別名曰飛揚去外踝七寸實則窒鼻頭背痛虛則鼻衄足少陽之別名曰光明去外踝五寸實則厥虛卒痿躄坐不能起足陽明之別名曰豐隆去外踝八寸氣逆則喉痹卒喑實則癲狂虛則足不收脛枯足太陰之別名曰公孫去本節後一寸厥氣上逆則霍亂實則腸中切痛虛則鼓脹足少陰之別名曰大鐘當踝後繞跟氣逆則煩悶實則癃閉虛則腰痛足厥陰之別名曰蠡溝去內踝上五寸氣逆則睪腫卒疝實則挺長熱虛則暴癢任脈之別名曰尾翳實則腹皮痛虛則搔癢督脈之別名曰長強實則脊強虛則頭重高搖脾之大絡名曰大包出淵液下三寸實則一身盡痛虛則百脈皆縱此脈若羅絡之血者皆取之凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也各取之於其所別刺寒熱方七十八刺寒熱者皆多血絡必間日而取之血盡乃止絡氣不足經氣有餘經氣不足絡氣有餘七十九絡氣不足經氣有餘者脈口熱滿而尺寒澀也秋冬為逆春夏為從治主病者經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生治法絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽調神針方八十心藏神神有餘則笑不休不足則憂有餘則瀉其小絡之血勿之深斥無中其大經神氣乃平不足則視其虛絡切而致之刺而利之無出其血無瀉其氣以通其經神氣乃平刺微奈何曰按摩勿釋著針勿斥移氣於不足神氣乃得復調氣針方八十一肺藏氣氣有餘則喘咳上氣不足則息利少氣有餘則瀉其經渠無傷其經無出其血無瀉其氣不足則補其經渠無出其氣刺微奈何曰按摩勿釋出針視之曰故將深之適人必革精氣自伏邪氣亂散氣泄腠理真氣乃相得調血針方八十二肝藏血血有餘則怒不足則恐有餘則刺其盛經出其血不足則視其虛經納針脈中久留之血至脈大疾出其針無令血泄刺留奈何曰視其血絡刺出其血無令惡血得入於經以成其疾調形針方八十三脾主肉形有餘則腹脹涇溲不利不足則四肢不用有餘則瀉其陽經不足則補其陽絡刺微奈何曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索調志針方八十四腎藏志志有餘則腹脹飧泄不足則厥有餘則瀉然谷血者不足則補其復溜刺未並奈何曰即取之無傷其經以去其邪乃能立虛臟腑脹論八十五營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹脹家針不陷肓則氣不行八十六治脹之方無問虛實工在疾瀉近者一下遠者三下三刺不下者不中氣穴則氣內閉針不陷肓則氣不行徒中於肉則胃氣亂當瀉不瀉氣故不下必更其道氣下乃止必審其脈當瀉則瀉當補則補如鼓應桴惡有不下者乎刺頭痛方八十七病在頭頭疾痛為針之刺至骨病已止無傷骨肉及皮皮者道也陰刺入一旁四處治寒熱治咳針方八十八十二經皆有咳治臟咳者治其俞治腑咳者治其合瘧疾為四末束及取血者八十九瘧之且發也陰陽之且移也必從四末始陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之孫絡盛堅而血者皆取之此真往而未得並者也治痿針方九十痿病治之各補其滎而通其俞調其虛實和其逆順則筋脈骨各以其時受氣而病已矣痿厥為四末束九十一痿厥為四末束悶乃疾解之日二不仁者十日而知無休病已止八虛受病發拘攣九十二肺心有病其氣留於兩腋肝有病其氣留於兩肘脾有病其氣留於兩髀腎有病其氣留於兩膕凡此八虛者機關之室真氣之所過血絡之所由八邪惡血因而得留留則傷筋骨機關不得屈伸故拘攣痹聚臟腑針方九十三五臟有俞六腑有合循脈之分各有所發各隨其過則病瘳也筋痹針方九十四病在筋筋攣骨痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨也筋炅病已止骨痹針方九十五病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹深刺無傷脈肉為故其道大分小分骨熱病已止守筋守骨九十六能屈而不能伸者病在筋能伸而不能屈者病在骨在筋守筋在骨守骨恢筋摩骨九十七筋痹者恢其筋骨痹者摩其骨肌痹針方九十八病在肌肌膚盡痛名曰肌痹得之傷於寒濕刺大分小分多髮針而深之諸分盡熱病已止無傷筋骨筋骨傷癰發若變三痹九十九風寒濕三氣合而為痹風氣勝者為走痹寒氣勝者為痛痹濕氣勝者為著痹痹痛針有先後一百其痛從上下者先刺其下以通之後刺其上以脫之其痛從下上者先刺其上以通之後刺其下以脫之三刺一百一刺營者出血刺衛者出氣刺寒痹者內熱寒痹熱痹一百二邪氣留於筋骨之間寒多則筋攣骨痛熱多則筋馳骨消肉爍䐃破毛直而敗痛止針方一百三痛雖已止必刺其處勿令復起久痹不去出血一百四久痹不去身者視其血絡盡去其血經筋寒急用燔針一百五隨經而行皆有小筋謂之經筋經筋為病寒則反折筋急熱則筋緩不收陽急則反折陰急則俯不伸燔針者治寒急也熱則筋縱不收無用燔針燔針劫刺一百六燔針劫刺治寒痹腫痛攣急反折轉筋前後相引不可屈伸以知為數以痛為腧此病生於外者也病生於內者治以尉引飲藥筋折紐絶發而數甚者死不治筋引筋縱一百七傷於寒則筋引而陰縮入傷於熱則筋緩而陰縱挺不收傷於寒者治在燔針劫刺傷於熱者治在行水清陰器病在筋一百八病在筋燔針劫刺其下及與急者病在骨一百九病在骨粹針藥尉病不知所痛一百一十病不知所痛兩蹻為上繆刺一百一十一身形有痛九候莫病則繆刺之繆刺者左病刺右右病刺左胸腹病刺四肢繆其處也所以然者絡病而經不病故也巨刺一百一十二病在於左而右脈病者則巨刺之巨刺者刺大經也微刺一百一十三按摩勿釋著針勿斥曰故將深之適人必革謂之微刺微刺者病邪微淺之刺也分刺一百一十四分刺者刺分肉之間不傷大經也針戒一百一十五下針貴遲太急傷血出針貴緩太急傷氣救失針方一百一十六五臟之氣已絶於內用針者反實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五臟之氣已絶於外用針者反實其內是謂逆厥逆厥必死其死也躁治之者反取四末刺之六經氣血不同一百一十七陽明多血多氣太陽多血少氣少陽多氣少血太陰多血少氣厥陰多血少氣少陰多氣少血故刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出血惡氣刺厥陰出血惡氣刺少陰出氣惡血也針灸各有所宜一百一十八陽邪宜針陰邪宜灸風為陽邪善行數變施以針治其功為易寒濕陰邪陷脈凝澀必施艾火其功乃全結絡堅緊火之所治一百一十九陰陽皆虛火自當之針所不為灸之為宜結絡堅緊火之所治寒厥先尉後針一百二十善行水者不能往冰善穿地者不能鑿凍善用針者不能取四逆血脈凝結堅摶不往來亦不可即柔故行水者必待天溫冰釋穿地者必待凍解人脈猶是治厥者必先尉火以調和其經掌與腋肘與腳項與脊以調其氣大道以通血氣乃行後視其病脈淖澤者刺而平之堅緊者破而決之氣下乃止火調針方一百二十一寒厥在足宗氣不下脈中之血凝而留止弗之火調針弗能取陷下則灸一百二十二陷下則灸之陷下者血結於中中有著血血寒故宜灸火補火瀉一百二十三五臟俞在背者灸之則可刺之則不可氣盛則瀉之虛則補之以火補之毋吹其火須自滅了以火瀉者疾吹其火拊其艾須其火滅也灸寒熱二十九穴一百二十四灸寒熱之法先灸項大椎以年為壯數次灸橛骨以年為壯數視背俞陷者灸之舉臂肩上陷者灸之兩季脅之間灸之外踝上絶骨之端灸之足小指次指間灸之腨下陷脈灸之外踝後灸之缺盆骨上切之堅痛如筋者灸之膺中陷骨間灸之掌束骨下灸之臍下關元三寸灸之毛際動脈灸之膝下三寸分間灸之足陽明跗上動脈灸之巔上一灸之凡當灸二十九處傷食灸之不已者必視其經之過於陽者數刺其俞而藥之灸瘡不發一百二十五欲令灸發者灸履革扁尉之三日即發諸病在內取八會一百二十六腑會太倉臟會季脅筋會陽陵泉髓會絶骨血會膈俞骨會大杼脈會太淵氣會膻中諸病在內者取其會之氣穴也絶骨當作枕骨熱病氣穴一百二十七三椎下間主胸中熱四椎下間主膈中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱熱病宜寒一百二十八諸治熱病者以飲之寒水乃刺之必寒衣之居止寒處身寒而止也待時一百二十九營未交曰今且得汗待時而已止汗針方一百三十取陰而汗出甚者止之陽取陽而汗出甚者止之陰又方一百三十一熱病瀉之則熱去補之則汗出汗出太甚者取內踝上橫脈以止之熱病五十九刺一百三十二頭上五行行五中行五穴上星囟會前頂百會後頂次兩旁五穴五處承光通天絡卻玉枕又次兩旁五穴臨泣目窗正營承臨腦空五五合二十五穴者以越諸陽之熱逆也大杼風門缺盆膺俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也魄戶神堂魂門意舍志室此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也熱病九不針一百三十三一曰汗不出大顴發赤者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔血者死六曰舌本爛熱不已者死七曰咳而衄汗出出不至足者死八曰髓熱者死九曰熱而痙者死痙謂腰反折瘛瘲齒噤齦也水俞五十七穴灸之所宜一百三十四少陰主腎腎主水腎者胃之關關門不利故聚水而從其類上下溢於皮膚故為胕腫胕腫者聚水而生病也腎汗逢於風外不得越於皮膚客於玄府行於皮里亦為胕腫主此者五十七穴尻上五行中行五穴長強腰俞命門懸樞脊中次兩旁五穴白環俞中膂內俞膀胱俞小腸俞大腸俞又次兩旁五穴秩邊胞肓志室肓門胃倉五五合二十五穴此下焦腎氣之所輸也伏兔上各二行少陰所發者五穴橫骨大赫氣穴四滿中注陽明所發五穴氣街歸來水道大巨外陵左右合二十穴此腎之街也陰之結於踝上各一行行六大鐘照海復溜交信築賓陰谷左右合成十二穴此腎脈之下行也名曰太衝凡五十七穴積陰之所聚水之所客灸之宜也大風針方一百三十五病大風骨節重鬚眉墜刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針又方一百三十六數刺其腫上已刺氣至以鋭針針其處按出其惡氣腫盡乃止常食方食無食它食食戒一百三十七病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也天忌勿犯一百三十八凡刺察日之寒溫月之虛盛四時氣之浮沉參伍相合而調之勿犯其寒其虛其沉也六脫不刺一百三十九精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨痹屈伸不利色夭腦髓消胻酸耳數鳴血脫者色白夭然不澤脈脫者其脈空虛死生可治易治難治難已益甚不治一百四十形氣有餘脈氣不足死脈氣有餘形氣不足生形氣相得謂之可治脈弱以滑是有胃氣命曰易治形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時謂之不治病脈相左一百四十一病熱脈靜泄而脈大脫血而脈實病在中而脈實堅病在外而脈不實堅皆為難治六經終不刺一百四十二太陽終者戴眼反折瘛瘲其色黑絶汗乃出出則死矣少陽終者耳聾百節皆縱目環絶系絶系一日半死其死也色先青白乃死矣陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷囊上縮而終矣察魚際一百四十三手魚際之脈多青胃中寒也多赤胃中熱也黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也望知一百四十四兩眉之間薄澤為風沖濁為痹在地為厥赤色出於兩顴大如拇指者病雖愈必卒死黑色出於顏大如拇指不病亦必卒死五色青黑色為痛黃赤為熱白為寒色澤為吉色堙為凶五色並見為寒熱夭壽當知一百四十五形充而皮膚緩者壽形充而皮膚急者夭形充而脈堅大者順形充而脈小弱者氣衰氣衰者危形充而顴不起者骨小骨小則夭形充肉䐃堅而有分者壽形充而肉無分理不堅者內脆內脆則夭此天之立形定氣臨病人決死生者所當知也牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也平人氣勝形者壽病而形肉脫氣勝形者死形勝氣者危面部主臟腑支局一百四十六見於庭者首面也眉間以上者咽喉也眉間以中者肺也次下者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也夾旁者腎也當腎者臍也面王以上者小腸也面王以下者膀胱字子處也顴者肩也後顴者臂也臂下者手也目內眥上者膺乳也夾繩而上者背也循牙車以下者股也中央者膝也膝下者胻也當胻以下者足也巨分者股里也巨屈者膝臏也此五臟六腑支局之部也五臟五色之見者皆出其部骨陷者必不免於病也其部色乘襲者病雖甚不死也面有內部有外部其色從外部走內部者其病從外走內其色從內部走外部者其病從內走外五色上行者病亦甚五色下行如雲霧之散者病方已諸色兼黃者生諸色失黃者死附七傳者死間臟者生説一百四十七難經心病傳肺肺病傳肝肝病傳脾脾病傳腎腎病傳心每句皆是七傳以天干配臟腑次而推之第七位是勝己賊邪故死心傳脾脾傳肺肺傳腎腎傳肝肝傳心每句皆是間臟亦以間一天干者為母子也母子有相生之義故云間臟者生自有難經以來傳注皆悖今特發之七傳者不治間臟者視氣血而調之附人有兩死而無兩生説一百四十八靈樞云人有兩死而無兩生此言何謂也蓋云二之為有兩不二為無兩人身氣血判而為二死之徒也陰根於陽陽根於陰合而不二生之徒也卷之四旁通集敘曰郡邑之醫以藥為政者九十其徒以針為政者百難一二然皆朝夕由之而不察其所以然者也今欲善與人同莫若因其所明以通之以藥明針亦一道也於是作旁通集針藥無二致一藥有汗有吐有下有溫有涼有補針亦能汗能吐能下能溫能涼能補今須頓悟得破針理藥理何物使之若此又何以更無二致方入妙境針藥兼有二藥有氣有味有厚有薄有升有降有陰有陽有入肝入心入脾入肺入腎之殊為木為火為土為金為水之異針有浮有沉有疾有徐有動有靜有進有退有刺皮刺脈刺肉刺筋刺骨之殊取井取滎取俞取經取合之異針藥二途理無二致針藥正治三用藥之道升降浮沉則順之寒熱溫涼則逆之治之正也用針之道正經自病則巨刺正經不病則繆刺亦治之正也針藥並因於病四藥有輕劑重劑平劑調劑因病而為之輕重也針有巨刺繆刺微刺分刺亦因病而為之淺深也針藥短長五藥類始於神農本經蓋三百六十五種延至於今時本草所載通計一千八百九十二種藥何繁也至於針則九者而已針何寡也然有窮年積歲飲藥無功者一遇針家施治危者立安臥者立起跛者立行是藥之多不如針之寡也然針不難瀉實而難補虛一遇尫羸非飲之甘藥不可是針之補不如藥之長也上工以神良自期必兩者通明而時出之始為全技兩不精良六古昔良工率針藥並神故名高一世末世持針者不知針用藥者不知藥不能不為之太息有如針家不明經之陰陽奇正往來逆順穴之八法五門四根三結法之補瀉迎隨疾徐進退吾不知其何以為針藥家不審六經所宜五臟所入與夫升降浮沉寒熱溫平良毒之性宣通補瀉輕重滑澀燥濕反正類從之理吾不知其何以為藥如是而欲治病病何賴焉上古用針曲盡其妙七病邪甚者主以重劑酌以大方病邪微者以平劑調之藥之正也八法每以四針為主以進退疾徐為輕重亦針之正也上古於輕邪小疾用針猶有曲盡之妙曰病在皮膚無常處者取以鑱針於病所鑱針者頭大末鋭令無深入而陽氣出也病在分肉間者取以圓針圓針者筒身圓末其鋒如卵以瀉肉分之氣令不得傷肌肉也病在脈少氣當補之以匙針匙針者身大末圓如黍米之鋭令可以按脈勿陷以致其氣使邪氣獨出針於井滎合俞也上古以此三針刺微邪小疾曲盡其妙者也學者潛心體念自然有得義與輕調緩淡之劑殊途共轍作用相符八藥有單方一藥而主一病也針有特刺一穴而主一病也用藥寒之而不寒則飲之寒水用針刺熱病者亦先飲以寒水用藥溫之而不熱則用烏附用針者亦有燔針灼艾針之與藥作用相符如此針藥治同九藥家熱者寒之寒者熱之實者瀉之虛者補之陷下者升之針家熱則疾之寒則留之實則迎之虛則隨之陷下則灸之針藥異途治則同也針藥自然之理十藥之升陽者皆汗沉陰者皆下甘溫者皆和苦者皆湧泄淡者皆滲利辛者皆散酸者皆收咸者皆潤自然之理也刺家補太陽陽明則汗瀉陽明太陰則下調少陽厥陰則和補陰維則湧逆瀉陰蹻則滲泄搖動皆散靜留皆收引而致之皆潤亦自然之理也針藥猶兵十一藥有小方不足以去病故立重方重方者二方三方合而一之也此猶合從連衡用衆之兵也針有特刺不足以去病故主群刺群刺者原別根結合而刺之也此猶守郊關嚴險隘窮搜大索之兵也針藥勿過十二藥有盡劑而病方去者盡劑可也有飲藥未半而病已者不必盡劑可也針有盡法而病方去者盡法可也有小施針法而病即已者不必盡法可也蓋藥之過劑針之過法皆足以損人也針藥再施十三用藥病已未久而復病者再投之藥用針病已未久而復病者再施之針戒實實虛虛十四傷寒例云桂枝下咽陽盛則斃承氣入胃陰盛乃亡用藥者之戒重實重虛也五臟之氣已絶於內用針者反實其外五臟之氣已絶於外用針者反實其內如此而死者醫殺之耳用針者之戒實實虛虛也救實實虛虛十五陽盛謬用桂枝者急救以黃連解毒陰盛謬用承氣者急救以附子理中五臟之氣絶於內用針者反實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五臟之氣絶於外用針者反實其內是謂重逆重逆必死其死也躁治之者反取四末刺之凡此救死之方急施則生緩之則死針藥之所同也針藥審氣十六用藥審氣辛熱辛溫辛涼氣之殊也氣類千端不出三品藥家必審而用之用針審氣經氣邪氣穀氣氣之殊也病態千端候氣施治不出此三者針家必審而調之針藥保元十七用藥以元氣為重不可損傷故峻厲之品不輕用恐傷元氣也用針亦以元神為重不可輕壞五臟之俞不刺恐傷元神也奉天時十八春宜吐夏宜汗秋宜下藥之奉天時也春亟治絡俞夏亟治經俞秋亟治六腑冬則閉藏用藥而少針石針之奉天時也修人事十九飲藥者必遠酒遠色去勞去怒去厚味所以修人事也已刺者必勿內勿醉勿勞勿怒勿飢勿飽亦所以修人事也針藥調劑二十藥有剛有柔剛劑佐之以柔柔劑佐之以剛剛柔相濟氣血兼調者藥之正也刺有陰有陽審其陰陽以別柔剛陽病治陰陰病治陽定其血氣各守其鄉血實者宜決之氣虛者宜掣引之皆氣血兼調之意也以氣為主二十一用藥以氣為主曰益氣曰正氣曰流氣曰清氣曰化氣曰降氣紛紛以氣名湯者氣能統血氣治而血亦治也用針者亦以氣為主曰候氣曰見氣曰引氣曰致氣曰行氣諄諄以氣立法者氣能運血氣和而血亦和也故胃氣絶者藥亦無功候氣不至者針亦無所用也針藥所長二十二敗血積於腸胃留於血室血病於內者也必攻而去之藥之所長針不得而先之也敗血畜於經隧結於諸絡血病於外者也必刺而去之針之所長藥不得而先之也里有敗血用藥者必佐以辛溫表有敗血用針者必佐以尉烙理一也敗血得寒則凝得熱則散故也六經八法二十三用藥治病必分六經者祖述仲景也知之者取效甚捷如能隨症體驗敬慎勿失則千人之傑也用針治病率由八法者祖述漢卿也奉之者立見神功又能隨證察理不落暗昧則萬夫之雄也主脾胃重升陽二十四東垣用藥以脾胃為主俗醫但知其補益中氣而不知其妙於升陽其用升柴羌防等諸風藥者升清陽之氣於地中也蓋天地之氣一升則萬物皆生天地之氣一降則萬物皆殂此其用升陽諸品深意也故升陽益胃升陽和中升陽除濕升陽散火升陽舉經升陽調經升陽益血無往而非升陽云者得升生之妙旨也刺家用針亦以脾胃為主而重於升陽曰下手處認水土作根基水腎也土脾胃也作根基亦為主也曰從陰引陽曰當補之時從衛取氣曰秋冬各致一陽曰陷下則灸之是皆升陽之旨先東垣而符者也針藥方宜二十五丹溪用藥多以滋陰制火去濕為主滋陰制火如二母二冬三黃四物龍薈虎潛補天益腎之類謂滋陰則火自降也去濕加二陳二妙四君五苓省風除濕之品皆其日用常施之劑非其偏也謂東南卑濕之區濕熱為病十居八九方之所宜也刺家用針亦有方宜經曰東方之域天地之所始生也其民食魚而嗜咸魚者使人熱中咸者勝血故其病皆為癰瘍其治宜砭石南方者天之所長養陽之所盛霧露之所聚也其民嗜酸而食腐故其病攣痹其治宜微針是皆地勢使然方之所宜一也明熱俞五十九穴二十六劉完素用藥以火熱立論其主通聖散一方以治風熱甚為周匝無間方內用防風麻黃以解表風熱之皮膚者得之由汗而泄用荊芥薄荷以清上風熱之在巔頂者得之由鼻而泄大黃芒硝通利藥也風熱之在腸胃者得之由後而泄滑石梔子水道藥也風熱之在決瀆者得之由溺而泄熱淫於膈肺胃受邪石膏桔梗清肺胃也而連翹黃芩又所以卻諸經之遊火熱傷於血陰臟失榮川芎歸芍益陰血也而甘草白朮又所以和胃氣而調中人知劉守真長於治熱如此而不知其得之素問熱病五十九刺者深也刺熱論曰頭上五行行五者以越諸陽之熱逆也大杼膺俞缺盆風門此八者以瀉胸中之熱也氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也上古刺熱病之方如此周悉劉守真立通聖散一方實與五十九刺爭美無亦私淑其旨而得之深乎不然何若符節之相契也明水俞五十七穴二十七內經水論云水病下為胕腫大腹上為喘呼不得臥者標本俱病後世用藥治之有主脾胃者則用健脾分水之品又審其為陰水者主行水溫經之品審其為陽水者主行水清熱之品此治水之正傳也正治不愈鮮不束手待斃矣內經治水五十七穴論曰腎俞五十七穴積陰之所聚水之所從出入也尻上五行行五者此腎俞水氣之所留也伏兔上列於少腹者各二行行五者此腎之街也踝上各一行行六者此腎脈之下行也名曰太衝凡五十七穴皆臟之陰絡水之所客也刺家群五十七刺而刺之則水出而經氣大泄亦必九十不救良工主以灼艾則陰水雖凝結猶得麗日東風宇宙暄和無不泰之物矣藥有炮炙針有作用二十八明醫治病必主官方方必君臣佐使藥必精良炮炙欲其入血則炮以酒其行痰則炮以薑欲其入肝則炮以醋欲其入腎則炮以鹽此一定之法也刺家定其經穴則官方也穴有陰陽配合則君臣佐使也穴得其正則精良也刺合於法則炮炙也故循捫以攝氣彈怒以致血爪下以取榮伸提以及衛皆作用之法也針之有作用猶藥之有炮炙也不知作用者用生藥之醫也穴失其正者藥未精良也不知陰陽配合者方之無君臣佐使也作用同方二十九動退空歇迎奪右皆瀉也猶方之青龍白虎陷胸承氣有瀉而無補也推納進搓隨濟左皆補也猶方之益氣養榮八珍十全有補而無瀉也訓義在標幽賦中針藥陰陽反佐三十仲景白通湯回陽之藥也以人尿豬膽汁與薑附同方者用之反佐與陰氣相求而成回陽之功也刺寒厥者二陽一陰亦此意也河間桂苓甘露飲治暑之劑也以桂心與三石四苓同方者用之反佐與陽氣相求而成清暑之功也刺熱厥者二陰一陽亦此意也針藥有序三十一張長沙治傷寒必先治其表然後治其里李明之治內傷必先化其滯然後補其中瘍醫治瘡毒必先去其腐然後生其新必先潰其膿然後補其氣若失其先後之宜不惟治之無功害且隨之矣刺家亦有先後之序陽先病者先刺其陽陰先病者先刺其陰失其先後之宜亦無功而有害慎之慎之針藥不治三十二善藥者必察病人形氣色脈而後用藥藥當病情而不驗者脾胃氣絶而藥不為之運化也善針者亦必察病人形氣色脈而後下針針當病情而無功者經氣敗絶而候之不至也均之不治之疾也針藥待時已病三十三藥有一劑知二劑已者新病也外感有餘之邪也有以歲月見功者虛邪也內生不足之疾也針之所長亦長於有餘之實邪耳至於臟氣不足亦必飲以甘藥待時而已可也不知醫三十四世人飲藥百劑不見寸功而猶飲藥不已者喻之飲藥者衆也有一人喻之針有神功必縮頸吐舌者十九此由知針者寡又耳目未嘗與神良之徒相習也以丹溪之賢不遠千里而訪東垣適東垣物故録東垣手集之書而歸但採其方藥辨論而盡棄其用針此猶學仲尼者得其一體以為至足耳或以大成之醫譽丹溪非惟不知丹溪抑亦不知醫也因病制宜三十五以藥取汗者必擁覆其身以藥主吐者必堅束其腹上體病者後食而藥下體病者先食而藥膚病者晝服骨病者夜服皆因病而制宜也針家刺熱病者如手探湯疾也刺寒清者如人不欲行留也刺虛者刺其去刺實者刺其來刺上關者呿不能欠刺下關者欠不能呿刺犢鼻者屈不能伸刺內關者伸不能屈病高而內者取之陰陵泉病高而外者取之陽陵泉陰有陽疾者取之下陵三里亦因病而制宜也針藥不可為三十六仲景不治兩感之傷寒非短於藥也醫和不驅二豎於膏肓非短於針也病在不可為即針藥神良亦無可恃也三仁不能以存殷二義不能以匡漢皆是物也針藥可為三十七盧扁刺維會而起虢太子之尸厥華他刮肢骨而療關壯穆之鏃毒針藥固神良而事機亦可為也藥審三因三十八言用藥治病必詳審病之三因三因者外因內因不內外因也風寒暑濕燥火六氣傷人為外因喜怒憂思悲恐驚七情致病為內因跌撲損傷瘤氣結核癰腫為不內外因用藥者必詳審何因為病而施治也針惟揆一三十九針惟揆一者不問風不問寒不問暑濕燥火七情內傷跌撲瘤核癰腫等因只問病在何經察其寒熱虛實而施針治在乎明陰陽順逆補瀉而已今以揆一之法明著於後示人以八法為宗如軌如型如章如程的鵠一途左右逢原無難起之疾矣揆八法一四十藥家有問病發藥者刺家問病施針亦其事也有如病人脊強反折奇經督脈為病也病人頭如破目似脫項如拔脊如僵腰似折髀不可以曲膕如結腨似裂足小指不用目黃淚出鼽血身熱足太陽膀胱經受病也病人陰緩而陽急奇經陽蹻為病也病人嗌痛頷腫不可回顧肩似拔臑肘似折耳聾目黃頰腫頸頷肩臑肘臂外後廉皆痛手小指不用手太陽小腸經受病也此四經受病不問風寒暑濕燥火雜揉相協揆之八法宜刺後溪申脈以後溪二穴手太陽所發通乎督脈申脈二穴足太陽所發通乎陽蹻四穴並刺上下交通四經之所過者無不去之疾吾嘗例之於麻黃桂枝葛根青龍信不虛矣揆八法二四十一有如病人腰腹縱溶溶如囊水之狀若坐水中奇經帶脈受病也病人口苦耳聾脅痛不能轉側寒熱往來善太息面微塵體無膏澤頭痛耳前後痛目鋭眥痛缺盆中腫痛腋下腫馬刀夾癭汗出振寒胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛足小指次指不用此足少陽膽經受病也病人溶溶不能自收持為病苦寒熱奇經陽維為病也病人耳聾渾渾焞焞嗌腫喉痹汗出目鋭眥痛頰痛目後肩臑肘臂皆痛手小指次指不用此手少陽三焦經受病也此四經受病不拘六氣雜揉協邪為患揆之八法宜刺臨泣外關以臨泣二穴足少陽所發通乎帶脈外關二穴手少陽所發通乎陽維四穴並刺表裡皆和四經之所屬者宜無留疾吾嘗例之三化雙解大小柴胡通聖溫膽諸方信非謬矣揆八法三四十二有如病人氣逆而裡急此奇經衝脈為病也病人舌本強痛食嘔不下胃脘痛腹脹善噫得後與氣則快然如衰身體皆重不能動搖煩心心下急痛便溏瘕泄水閉黃疸不能臥強立股膝內腫足大指不用此足太陰脾經受病也病人灑灑然振寒善伸數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶牖而處甚則欲升高而歌棄衣而走賁響腹脹狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹大腹水腫膝臏腫痛膺乳氣街股伏兔胻外廉足跗上皆痛足中指不用氣盛則身以前皆熱消穀善飢溺色黃不足則身以前皆寒栗寒則脹滿此足陽明胃經受病也病人悵然失志善心痛奇經陰維為病也病人手心熱臂肘攣急腋腫甚則胸脅支滿心中淡淡大動面赤目黃喜笑不休煩心心痛此手厥陰心主受病也此五經受病不拘六氣七情揆之八法宜刺公孫內關以公孫二穴足太陰所發通乎衝脈絡足陽明內關二穴手厥陰所發通乎陰維四穴並刺針氣一行之後三焦快然凡五經之病無不除治吾嘗例之瀉心涼膈大小陷胸調胃承氣諸方者以驗之者素也揆八法四四十三有如男子內結七疝女子帶下瘕聚皆奇經任脈為病也病人肺作脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀上氣喘渴煩心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色黃變卒遺失此手太陰肺經受病也病人陽緩而陰急奇經陰蹻為病也病人飢不欲食面如漆紫咳吐有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢氣不足則善恐心惕惕如人將捕之口苦舌乾咽腫上氣嗌痛煩心心痛黃疸腸癖脊股內後廉痛痿厥嗜臥足下熱而痛此足少陰受病也凡此四經受病不拘外感諸邪內傷六欲揆之八法宜刺列缺照海以列缺二穴手太陰所發通於任脈照海二穴足少陰所發通於陰蹻四穴並刺針氣一行之後四經所歷之處病無不去氣無不和吾嘗例之三黃二母犀薄甘桔諸方者以驗之者非一日也八法內訓四十四以上八法主治新病實邪陽邪下針宜瀉效亦立見有不應者加之循攝爪切反復搓捻提按病去而後出針久病虛邪陰邪下針宜補有不應者加以尉烙燔針灼艾可以收全功經曰盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之正此之謂八法外訓四十五按八法八穴者以其通乎奇經八脈也在手部不及陽明大腸經及少陰心經在足部不及厥陰肝經者非缺也列缺本絡手陽明心主猶之乎心又肝腎之邪同一治皆不及之及也附修金針賦東垣著內外傷辨救認證之謬也丹溪作局方發揮救用方之失也昆慮針之敝於末世久矣乃仿二賢之救失修金針賦如下方金針賦共二十四條一賦云手足三陽手走頭而頭走足手足三陰足走腹而胸走手逆之者為瀉為迎順之者為補為隨候氣議二男子之氣早在上而晚在下取之必明其理女子之氣早在下而晚在上用之貴及其時午前為早為陽午後為晚為陰男女上下平腰分之此亦無根之言不必拘此裁賦下針法三下針之法先須循攝孔穴以左手大指爪甲按而重切之次以右手食指彈二三十下令穴間赤起經所謂彈而怒之是也次令咳嗽一聲以口內溫針隨咳而下徐徐捻入初至皮部名曰天才少停進針刺至肉分名曰人才又停進針刺之筋骨之間名曰地才就當捻轉又停良久退針至人才之分待氣沉緊倒針朝病進退往來疾除左右因病而施針知四氣速效速氣遲效遲死生貴賤針下皆知賤者硬而貴者脆生者澀而死者虛氣之不至必死無疑淺深五法在淺則用淺法在深則用深賦傳補瀉議六賦云補瀉之法妙在呼吸手指男子者大指進前左轉呼之為補退後右轉吸之為瀉提針為熱插針為寒女子者大指退後右轉吸之為補進前左轉呼之為瀉插針為熱提針為寒左與右有異胸與背不同午前者如此午後者反之嗟夫補瀉之法經有隨濟迎奪推納動伸之論至善至當獨奈何男子者大指進前左轉為補退後右轉為瀉提針何以為熱插針何以為寒男女何以各異左右何以相殊胸背何以更別早暮何以背馳不知男女無二道左右無二理胸背無二因早暮無二法假令謬妄者曰人參補男而瀉女巴豆瀉左而補右芩連涼胸而熱背桂附朝溫而暮寒不知人亦信之乎針學不明何以異此賦傳左捻氣上右捻氣下議七賦云欲氣上行將針左捻欲氣下行將針右捻不知此法施之於左乎施之於右乎左右胸背男女早暮亦復相異乎借曰相異則與前法亂矣借曰無異則與前説悖矣起賦者於九原不知何以應我使氣八按之在前使氣在後按之在後使氣在前此妙補瀉九補者一退三飛真氣自歸瀉者一飛三退邪氣自避三飛三進氣也不足有餘十補則補其不足瀉則瀉其有餘有餘者為腫為痛曰實不足者為癢為麻曰虛通經接氣十一賦云關節阻澀氣不過者以龍虎龜鳳通經接氣之法驅而運之仍以循攝爪切無不應矣飛經走氣四法議十二賦云若夫過關過節催運經氣用飛經走氣之法一曰青龍擺尾如扶船舵不進不退一左一右慢慢撥動二曰白虎搖頭似手搖鈴進方退圓兼之左右搖而振之三曰蒼龜探穴如入土之象一進三退鑽剔四方四曰赤鳳迎源展翅之儀入針至地提針至天候針自搖復進其元上下左右四圍飛旋此四法之説不出素問搖大其道一句謂搖大孔穴之道今病邪出之易耳令謂用之飛經走氣謬矣蓋由搖泄孔穴經氣大虛為麻為癢隨經而見遂以為飛經走氣耳且經氣流行無一息之停特為病邪作實滯塞不通因而為患針家搖大其道泄去病邪通其滯塞稍覺麻酸或隨經而汗則經氣復通而四體康矣其實經何嘗飛氣何嘗走耶故謂之通經接氣則當謂之飛經走氣則愚其循攝爪切皆所以散沉痼之邪以病邪久留關節故以指循環其間按攝其上爪搔其經切掐其陷所以竭其匿伏之邪兵家搜山窮穴之技也出針十三出針之法病勢既退針氣微松病未退者針氣如根推之不動轉之不移皆為邪氣吸拔其針乃真氣未至不可出之出之其病即復再須補瀉停以待之直候微松方可出針豆許搖而停之補者吸之去疾其穴急捫瀉者呼之去徐其穴不閉故曰下針貴遲太急傷血出針貴緩太急傷氣八訣訓義十四一曰燒山火治頑麻冷痹先淺後深用九陽而三進三退慢提緊按熱至緊閉插針除寒之有準謂之燒山火者回陽之針方也其義何以明之蓋頑麻虛也冷痹寒也先淺後深推而納之補之類也九陽數也用九陽而三進三退針之搓捻者疾也疾則生熱喻之鑽燧急則生火也慢提緊按有鼓橐之象有如針下生熱則所鼓者如大塊之鼓薰風四大皆熱故曰燒山火然此施之氣血未敗之夫則宜如尫羸氣弱者不若投以甘劑繼之灼艾為萬全也次二十五二曰透天涼治肌熱骨蒸先深後淺用六陰而三出三入緊提慢按徐徐舉針退熱可憑皆細細搓之去病準繩謂之透天涼者生陰之針方也其義何以明之蓋肌熱陽勝也骨蒸陽邪乘虛至骨而蒸也先深後淺引而出之瀉之類也六陰數也用六陰而三出三入針之搓捻者徐也徐則生和喻之揚湯徐能止沸也緊提慢按亦鼓橐之象有如針下清和則所鼓者如大塊之鼓清風四大皆清故曰透天涼然必徐徐細細者欲和而不欲躁急也此施之外邪致病者尤驗若內生虛熱當必佐以益陰之劑為宜也次三十六三曰陽中隱陰先寒後熱淺而深之以九六之法則先補後瀉也陽中隱陰以法言也邪氣先並於里則先寒後並於表則後熱淺而深之由淺入深補之類也先九後六先補後瀉自釋其文也次四十七四曰陰中隱陽先熱後寒深而淺之以六九之方則先瀉後補也陰中隱陽以法言也邪氣並於表則先熱後並於里則後寒深而淺之由深出淺瀉之類也先六後九先瀉後補自解其義也並結十八補者直須熱至瀉者務待寒侵猶如搓線慢慢轉針法宜淺則用淺法宜深則用深二者不可兼而紊之也次五十九五曰子午搗臼水蠱膈氣落穴之後調氣均勻針行上下九入六出左右轉之千遭自平子午搗臼以法言也陽生於子陰生於午丹家用此二時搗和藥物於窩臼之中欲諸品調勻法以千杵為率水蠱膈氣陰陽愆和之所致也用針落穴之後調攝陰陽二氣使之均勻針之所行於上下者九入六出左右轉之千遭則氣血均調如子午搗臼調勻藥物於水蠱膈氣乎何有次六二十六日進氣之訣腰背肘膝痛渾身走注疼刺九分行九補臥針五七吸待氣上下亦可龍虎交戰左捻九而右捻六是亦住痛之針進氣進陽氣也走注疼痛陰邪壅塞為患也動者為陽故無問左與右九與六皆可以住痛移疼喻之風波摧蕩無問東與西雨與暘皆足以沖壅去塞也次七二十一七曰留氣之訣痃癖癥瘕刺七分用純陽然後乃直插針氣來深刺提針再停留氣留陽氣也痃癖癥瘕陰寒所凝故聚陽氣以勝之亦東風解凍之意次八二十二入曰抽添之訣癱瘓瘡癩取其要穴使九陽得氣提按搜尋大要運氣周遍扶針直插復向下納回陽倒陰丹家有抽添之説謂抽減其魄添增其神漸次成丹也此欲針氣回陽倒陰漸次就安因以名訣並結二十三指下玄微胸中活法一有未應反復再施久患偏枯通經接氣定息寸數議二十四賦云久患偏枯通經接氣之法已有定息寸數手足三陽上九而下十四過經四寸手足三陰上七而下十二過經五寸夫久患偏枯虛寒證也先宜以甘藥溫補然後施針通其經脈接續正氣病可使痊今言在手足三陽經上身者須候九息下身者須候十四息而經氣通行可過四寸在手足三陰經上身者須候七息下身者須候十二息可過經五寸然此説前古未有又無至理可根謂之杜撰可也蓋人稟陰陽太少之氣不等有針方落穴不待旋轉而氣即行病即去者有納針之後百搓千捻竭其手法而氣方行病方去者有出針之後經氣始行病始去者良以陰陽太少虛實不同故令功驗亦早暮不等靈樞之論昭昭也惡用杜撰穿鑿為
