能舒肋骨疼更有一穴曲池妙根尋源流要安愈加以風府功非小更有手臂拘攣急尺澤刺深去不仁腰背若患攣急風曲池一寸五分攻五痔原因熱血作承山須下病無蹤哮喘發來寢不得豐隆刺入三寸中狂言盜汗如見鬼惺惺間使下針美骨寒髓冷火來治靈道妙穴分明記瘧疾寒熱真可畏須知虛實可用意間使宜透支溝中大狂七壯合聖治連日頻頻發不休金門刺深可無憂瘧疾三日一發舉先寒後熱無他語寒多熱少取復溜熱多寒少用間使或患傷寒熱未休牙關風壅藥難投項強反張目直視金針用意列缺求傷寒四肢厥逆冷脈氣無時仔細審神奇妙穴真有一復溜踝上二寸省四肢陽厥脈氣浮須曉陰陽倒換求寒則須補絶骨是熱則絶骨瀉無憂脈若浮洪當瀉解沉細之時補便瘳百合傷寒最難醫妙法神針用意推口噤眼合藥不一合谷一針效甚奇狐惑傷寒滿口瘡須下黃連犀角湯蟲在臟腑食肌肉須要神針刺地倉傷寒腹痛蟲尋食吐蛔烏梅宜早嘗十日九日必定死中脘回還胃氣強傷寒痞氣結胸中兩目昏黃汗不通湧泉妙穴三分許速使周身汗自通傷寒痞結脅積痛期門刺後見深功當汁不汗合谷瀉自汗發黃復溜憑飛虎一穴通痞氣祛風引氣使安寧剛柔二痙最乖張口噤眼合面紅妝熱入血室心肺脹須刺期間乃少商中滿如何去得根陰包如刺效如神不論老幼依法用須教患者便抬身打撲傷損破傷風先於痛處下針攻後向承山立作效甄權留下意無窮腰腿疼痛十來春應針不了便惺惺大都引氣探根本服藥尋方枉費金腳膝經年痛不休內外踝邊用意求穴號崑崙並呂細應能消散即時瘳風痹痿厥如何治大杼曲泉真二美兩足兩脅痛難伸飛虎針之效甚靈腰軟如何去得根委中立見效如神通玄指要賦八十三必欲治病莫如用針巧運神機之妙工開聖理之深外取砭針能蠲邪而輔正中含水火善回陽而倒陰原夫絡別支殊經交錯綜或溝渠溪谷以岐異或山海丘陵而隙共斯流派以難揆在條綱而有統理繁而昧縱補瀉以何功法捷而明自迎隨而得用且如行步難移太衝最奇人中除脊膂之強痛神門去心性之呆癡風傷項急始求於風府頭暈目眩要覓於風池耳閉須聽會而治也眼痛則合谷以推之胸結身黃取湧泉而即可腦昏目赤瀉攢竹以便宜若兩肘之拘攣仗曲池而平掃牙齒痛呂細堪治頸項強承漿可保太白宣道於氣衝陰陵開通於水道腹䐜而脹奪內庭以休遲筋轉而疼瀉承山之在早大抵腳腕痛崑崙可解胻膝痛陰市能醫癇發癲狂憑後溪而料理瘧生寒熱仗間使以扶持期門罷胸滿血膨而可已勞宮退翻胃心痛以何疑稽夫大敦去七疝之偏疼王公謂此三里卻五勞之羸瘦華他言斯固知腕骨祛黃然谷瀉腎行間治膝腫腰疼尺澤去肘疼筋緊目昏不見二間宜取鼻窒無聞迎香可引肩井除兩胛風難任竹空療偏頭疼不忍咳嗽寒痰列缺堪憑眵䁾冷淚臨泣尤准髖骨將腿痛以祛殘腎俞把腰疼而瀉盡越人治尸厥於維會隨手而蘇文伯瀉死胎於三陰應針而隕所謂諸痛為實但麻曰虛實則自外而入也虛則自內而出歟是故濟母而裨其不足奪子而平其有餘觀二十七之經絡一一明辨據四百四之疾症件件皆除故得夭枉都無躋斯民於壽域幾微以判彰往古之玄書抑又聞心胸病求掌後之大陵肩背疼責肘前之三里冷痹腎俞取足陽明之土連臍腹痛瀉足少陰之水脊間心後者針中渚而立痊脅下肋邊者刺陽陵而即止頭項痛擬後溪以安然腰腳疼在委中而已矣夫用針之士於此理苟能明焉收祛邪之功尤在乎捻指靈光賦八十四黃帝岐伯針灸訣依他經里分明說三陰三陽十二經更有奇經分八脈靈光典注極幽深偏正頭疼瀉列缺睛明治眼肉睛攀耳聾氣痞聽會間兩鼻鼻翁衄針禾髎鼻窒不聞迎香間治氣上壅足三里天突宛中治喘痰心疼手顫針少海少澤應除心下寒兩足拘攣覓陰市五般腰痛委中安脾俞不動瀉丘墟復溜治腫如神醫犢鼻治療風邪疾住喘腳痛崑崙愈後跟痛在僕參求承山筋轉並灸痔足掌下去尋湧泉此法千金莫妄傳此穴多治婦人疾男蠱女孕兩病痊百會鳩尾治痢疾大小腸俞大小便氣海血海療五淋中脘下脘治腹堅傷寒過經期門愈氣刺兩乳求太淵大敦二穴主偏墜水溝間使治邪癲吐血定喘補尺澤地倉能止口流涎勞宮醫得身勞倦水腫水分灸即安五指不伸中渚取頰車可針患齒愈陰蹻陽蹻兩踝邊腳氣四穴先尋取陰陽陵泉亦主之陰蹻陽蹻與三里諸穴一般治腳氣在腰玄樞宜正取膏肓舊傳治百病灸得真切病須愈針灸一穴數病除學者尤宜仔細取悟得明師流注法頭目有病針四肢針有補瀉明呼吸穴應五行順四時悟得人身中造化此歌依舊是筌蹄流注指微賦八十五疾居榮衛扶救者針觀虛實與肥瘦辨四時之淺深取穴之法但分陰陽與溪谷迎隨逆順須曉血氣與升沉原夫指微論中積義成賦知本時之氣開說經絡之流注每披文而參其法篇篇之誓審尋復經以察其言字字之明論疑隱皆知實虛總附移疼住痛之有神針下獲安暴疾沉疴至危篤刺之勿誤詳夫陰日血引值陽氣流口溫針暖牢濡深求諸經十二作數絡脈十五為周陰俞六十臟主陽穴七二腑收刺陽經者可臥針而取奪血絡者先俾指而柔呼為迎而吸作補逆為奪而從何憂淹疾延患著灸之由躁煩藥餌而難拯必取八會癰腫奇經而畜邪須用砭瘳況乎甲膽乙肝丁心壬水生我者號母我生者名子春井夏滎乃邪在秋經冬合乃刺矣犯禁忌而病復用日衰而難已孫絡在於肉分血行出於支里悶昏針運經虛補絡必然疼實癢虛瀉子隨母要指想夫先賢迅效無出於針今人愈疾豈難於醫徐文伯瀉孕於苑內斯由甚速範九思療咽於江夏聞見言希大抵古今遺蹟後世皆師王纂針魅而立康獺從被出秋夫療鬼而獲效魂免傷悲既而祕旨幽微用針直訣竅齊於筋骨皮肉要察於強弱久新腑臟寒熱接氣通經裡外之絶羸盈必別勿刺大勞使人氣亂而神隨慎妄呼吸防他針昏而閉血又以常尋古義由有藏機遇高賢真趣則超然得悟逢達人示教則表我扶危男女氣脈分時合度母子時刻注穴須依今詳定療病之宜神針法式廣搜難素之祕文密辭深考諸家之肘函契先賢之妙臆稱滬江流之指微為後世學者之規准攔江賦八十六擔截之中法數何有擔有截起沉疴我今作此攔江賦何用三車五輻歌先將八法為定例流注之中分次第心胸之病內關擔臍下公孫用法攔頭部須還尋列缺痰涎壅塞及咽乾噤口喉風針照海二陵出血刻時安眼目之中諸疾苦更用臨泣使針擔後溪專治督脈病癲狂此法治還輕申脈能除寒與熱頭風偏正及心驚耳鳴鼻衄胸中滿好用金針此穴尋但遇癢麻虛即外如逢疼痛瀉而迎更有傷寒真妙訣頭疼身熱取陽經無汗更將合谷補復溜穴瀉好用針倘若汗多流不絶合谷補之效如神四日太陰宜細辨公孫照海一般行再用內關施截法七日期門可用針但治傷寒皆用瀉若知素問坦然明流注之中分造化常將水火土金平春夏井滎宜刺線秋冬經合便宜深天地四時同此數三才常用記心胸天地人部次第入仍調各部一般勻夫弱婦強亦有克婦弱夫強亦有刑皆在本經擔與截瀉南補北亦須明經絡明時知造化不得師傳枉用心不遇至人應不授天寶豈可付非人按定氣血病人呼重搓數十把針扶戰提搖起向上使氣自流行病自無馬丹陽天星十二穴歌八十七三里內庭穴曲池合谷接委中配承山太衝崑崙穴環跳及陽陵通里並列缺合擔用法擔合截用法截擔截常記取非人莫浪說三百六十穴不出十二訣此法少人知金鎖都開徹治病顯奇功有如湯潑雪學者細推尋神功無盡竭三里在膝下三寸兩筋間能通心腹脹善治胃中寒腸鳴並泄瀉腿脛膝腫酸傷寒羸瘦損氣臌及諸般年過三旬後針灸眼光明內庭次指外本屬足陽明能治四肢厥喜靜惡聞聲癮癮咽喉痛數缺及牙疼氣虛不能食針著便惺惺曲池拱手取屈肘骨邊求善治肘中痛偏風手不收挽弓開不得筋緩莫梳頭喉痹從欲死發熱更無休遍身風癬癩針著即時瘳合谷在虎口兩指岐骨間肩痛並面腫瘧病熱還寒齒齲鼻衄血口噤不開言針入五分後令人即便安委中曲膕里橫紋脈中央腰痛不能舉沉沉引脊梁痠疼筋莫展風痹發無常膝頭難伸屈針入即安康承山名魚腹腨陷分肉間善治腰疼痛痔疾大便難腳氣並膝腫輾轉戰疼酸霍亂轉筋急穴中刺便安太衝足大指節後二寸中動脈知生死能醫驚癇風咽喉腹心脹兩足不能動七疝偏墜腫眼目似云蒙亦能療腰痛針下有神功崑崙足外踝跟骨上邊尋轉筋腰尻痛暴喘滿衝心舉步行不得一動即呻吟若欲求安穩須於此穴針環跳在髀樞側臥屈足取腰折莫能伸冷風並濕痹腿胯痛連腨轉側重嗟吁若人針灸後頃刻痛消除陽陵泉膝下外廉一寸中膝重並麻木冷痹及偏風舉足不能起坐腿似衰翁針入六分止醫功妙不窮通里腕骨後一寸五分中欲言聲不出懊憹及怔忡實則四肢重頭腮面頰紅虛則不能食暴喑面無容毫針微微刺方信有神功列缺腕側上次指手交叉專療偏頭患偏風肘木麻痰涎頻壅上口噤不開牙若能明補瀉應手疾如拿四總穴歌八十八肚腹三里留腰痛委中求頭項尋列缺面口合谷收千金翼十三鬼穴歌八十九百邪癲狂所為病針有十三穴須認凡針之體先鬼宮次針鬼信無不應一一從頭次第針男從左起女從右一針人中為鬼宮左轉下針右轉出第二手大指甲下名曰鬼信刺三分第三足大指甲下名曰鬼壘入二分第四掌後大陵穴刺可五分為鬼心第五申脈為鬼路火針三下刺鋥鋥第六卻尋風府上入發一寸名鬼枕七取耳垂下五分名曰鬼床針要溫八取承漿名鬼市從左出右君須記九針間使鬼道上十針上星名鬼堂十一刺及陰下縫會陰之穴為鬼藏十二曲池名鬼臣火針仍要刺鋥鋥十三舌頭當舌中此穴須名是鬼封手足兩邊當對刺中行一穴只單通此是先師真口訣狂猖惡鬼走無蹤雜病十一條歌九十攢竹絲空主頭疼偏正皆宜向此針更去大都徐瀉動風池針刺三分深曲池合谷先針瀉永與除疴病不侵依此下針無不應管教隨手便安寧頭風頭痛與牙疼合谷三間兩穴尋更向大都針眼痛太淵穴內用針行牙疼三分針呂細齒疼依前指上明更推大部左之右交互相迎仔細尋聽會兼之與聽宮七分針瀉耳中聾耳門又瀉三分許更加七壯灸聽宮大腸經內將針瀉曲池合谷七分中醫者若能明此理針下之時便見功肩背並和肩膊疼曲池合谷七分深未愈尺澤加一寸更於三間次第行各入七分於穴內少風二府刺心經穴內淺深依法用當時蠲疾兩之經咽喉以下至於臍胃脘之中百病危心氣痛時胸結硬傷寒嘔噦悶涎隨列缺下針三分許三分針瀉到風池二足三間並三里中衝還刺五分依汗出難來刺腕骨五分針瀉要君知魚際經渠並通里一分針瀉汗淋漓足指三間及三里大指各刺五分宜汗至如淋通遍體有人明此是良醫四肢無力中邪風眼澀難開百病攻精神昏倦多不語風池合谷用針通兩手三間隨後瀉三里兼之與太衝各入五分於穴內迎隨得法有神功風池手足指諸間右瘓偏風左曰癱各刺五分隨後瀉更灸七壯便身安三里陰交行氣瀉一寸三分量病看每穴又加三七壯自然癱瘓即時安肘痛將針刺曲池經渠合谷亦相宜五分針刺於二穴瘧病纏身便得離未愈更加三間刺五分深刺莫憂疑又兼氣痛增寒熱間使行針莫用遲腿胯腰疼痞氣攻髖骨穴內七分窮更針風市兼三里一寸三分補瀉同又去陰交瀉一寸行間仍刺五分中剛柔進退隨呼吸去疾除疴捻指工肘膝疼時刺曲池進針一寸時相宜左病針右右針左依此三分瀉氣奇膝痛三寸針犢鼻三里陰交要七吹但能仔細尋其理劫病之功在片時崔氏灸骨蒸勞熱定取患門四花六穴法九十一先用細繩數條約三四尺以蠟油之勿令展縮以病人腳底貼肉量男取左足女取右足從足大拇指頭齊起從腳板中當腳跟向後引繩循腳肚貼肉直上至膝腕曲膕中大橫紋截斷次令病人解發分開兩邊令見頭縫自囟門平分至腦後乃平身正坐取前所截繩子一頭從鼻端齊引繩向上正循頭縫至腦後貼肉垂下循脊骨引繩向下至繩盡處當脊骨以墨點記此墨不是穴別以稻稈心令病人合口將稈心按於口上兩頭至吻卻勾起稈心中心至鼻端根下如此樣齊兩吻截斷將稈展直於先在脊中墨記處取中橫量勿令高下於稈心兩頭以墨點之此是灸穴名曰患門二穴初灸七壯纍灸至一百壯妙初只灸此二穴次令病人平身正坐稍縮臂膊取一繩繞項向前平結喉骨後平大杼骨俱以點記向前雙垂與鳩尾齊即截斷卻翻繩向後以繩原點結喉墨放大杼上大杼墨放結喉上垂脊中雙繩頭齊會處以墨點記此亦不是灸穴別取稈心令病人合口無得動笑橫量齊兩吻截斷還於背上墨記處折中橫量兩頭點之此是灸穴又將循脊直量上下點之此是灸穴名曰四花穴初灸七壯纍灸至百壯逮瘡愈疾未愈依前法復灸故云纍灸至百壯但當脊骨上兩穴切宜少灸凡一次只可灸三五壯多灸恐人局脊凡灸此六穴亦要灸足三里以瀉火氣為妙若婦人纏帛裹足以至短小所取第一次患門穴難以准取但取右手肩髃穴貼肉量至中指為盡亦可不若只取膏肓穴灸之其穴備載於後千金方論取膏肓腧穴法九十二膏肓腧穴無所不治主羸瘦虛損夢中失精上氣咳逆狂惑失志取穴之法令人正坐屈脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得搖動從胛骨上角摸索至胛骨下頭其間當在四肋五肋之間去中行各開三寸依胛骨之裡肋間深處是穴去胛骨容側指許摩膂肉之表筋骨空處按之但覺牽引胸部灸兩胛中各一穴至六百壯多至千壯當覺氣下礱礱然如流水狀亦當有所下出若無停痰宿疾則無所下也若病人已困不能正坐當令側臥挽一臂令前求穴灸之也求穴大較以右手從左肩上拄指頭表所不及者是也左手亦然乃以前法灸之若不能但正坐常伸兩臂亦可伏衣袱上伸兩臂令人挽兩胛骨使相離不爾胛骨遮穴不可得也所伏衣袱當令大小常定不然則失其穴此灸訖後令人陽氣康盛當消息以自補養使身體平復論言昔秦緩不救晉侯之疾以在膏之下肓之上針藥所不及即此穴也孫真人笑其拙不能求得此穴所以宿疴難遣若能用心何憚不得灸之無疾不愈矣今明白備載於此學者仔細詳審依法取之隔蒜灸癰毒法九十三法用大頭獨蒜本草名葫薄切如小錢大亦如錢厚以蒜錢貼於疽頂尖上以熟艾炷安於蒜錢上灸之三壯一易蒜錢若灸時疼痛要灸至不痛初灸時不痛要灸至痛然後止大概以百壯為準用大蒜取其毒有力多用艾炷取其火力通透如法灸之瘡一發膿潰繼以神異膏貼之即日而安一能使瘡不開大二內肉不壞三瘡口易合一舉而三得之然人未知之而多遲疑不決至二日之後疽大如指毒氣開散病者不能堪火不可著艾矣可不預知之乎但頭上見疽或項以上見疽則不可用此法灸反增其疾兵部手集同
