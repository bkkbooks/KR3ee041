body:
  text: 卷之六兼羅集敘曰針道博矣大賢識其大者小賢識其小者故小言雖卑近而亦高遠之階梯何可無也惟是作兼羅集玉龍歌共七十八條一歌曰玉龍之歌世罕得穴共一百零二十研精心手妙如仙但恐時人自差忒中風不語二中風不語最難醫頂門髮際亦堪施更向百會明補瀉即時蘇醒免災危頂門即囟會穴在上星後一寸可灸七壯瀉之中風不省先瀉後補中風不語單瀉髮際當是上星穴百會穴在頂中央取法前以眉心間印堂穴量起後以髮際量止折中是穴針入豆許中風先補後瀉瀉多補少頭風平瀉可灸七壯宜瀉無補鼻流濁涕三鼻流濁涕名鼻淵先補後瀉疾可痊若是頭風並眼痛上星穴內刺無偏上星穴在督脈直鼻入髮際一寸有一取法以掌後橫紋當鼻尖中指盡處是穴針入三分可灸七壯鼻流清涕者單補流濁涕者單瀉不聞香臭者先補後瀉應穴太淵頭風嘔吐眼昏四頭風嘔吐眼昏花神庭一穴刺無差孩子驚風俱可治印堂針入艾交加神庭穴當鼻直上入髮際五分刺入三分先補後瀉瀉多補少可灸二七壯看虛實補瀉印堂穴當兩眉中間宛宛中是穴刺入一分先沿皮針透左攢竹補瀉後轉歸原穴退右攢竹依上補瀉可灸七壯亦治小兒驚風灸七壯大哭為效不哭者難治隨症補瀉急瀉慢補項痛牙疼五頸項強痛回顧難牙疼病作一般看先用承漿明補瀉後針風府疾皆安承漿穴在唇下宛宛中直針一分可灸七壯頸項強痛牙齒虛疼先瀉後補風府穴在項後中行入髮際一寸兩筋中央言語陷下針入一二分不可深深入令人啞禁灸隨病補瀉頭風一六頭風偏正最難醫絲竹金針亦可施沿皮向後透率谷一針兩穴世間稀絲竹穴在眉後入髮際陷中開口取穴沿皮向後透率谷禁灸偏正頭風單瀉眼目昏花先瀉後補率谷穴在耳上入髮際轉耳尖點到處是穴針入一分沿皮向前透絲竹空可灸七壯頭風二七偏正頭風有兩般痰飲之時仔細看若還痰飲風池泄痰飲非時合谷觀風池穴在耳後顳顬骨下大筋外廉入髮際五分橫一寸半透風府先補後瀉可灸七壯治偏正頭風痰飲合谷穴在兩手虎口岐骨間動脈應手直針入一寸半治證同前無痰可刺看虛實補瀉之灸七壯口眼歪斜八口眼歪斜最可嗟地倉妙穴連頰車喎左瀉右依師說喎右瀉左莫教差地倉穴在口吻旁四分斜口縫中針入一分沿皮斜向上透頰車頰車穴在耳前耳墜下三分刺入一分沿皮斜向下透地倉鼻塞不聞香臭九不聞香臭從何治迎香穴內最堪攻先補後瀉分明記金針未出氣先通迎香穴在鼻孔旁五分直縫中針入一分瀉多補少沿穴向上禁灸應穴上星穴也治鼻塞不聞香臭先補後瀉流濁涕單瀉流清涕單補耳聾瘰癧十耳聾氣閉實難眠翳風妙穴莫教偏兼治項上生瘰癧金針瀉動疾俱痊翳風穴在耳後陷中開口得穴針入五分宜瀉可灸七壯耳聾單瀉耳鳴單補一切瘰癧先瀉後補應穴合谷耳聾十一耳聾之症最難禁或痛或癢或蟬鳴紅腫生瘡須用瀉只從聽會用金針聽會穴在耳珠前陷中開口得穴口含尺方可下針刺入五分可灸二七壯耳疼紅腫單瀉蟬鳴先補後瀉痛瀉癢補耳中膿先瀉後補失音十二忽然失音語言難啞門一穴兩筋間刺穴莫深須是淺若刺深時疾少安啞門穴在項後入髮際五分兩筋陷中直針入三分莫深入令人啞禁灸失音先補後瀉頭傾注不語單瀉應穴人中眉間痛目昏十三眉間疼痛最難當攢竹沿皮刺不妨若是目昏同一治刺入頭維目自康攢竹穴在眉尖陷中針入一分沿皮透魚腰瀉多補少禁灸兩眉稜骨痛單瀉痰飲頭風同眼目昏花先瀉後補胬肉攀睛先補後瀉頭維穴在額角盡處入發陷中針入一分沿皮斜向下透懸顱穴兩額角疼瀉眩暈補可灸二七壯眼睛紅腫十四眼睛紅腫痛難熬怕日羞明徒自焦只刺睛明魚尾穴太陽出血疾俱消睛明穴在目內眥旁孔中平針入一寸單瀉略向鼻禁灸魚尾穴在眉外即瞳子髎尖是穴針入一分沿皮向內透魚腰羞明先補後瀉紅腫單瀉冷淚常流單補禁灸太陽穴在眉後即瞳子髎兩額紫脈上皆可出血用三稜針血貫目睛十五忽然眼痛血貫睛隱澀羞明最可憎若向太陽除毒血不用金針疾自平太陽穴出血法治上症眼大效用絹搭膊就頸一紐方可下針應穴睛明合谷兩眼火赤十六心火炎上兩眼紅好將蘆葉搐鼻中若還搐得毒血出目內清明顯妙功內迎香穴在鼻孔內用蘆葉或箬葉卷作筒搐鼻中出毒血大治眼紅應穴合谷脊膂強痛十七脊膂強痛瀉人中挫閃腰疼亦可攻委中也是腰疼穴任君取用要相逢人中穴在鼻柱下三分針入三分略向上治腰疼脊痛單瀉腎虛痛先瀉後補委中穴在兩膝後膕中橫紋內針入一寸單瀉禁灸四畔紫脈上皆可用三稜針出血絶妙腎虛腰痛十八腎虛腰痛最難當動止艱辛自失常腎俞二穴如尋得多加艾火疾無妨腎俞穴在背部十四椎下兩旁各一寸半有一取法與臍相平去中行各一寸五分是穴針入一分沿皮向外一寸五分宜補勿瀉灸可二七壯亦治遺精白濁諸虛百損應穴人中委中腿股風十九環跳獨治腿股風居髎二穴不落空更向委中去毒血登時移步顯神功環跳穴在髀樞中側臥伸下足屈上足取之針入三寸半補少瀉多灸可三七壯居髎穴在章門下八寸三分刺入八分灸隨症多寡委中取法見前禁灸灸則筋縮腿膝無力難以移步二十腿膝無力起身難穴法由尋風市間更灸陰市奇妙穴縱步能行任往還風市穴在膝外廉上七寸垂手點到處是穴針入二寸半先瀉後補多補少瀉灸三七壯陰市穴在膝上三寸伏兔穴下宛宛中針入五分灸三七壯偃僂二十一偃補曲池瀉人中僂補風池瀉絶骨僂者立伸偃立起補瀉須明切勿忽曲池二穴在手曲肘橫紋中以手橫胸取之針直入一寸五分灸三七壯人中一穴在鼻柱下三分口含水凸珠上是穴針入三分略向上些風池二穴在耳後大筋外廉入髮際五分橫一寸半透風府可灸七壯絶骨二穴在足外踝上三寸絶骨之端筋骨之間橫針二寸半可灸二七壯腿疼膝頭紅腫二十二髖骨能治腳腿疼膝頭紅腫痛難禁若針膝關並膝眼妙哉奇效顯神靈髖骨二穴在膝蓋骨上一寸半梁丘穴兩旁各一寸直針入五分可灸二七壯補瀉隨證一云禁灸膝關在蓋骨下犢鼻穴內廉陷中橫針透膝眼寒濕腳氣二十三寒濕腳氣最難熬先針三里及陰交更有一穴絶骨是才下針時腫便消三里穴在膝下三寸大骨外大筋內平針入一寸五分宜瀉灸可三十壯治症看虛實補瀉三陰交穴在內踝上三寸筋骨間絶骨穴在外踝上三寸筋骨之間橫針入二寸半灸可二七壯看病虛實補瀉足跟紅腫二十四足跟紅腫草鞋風崑崙二穴可加功再取太溪並申脈三穴同針病沒蹤崑崙穴在外踝後跟骨上陷中橫針透太溪穴可灸二七壯瀉多補少太溪穴在足內踝骨後陷中針透崑崙可灸二七壯看症虛實補瀉申脈穴在外踝骨節下赤白肉際橫針入五分禁灸又名陽蹻穴腳背疼二十五丘墟能治腳背疼行間一刺疾便輕再刺解溪商丘穴中間補瀉要分明丘墟穴在外踝微前三分陷中斜針入一寸可灸二七壯補瀉看症虛實寒熱如腳背紅腫出血妙行間穴在足虎口岐骨間直刺入五分可灸二七壯宜瀉不宜補如麻木亦瀉又治渾身蠱脹單瀉解溪穴在足腕上大筋外宛宛中直針入五分看虛實補瀉可灸二七壯治頭風宜先補後瀉商丘穴在足內踝微前三分針入五分可灸二七壯詳虛實補瀉行步艱難二十六行步艱難疾轉加太衝一穴實堪誇更取中封並三里須臾疾去若飛花太衝穴在足行間上二寸兩筋間陷中直針入五分禁灸腳背紅腫宜出血看虛實補瀉應穴崑崙中封穴在內踝前一寸仰足取大筋內宛宛中平刺入五分可灸二七壯定虛實補瀉又治腳腔紅腫生瘡單瀉三里取法見前鶴膝風二十七膝蓋紅腫鶴膝風陽陵二穴便可攻陰陵亦是奇妙穴可消紅腫即成功陽陵泉穴在膝外輔骨下一指陷中橫針透陰陵泉瀉多補少禁灸灸則膝攣不能開陰陵泉穴在膝臏骨下赤白肉際陷中與陽陵泉對橫針可相透詳證虛實補瀉可灸二七壯腕中無力二十八腕中無力握拘難舉止疼痛不能安若針腕骨真個妙此穴須當仔細看腕骨穴在手外側腕前起骨下陷者中針入三分可灸二七壯瀉之麻木無力宜補又治發黃五疸應穴曲池兩胛疼痛二十九兩胛疼痛氣攻胸肩井二穴極有功此穴元來真氣聚瀉多補少應針中肩井穴在肩上缺盆骨盡處用手按肩柱骨第三指到處是穴直針入二寸半此穴五臟真氣所聚不宜多補應穴支溝在手外腕後起骨上三寸直針透間使宜瀉可灸七壯肩胛風氣三十肩胛風氣連背疼胛縫二穴用針明五樞本治腰疼痛入穴分明疾頓輕胛縫穴在兩腋縫尖針入二寸可灸七壯詳症虛實補瀉又治腋下腫毒單瀉出血五樞穴在環跳上五寸帶脈下三寸直針入一寸半可灸二七壯詳症虛實補瀉兩肘拘攣三十一兩肘拘攣筋骨疼舉動艱難實可憎若苦屈伸針瀉動曲池尺澤可兼行曲池穴在手曲肘骨內橫紋尖以手橫胸取之針入一寸半灸三七壯兩手拘攣筋緊不開先瀉後補筋脈拘攣先補手握不伸單補尺澤穴在手肘腕中大筋外小筋內陷中手屈如弓方可針針入五分先補後瀉禁灸肩端紅腫三十二肩端紅腫痛難當風濕相搏氣血狂若是肩髃針中穴教君頓瘥永無妨肩髃穴在肩端兩骨間舉臂陷中針入二寸半灸二七壯肩背紅腫痛單瀉手背疼痛寒濕麻木單補應穴腕骨腹中氣塊三十三腹中氣塊去應難金針宜向內關看更向陰蹻針照海腹中疾病總皆安內關穴在掌後橫紋上二寸直針透外關先補後瀉禁灸治腹中脅肋疼痛先瀉胸中痞悶先補照海穴在內踝骨下赤白肉際橫針入寸半小便不通瀉之立通腹中疼痛三十四腹中疼痛最難當大陵外關仔細詳若是腹疼並痞結支溝奇妙穴非常大陵穴在掌後橫紋兩筋間直刺入三分可灸二七壯詳虛實補瀉外關穴在手腕後三寸直針透內關先補後瀉可灸二七壯支溝穴在腕後三寸兩骨中直針透間使脾寒三十五脾寒之症最可憐有寒有熱兩熬煎間使二穴針瀉動熱瀉寒補病俱安間使穴在掌後三寸兩筋間直針透支溝灸三七壯先寒後熱先補後瀉先熱後寒先瀉後補熱多單瀉寒多單補百勞後溪可灸二七壯九種心痛三十六九種心痛及脾疼上脘穴內可金針若還脾敗中脘補兩針神效免災侵上脘穴在腹中行巨闕下寸半直針入二寸半中脘穴在臍上四寸直針入二寸半此穴多補可灸五十壯痔漏三十七痔漏之疾亦可憎裡急後重最難禁或疼或癢或下血二白穴從掌後尋二白穴在掌後橫紋上四寸兩穴相對內穴在兩筋中間外穴在大筋外禁刺可灸二七壯應穴承山三焦熱壅三十八三焦邪熱壅三焦舌乾口苦不和調針刺關衝出毒血口生津液氣俱消關衝穴在小指次指之端去爪甲角如韭葉針入一分沿皮向後三分禁灸治三焦邪熱單瀉三焦受寒吐涎單補胸膈痞悶先補後瀉應穴支溝中風不省三十九中風之症或不省中衝一穴不須尋先補後瀉如不應再刺人中立便醒中衝穴在中指端針入一分沿皮向後三分灸三壯治中風不省先補後瀉暴啞先瀉後補心痛不省單瀉人中平針三分可灸三壯手背紅腫四十手背紅腫連腕疼液門穴內用金針更有一穴名中渚多瀉不補疾還輕液門穴在小指次指間陷者中針入一分沿皮向後透陽池穴宜單瀉及彈針出血為妙手臂冷風痛先補中渚穴在小指次指本節後陷者中刺入一分沿皮透腕骨穴宜瀉心病四十一少衝穴在手少陰