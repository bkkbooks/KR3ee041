body:
  text: 卷之二開蒙集敘曰針方神矣失其傳者未得其旨也余討論針方研窮今古讀標幽而後神識通貫遂揭八法五門並訓如下署曰開蒙集竇太師標幽賦吳注一宋北朝竇傑字漢卿今廣平府肥鄉縣人為金太師諡文貞善針嘗作此賦豫嘉之注為庭訓標榜也猶表章也針之為道玄微淵奧故曰幽拯救之法妙用者針上古神良之醫針為先務末世矢其傳故莫知其妙竇氏妙之其所得者深矣察歲時於天道歲有五運六氣時有主客加臨皆當察之以審病原定形氣於豫心形有厚薄肥瘦堅脆氣有長短怯壯虛實皆當定之於心以施針治春夏瘦而刺淺秋冬肥而刺深春夏氣浮於表故云瘦秋冬氣沉於裡故云肥不窮經絡陰陽多逢刺禁知病在經在絡為陰為陽則萬舉萬當不明經絡陰陽妄施針治則虛實失宜刺家所禁既論臟腑虛實須向經尋知臟腑何者為虛何者為實各有所主經穴宜尋其邪由而施針治原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後此略言經穴起止正經十二別絡走三百餘支正側偃伏氣穴有六百餘候此略言經穴之數手足三陽手走頭而頭走足手足三陰足走腹而胸走手手之三陽從手走至頭足之三陽從頭走至足手之三陰從臟走至手足之三陰從足走入腹要識迎隨須明逆順手足三陰三陽經絡傳注周流不息逆順不同針法有迎隨補瀉要識針法迎隨須明經脈逆順況夫陰陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位多者易實宜瀉其多少者易虛宜補其少先詳多少之宜次察應至之氣輕滑慢而未來沉澀緊而已至即至也量寒熱而留疾未至也據虛實而補引氣之至者若魚吞鉤餌之沉浮氣未至者似閒處幽堂之深邃氣至速而效速氣至遲而不治留者久留其針於孔穴疾者疾出其針也觀夫九針之法毫針最微七星上應衆穴主持本形金也有蠲邪扶正之道短長水也有決凝開滯之機定刺象木或斜或正口藏比火進陽補贏循捫可塞以象土實應五行而可知九針鑱針圓針匙針鋒針鈹針圓利針毫針長針大針也毫針第七取數於星故云應七星然是一寸六分包含妙理一寸六分毫針之度也上應七星備五行之象是包含妙理雖細擬於毫髮同貫多岐毫針為質甚微如下文平五臟調六腑遣八邪開四關所貫何多岐可平五臟之寒熱能調六腑之虛實補之則寒者溫瀉之則熱者涼氣至則虛者實氣散則實者虛拘攣閉塞遣八邪而去矣手足拘攣經隧閉塞八風之邪所為也宜用針汗之遣去八風之邪寒熱痹痛開四關而已之四關乃十二經別走之絡為陰陽表裡交通隘塞之地在於四末如往來之關隘故曰四關言為寒為熱為痹為痛皆四關閉塞所致宜開通四關而已之凡刺者使本神朝而後入既刺也使本神定而氣隨神不朝而勿刺神已定而可施本神主宰本經元神也前雲氣至此云神朝旨哉言矣難經所謂知為針者信其左乃本神朝穴也自非神良惡能道此定腳處取氣血為主意立定主意氣病調氣血病取血調氣用迎隨補瀉取血則出凝結之血而已蓋甚血不去留之於經則成病痹故也下手處認水土作根基水謂腎土謂脾腎水不虧者如樹之有根脾土不敗者如室之有基雖枝葉披離垣牆頽敗猶能建立假令腎虧脾敗是無根基不足以施針治也天地人三才也湧泉同璇璣百會湧泉二穴在足心屈足蜷指縫中與大指本節平等是穴主持三焦諸疾史記濟北王阿母患熱厥足下熱倉公刺足下立愈蓋此穴也璇璣一穴在天突下一寸陷中主胸膺諸疾百會一穴一名三陽五會在頂中央用草齊前後髮際量折當中是穴手足三陽督脈之會主諸陽百病史記虢太子尸厥扁鵲取三陽五會有間太子蘇蓋此穴也言此三穴名曰三才主上中下周身之疾上中下三部也大包與天樞地機大包二穴直腋下六寸為脾大絡布胸脅出九肋及季脅端別絡諸陰總統陰陽由脾灌五臟天樞二穴夾臍兩旁各二寸胃脈所發大腸募也地機二穴足太陰郤穴在膝下五寸言此穴皆脾胃所發主中宮氣血脾胃諸疾陽蹻陽維並督脈主肩背腰腿在表之病陰蹻陰維任沖帶去心腹脅肋在裡之疑此論八法孔穴分表裡也陽蹻謂申脈陽維謂外關督脈謂後溪陰蹻謂照海陰維謂內關任謂列缺沖謂公孫帶謂臨泣此八法孔穴也為針家一大法門詳在八法注中細論之陽蹻督脈主表陰蹻陰維任沖主裡陽維帶脈主半表半裡者也二陵二蹻二交以續而交五大二陵謂陰陵泉陽陵泉二蹻謂陰蹻陽蹻二交謂三陽交三陰交取此六穴者以之相續於足而交乎五體也兩間兩商兩井相依而列兩支兩間謂二間三間兩商謂少商商陽兩井謂天井肩井取此六穴者以之相依而列於兩手也足見取穴之法必有分寸先審其意次觀肉分或屈伸而得之或平直而安定在陽部筋骨之側陷下為真在陰分郤膕之間動脈相應取五穴用一穴而必端取三經用一經而可正頭部與肩部詳分督脈與任脈異定取穴之理大率詳此明標與本論刺深刺淺之宜病有標有本必明何者為標何者為本急則治其標緩則治其本又諸經氣血為病不同四時肥瘠淺深亦異病在氣分及形瘠者宜刺淺病在陰分及形肥者宜刺深住痛移疼取相交相貫之徑經脈直行者有左右相交絡脈別走者為表裡相貫針家住痛移疼取此交貫孔穴而已徑路之小而捷者指絡脈而言豈不聞臟腑病而求門海俞募之微門謂五門十二經之井滎俞經合也謂之門者以本經之氣由之出入也海謂四海髓海氣海血海水穀之海也謂之海者以其涵蓄者大也胃為水穀之海其輸上在氣街下在三里衝脈為十二經之海其輸上在大杼下出於巨虛之上下廉膻中為氣之海其輸上在於柱骨之上下前在於人迎腦為髓之海其輸上在於其蓋下在風府俞謂肺俞包絡俞心俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞謂之俞者臟腑之氣於此轉輸也募謂肺募中府心募巨闕肝募期門脾募章門腎募京門胃募中脘膽募日月大腸募天樞小腸募關元三焦募石門膀胱募中極謂之募者臟腑之氣於此召募也以上門海俞募之微凡臟腑病者宜求之經絡滯而求原別交會之道原謂十二經之原三焦之氣所遊行者也肺之原太淵包絡之原大陵肝之原太衝脾之原太白腎之原太溪心之原兌骨即神門也膽之原丘墟胃之原衝陽三焦之原陽池膀胱之原京骨大腸之原合谷小腸之原腕骨五臟無原以俞為原也別謂十二經別走之絡為陰陽表裡往來之關也手太陰別走陽明者為列缺手陽明別走太陰者為偏歷手少陰別走太陽者為通里手太陽別走少陰者為支正手厥別走少陽者為內關手少陽別走厥陰者為外關足太陽別走少陰者為飛揚足少陰別走太陽者為大鐘足陽明別走太陰者為豐隆足太陰別走陽明者為公孫又為漏谷足少陽別走厥陰者為光明足厥陰別走少陽者為蠡溝交謂兩脈交貫也左右相交如人中承漿前後相交如陽交陰交是也會者謂二經三經四經五經共會於一穴也今詳考之在頭部者神庭為督脈足太陽少陽之會禁不可刺本神為足少陽陽維之會頭維亦足少陽陽維之會禁不可灸百會為督脈足太陽所會風府為督脈陽維之會臨泣為足太陽少陽陽維之會目窗正營承臨腦空皆足少陽陽維之會率谷曲鬢浮白竅陰完骨皆足太陽少陽之會風池為足少陽陽維之會在面部者會厭為手少陽足陽明之會懸釐為手足少陽陽明之會陽白為足少陽陽維之會睛明為手足太陽足陽明之會瞳子髎為手足太陽之會承泣為陽蹻任脈足陽明之會顴髎為手少陽太陽之會迎香為手足陽明之會巨髎為陽蹻足陽明之會水溝為督脈手足陽明之會地倉為陽蹻手足陽明之會承漿為足陽明任脈之會在耳部前後者上關為手少陽足陽明之會下關為足陽明少陽之會禾髎聽宮為手足少陽手太陽之會角孫為手足少陽手陽明之會翳風為手足少陽之會在頸部者廉泉為陰維任脈之會在肩部者肩井為足少陽陽維之會巨骨為手陽明陽蹻之會天髎為手少陽陽維之會肩髃為手陽明陽蹻之會臑俞為手太陽陽維陽蹻之會秉風為手陽明太陽手足少陽之會在胸部者天突為陰維任脈之會在腋脅者天池為手厥陰足少陽之會在腹部者上脘為任脈足陽明手太陽之會中脘為手太陽少陽足陽明任脈之會下脘為足太陰任脈之會陰交為任脈衝脈之會關元中極為足三陰任脈之會曲骨為足厥陰任脈之會會陰為任脈別絡督脈衝脈之會幽門通谷陰都食關商曲肓俞中注四滿氣穴大赫橫骨皆衝脈足少陰之會期門為太陰厥陰陰維之會日月為足太陰少陽之會腹哀大橫皆為足太陰陰維之會府舍為足太陰陰維厥陰之會衝門為足太陰厥陰之會章門為足厥陰少陽之會維道為足少陽帶脈之會居髎為陽蹻足少陽之會在背部者大椎為足太陽督脈之會大杼為手足太陽之會風門為督脈足太陽之會附分為手足太陽之會在手部者手三陰獨魚際為諸陰絡之會手三陽獨臂臑為手陽明絡之會在足部者三陰交為足太陰少陰厥陰之會巨虛上廉為足陽明與大腸合巨虛下廉為足陽明與小腸合懸鐘為足三陽絡以上諸經原別交會之道凡經絡壅滯不得流通者皆當求也更窮四根三結依標本而刺無不痊諸經根於四末謂之四根結於面部胸部腹部謂之三結先病者為本後病者為標既窮根結標本則病邪之巢穴蹊徑皆在目矣治之有不痊者乎但用八法五門分主客而針無不效八法公孫內關臨泣外關後溪申脈列缺照海八穴之法五門井滎俞經合五者為經氣所出入若門戶焉故曰五門主客無定位但當經孔穴謂之主配合兼施孔穴謂之客八法故有主客五門有母子先後亦主客也例之湯液類有君臣佐使之制乎嘗見一注云八法者循而捫之切而散之推而按之彈而怒之抓而下之通而取之動而伸之推而納之謂之八法然此八句雖是經言乃術之粗者竇公所指八法開針家一大法門能統攝諸病簡易精絶豈若是之粗陋哉噫道之不明也久矣八脈始終連八會本是紀綱此復言八法八穴通於奇經八脈與之始終是為八會本是針家紀綱諸經變病不能出其範圍也嘗見一注云八會者血會膈俞氣會膻中脈會太淵筋會陽陵泉骨會大杼髓會絶骨臟會章門腑會中脘謂之八會言似是而實非有何始終連屬悖甚悖甚十二經絡十二原是為樞要言取十二經別走之絡及十二經真氣遊行之原是為樞機要法守約施博之道也一日取六十六穴之法方見幽微此子午流孔穴法也六陽經皆有井滎俞原經六六合三十六穴六陰經無原以俞代之五六合三十穴共成六十六穴法以十干分主其目甲日膽乙日肝丙日小腸丁日心戊日胃己日脾庚日大腸辛日肺壬日膀胱癸日腎三焦寄壬包絡寄癸陽日陽病取陽經陰日陰病取陰經各以所旺日時取穴開針次第相生周而後已方外謂之周天針法蓋以百刻而後已也其理玄奧故曰幽微一時取十二經之原始知要妙原者三焦之氣所遊行者也用針者以候氣為要妙候氣之法子時在手少陰原曰神門丑時在手太陰原曰太淵寅時在手少陽原曰陽池卯時在手陽明原曰合谷辰時在在手太陽原曰腕骨巳時在手厥陰原曰大陵午時在足少陰原曰太溪未時在足太陰原曰太白申時在足少陽原曰丘墟酉時在足陽明原曰衝陽戌時在足太陽原曰京骨亥時在足厥陰原曰太衝氣穴廣矣獨以此為生氣之原按時取刺知要妙乃爾原夫補瀉之法非呼吸而在手指呼吸之法古人補瀉恆用之補者呼納針候吸引針瀉者吸盡納針候呼引針此呼吸道也然所以為補瀉者不在呼吸之間而在乎手指動退推納也速效之功要交正而識本經交正者十二經別走交會正經之蹊徑絡脈是也本經受邪之經針家求此而刺之功效速矣交經繆刺左有病而右畔取交經者刺法與經脈左右相交也經云身有痛處而經不病者行繆刺法左病刺右右病刺左胸腹病刺四肢繆其處也所以然者絡病而經不病故也瀉絡遠針頭有病而腳上針凡繆刺之法皆是瀉絡瀉絡者遠病而針如頭有病而腳上針乃其道也巨刺與繆刺各異巨刺刺大經也痛在於左而右脈病者則巨刺之邪客於經左盛則右病右盛則左病亦有移易左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也繆刺解見上文微針與分刺相通微針者刺微邪之針方不傷大經者也經曰刺微奈何曰按摩勿釋著針勿斥移氣於不足神氣乃得復又曰我將深之適人必革精氣自伏皆刺微邪之針方也九針之內如鑱針匙針皆此妙義分刺者刺分肉之間不犯大經恐傷經氣也微針亦不犯大經不傷經氣二法雖殊義相通也觀部分而知經絡之虛實此下二句以脈言脈之部分兩寸有餘兩尺不足為經滿絡虛兩尺有餘兩寸不足為絡滿經虛蓋兩寸為手太陰之經兩尺為手太陰之絡故也周身經絡有餘不足並准於此視浮沉而辨臟腑之寒溫脈來浮大為陽為溫為病在腑脈來沉細為陰為寒為病在臟且夫先令針耀而慮針損次藏口內而欲針溫目無外視手如握虎心無內慕如待貴人言敬慎針事如此左手重而切按欲令氣散欲令本經真氣散去不至傷損右手輕而徐入不痛之因穴中陰血不傷故不痛空心恐怯直立側而多暈空心恐怯則神失其養直立倚側則體失所依暈之由也背目沉掐坐臥平而沒昏背目則神不驚沉掐則神內定坐臥平則四體有所倚著宜無昏悶推於十干十變知孔穴之開闔論其五行五臟察日時之興衰此以日時干支五行推臟腑孔穴之開闔乃候氣法也伏如橫弩應若發機氣未至而不應則針偃伏如橫置之弩扣之不發氣至而應則迎隨補瀉若發機焉疾莫如之矣陰交陽別而定血暈此經刺法也陰交臍下一寸之陰交足三陰任沖所會陽別即陽交一名別陽足少陽所發在外踝上七寸為陽維之郤斜屬三陽分肉間言二穴留針則任脈之虛陽不起少陽上升之氣歸原故可以定血暈陰蹻陰維而下胎衣此絡刺法也陰蹻謂照海足少陰腎脈所發陰維謂內關手厥陰心主所發經脈傳注以次相及足少陰注手厥陰一定之序也腎系胞胎刺照海則胞胎之氣瀉而不固刺內關則所謂迎而奪之也二穴瀉其經氣故下胎衣痹厥偏枯迎隨俾經絡接續痹厥偏枯乃風寒濕三者為邪留於經絡經絡不得接續而成病也用針者察病屬於何經須迎而奪之以去其邪隨而濟之以補其正則病去而氣血復矣氣血復其常寧復有痹厥偏枯呼崩漏帶下溫補使氣血依歸崩漏帶下乃氣血虛寒所致法宜溫針補之使氣血依歸則崩漏帶下之疾去矣靜以久留停針待之針出速則病多反復必久留其針待病邪去盡經氣平調然後出針此承上文而總結之也必准者取照海治喉中之閉塞此瀉絡遠針之法也照海腎經所發腎脈循喉嚨故主喉中閉塞端的處用大鐘治心內之呆癡大鐘足少陰絡別走太陽者少陰腎脈其支者絡心注胸中故主心內呆癡此亦遠刺法也大抵疼痛實瀉癢麻虛補諸疼痛者為邪氣實法宜瀉諸癢麻者為正氣虛法宜補體重節痛而俞居心下痞滿而井主陽俞木陰俞土木主筋筋根於節土主肉肉附於體故體重節痛而取之於俞陽井金陰井木金為肺肺病則賁郁木為肝木病則不得條達故心下痞滿而取之於井二句義本難經胸脹咽痛針太衝而必除太衝足厥陰肝脈所發肝脈上貫肝膈布脅肋循喉嚨之後故主胸脹咽痛此遠刺法也脾痛胃疼瀉公孫而立愈公孫足太陰脾脈所發別走陽明者其經屬脾絡胃故主脾痛胃疼亦遠刺法也胸滿腹痛刺內關內關手厥陰心主脈所發別走少陽者其經歷絡三焦故主胸腹痛亦遠刺法也脅疼肋痛針飛虎飛虎支溝也以虎口交叉中指飛到處是穴故曰飛虎手少陽脈氣所發少陽行於身側其經歷屬三焦故主脅疼肋痛亦遠刺法也筋攣骨痛而補魂門魂門足太陽經所發肝之部也肝主筋肝病而筋攣骨痛者宜取之此巨刺法也體熱勞嗽而泄魄戶魄戶足太陽經所發肺之部也肺主氣肺病而體熱勞嗽者宜取之亦巨刺法也頭風頭痛刺申脈於金門刺申脈於金門言刺申脈於金門之分也二穴相近皆足太陽脈所發足太陽之脈起目內眥上額交巔從巔至耳上角其直行者入絡腦還出別下項故主頭風頭痛此亦瀉絡遠針之法也眼癢眼疼瀉光明與地五光明地五會皆足少陽所發光明為足少陽絡別走厥陰者少陽之脈起於目鋭眥故主眼癢眼疼亦瀉絡遠針之法瀉陰郤止盜汗治小兒骨蒸陰郤手少陰郤也心血不足則陽偏勝而生內熱令大人盜汗小兒骨蒸故瀉陰郤以去內熱內熱除則盜汗骨蒸去矣亦瀉絡遠針之旨刺偏歷利小便醫大人水蠱偏歷手陽明絡別走太陰者其經屬於大腸大腸之間為闌門主泌別清濁故刺偏歷則大腸氣化而闌門通小便利而水蠱愈矣亦瀉絡遠針法也中風環跳而宜刺環跳足少陽脈氣所發少陽為木為風故刺中風者宜取之此巨刺法也虛損天樞而可取天樞足陽明脈氣所發陽明居中土也萬物之母五臟百骸莫不受其氣而母之故虛損者宜取天樞刺而灼之可也由是午前卯後太陽生而疾溫午前卯後三陽生旺之時用針者乘時取氣而推納之則疾溫矣離左酉南月魄虧而速冷離左酉南三陽氣減之際用針者乘時迎瀉而動退焉則速冷矣此以陰道右旋推之也循捫彈怒留吸母而堅長以指循環於孔穴之上謂之循即而摩之謂之捫以指重搏孔穴謂之彈孔穴赤起謂之怒靜置其針謂之留患人氣入謂之吸生我經穴謂之母肉著於針謂之堅閏息而永謂之長言用循捫彈怒留吸母諸法皆所以補虛虛得其補則肉堅而息長矣爪下伸提疾呼子而虛短以甲掐取孔穴謂之爪針隨而入謂之下引出豆許謂之伸針起肉隨謂之提急出其針謂之疾患人呵氣謂之呼所生經穴謂之子肉不著針謂之虛聲微氣劣謂之短言用爪下伸提疾呼子諸法皆所以瀉實實得其瀉則經虛而息短矣動退空歇迎奪右而瀉涼搖動其針謂之動引針少出謂之退不捫針痏謂之空不復用針謂之歇先邪取穴謂之迎大瀉其邪謂之奪右旋其針謂之右以上諸法皆所以瀉實而今熱者涼也推納進搓隨濟左而補暖持針力入謂之推刺入穴分謂之納漸次入深謂之進拈轉其針謂之搓後邪取穴謂之隨引氣益之謂之濟左旋其針謂之左以上諸法民以補虛而令寒者暖也慎之大凡危疾以脈不順而莫針病人色脈相生者吉色脈相剋者凶不可更施針治寒熱風陰飢飽醉勞而切忌寒熱風陰天氣之乖和也飢飽醉勞人氣之乖和也如是者皆不宜刺望不補而晦不瀉弦不奪而朔不濟人身營氣與太陰同其盈虧故當其盈而補是謂重實令人絡有留血當其虧而瀉是謂重虛令人益困精其心而窮其法無灼艾而壞其肌脈證為寒為積為氣虛胃弱者宜灼艾為風為火為熱為血虛者不宜灼艾正其理而求其原免投針而失其位病有理有原必正其理求其原何者宜針經何者宜針絡不然投針失位無益也避灸處而和四肢四十有六中心中肺中肝中脾中腎中膀胱中膽中膈跗上陰股面中客主人腦戶膝臏郤中膺中氣街太淵血缺盆乳房乳中雲門臍中少陰血鳩尾神庭顱息左角人迎足下中脈石門伏兔會陰脊髓承筋肘內陷然谷橫骨青靈五里眶上陷面承泣三陽絡關節液出腋脅內陷孕婦三陰交禁刺處而除六俞三十有二頭維承光腦戶下關殷門絲竹空人迎承泣脊中乳中氣街白環俞淵液經渠鳩尾四白陽關石門女子禁天府伏兔瘛脈啞門風府地五會素髎睛明迎香禾髎顴髎心俞氣衝陰市抑又聞高皇抱疾未瘥李氏刺巨闕而得蘇高皇金之高皇李氏今不能考巨闕心之募也主五臟氣相干卒心痛尸厥此巨刺也太子暴死為尸厥越人針維會而得醒太子虢太子越人盧醫秦越人也史稱虢太子病尸厥扁鵲為之刺三陽五會有太子蘇則百會穴也此云維會則非百會針經云臍中一名維會謂扁鵲當時取此穴耳蓋人之生嘗以此穴受母之氣刺家能取此穴調其厥逆使之沖和亦何嫌於刺哉臍中為是古之神良固未嘗以禁刺膠鼓也肩井曲池甄權刺臂痛而復射魯州刺史庫狄嶔患風痹甄以取此二穴刺之立能援弓引射亦經刺也懸鐘環跳華他刺躄足而立行懸鐘為絡刺環跳為經刺皆足少陽經所發足少陽為甲木故主風能治蹻躄足秋夫針腰俞而鬼免沉疴王纂針交俞而妖精立出醫文從巫以其通於鬼神也故治鬼出妖不為幽妄聖人不語術士傳焉余煮針方中主以五毒五毒者官桂川烏鬼臼狼毒自然銅也復用真人手符為降魔驅妖計也交俞非古穴說者以為人中三陰交近是刺肝俞與命門使瞽土視秋毫之末肝俞足太陽脈氣所發肝氣於此轉輸故曰肝俞目為肝之竅故刺之命門非督之命門亦非任之命門靈樞根結論曰命門者目也謂睛明穴此治外障法也治內障者宜刺睛中穴其法候於暑月先以涼水沃之以凝其血次用三稜針開穴繼以黃金毫針刺入撥去內障五年十年不見物者立能見物復明如舊其刺始於龍木禪師詳載大藏經中神妙神妙者也所以必用涼水者非水涼之則血不凝能令血貫瞳仁不能復治矣如水涼之不足為患亦同故於將出針時宜更以涼水沃之所必候暑月不足以勝涼水故也識之慎之刺睛中穴法附前神照集刺少陽與交別俾聾夫聽夏蚋之聲取少陽取其結於耳者翳風是也為手足少陽之會交於手少陽者為內關別於手少陽者為外關交於足少陽者為蠡溝別於足少陽者為光明內關與外關平等光明與蠡溝亦平等皆一針可取二穴者也手足少陽脈皆入耳故治耳聾此亦瀉絡遠針之法嗟夫去聖愈遠此道漸墜或不得意而散其學或愆其能而犯禁忌愚庸志淺難契於玄言至道淵深得之者有幾偶述斯言不敢示諸明達者焉庶幾乎童蒙之心啓八法針方直訣八句訓義二八法者八穴之法公孫內關臨泣外關後溪申脈列缺照海是也以八穴交會奇經八脈而分主乎表主乎里主於表裡之間也仲景妙於傷寒以其有六經之辨豫今以八法為妙者以其分主八脈而該乎十二經也創為針家一大法門求之古籍不稱作者何人或以為少室異人所傳理或然也蓋在竇氏之前已有其教每下針以四痏為主皆瀉絡遠針之法四面攻討之兵也刺家但主八法隨證加針不過五七孔穴無難去之疾矣訓如後方公孫合內關臨泣合外關後溪合申脈列缺合照海訣曰公孫衝脈胃心胸內關陰維會總同公孫二穴在足大指內側本節後一寸白肉際足太陰絡別走陽明者內關二穴在手臂內兩筋之間去掌後橫紋二寸手心主絡別走少陽者言公孫兩穴通乎奇經之衝脈內關二穴通乎奇經之陰維脈衝脈起止並足少陰循腹裡從肺出絡心注胸中故主胃與心胸諸疾陰維者維持腹內六陰之脈也手心主之脈起於胸中出屬心包絡下膈歷絡三焦故亦主胃與心胸諸疾而云會總同也取此四穴針氣一行之後三焦快然疾去內和例之湯液則瀉心涼膈大小陷胸調胃承氣諸方之力也臨泣膽經連帶脈陽維目鋭外關逢臨泣二穴在足小指次指本節後外側筋骨縫陷者中足少陽膽經之所注也外關二穴在腕後二寸兩骨間陷者中手少陽絡別走手心主者帶脈為奇經之一環身一周若束帶然故名帶脈陽維為奇經之一維持諸陽抵目外眥四穴者主手足少陽半表半裡諸疾針氣一行之後中外皆和營衛流暢例之湯液則三化雙解大小柴胡通聖溫膽諸方之力也後溪督脈內眥頸申脈陽蹻絡亦通後溪二穴在手小指本節後一寸橫紋尖上陷中拳而取之手太陽脈所注申脈二穴在足外踝下陷中容爪甲許言後溪通乎督脈申脈為陽蹻所生四穴主手足太陽二經諸疾針氣一行大汗如注則表邪盡去例之湯液則桂枝麻黃葛根大小青龍諸方之旨也列缺會任行肺系陰蹻照海膈喉嚨列缺二穴去腕一寸五分兩手交叉食指點到處是穴當筋骨罅中手太陰之絡別走陽明者照海二穴足少陰腎經所發在足內踝骨下一寸白肉際陰蹻脈所生言列缺二穴會乎任脈而行於肺系照海二穴為陰蹻脈所生少陰腎脈所發少陰腎脈循喉嚨系舌本取此四穴針氣一行之後肺膈安和喉嚨清利例之湯液則二冬二母犀薄甘桔諸方之旨也以上八法下針必以四穴為主或補手而瀉足或補足而瀉手左右亦復如是如兵之奇正相生或以正為奇或以奇為正針之善物也旁通集中揆八法四條宜互玩八法主治配合八條三公孫二穴主治二十七證必取內關二穴配合九種心痛痰膈涎悶臍腹痛脹脅肋疼痛産後血迷氣膈食不下泄瀉不止痃氣疼痛裡急後重傷寒結胸水膈酒痰滿悶嘔吐腹脅脹痛腸風下血脫肛不收氣膈食膈不下食積疼痛癖氣食癖酒癖兒枕痛血塊腹鳴血刺痛小兒瀉瀉腹痛胸中刺痛瘧疾心痛內關二穴主治二十五證必取公孫二穴配合中滿不快傷寒結胸心胸痞滿吐逆不定胸滿痰膈腹痛泄瀉滑腸酒痰膈痛米穀不化橫豎痃氣小兒脫肛九種心痛脅肋痛腸鳴婦人血刺痛積塊痛男子酒癖膈心下痞痛氣膈食不下腹肋脹痛腸風下血傷寒不解裡急後重食膈食不下痎瘧寒熱臨泣二穴主治二十五證必取外關二穴配合足跗腫痛手足麻手指顫掉赤眼冷淚咽喉腫痛手足攣急脅肋痛牙齒痛手足發熱解利傷寒腿胯痛腳膝腫痛四肢不遂頭痛腫頭頂腫浮風瘙癢身體腫身體麻頭目眩暈筋攣骨痛頰腮痛雷頭風眼目腫痛中風手足不舉耳聾外關二穴主治二十七證必取臨泣二穴配合肢節腫痛臂膊冷痛鼻衄手足發熱眉稜中痛指節痛不能屈伸手足疼痛産後惡風傷寒自汗頭風四肢不遂筋骨疼痛迎風淚出赤目疼痛腰背腫痛眼腫傷寒表熱手足麻痛無力破傷風手臂痛頭風掉眩痛頭項痛盜汗目翳隱澀産後身痛腰胯痛雷頭風後溪二穴主治二十四證必取申脈二穴配合手足攣急急足顫掉頭風痛傷寒不解盜汗不止中風不語牙齒痛癲癇吐沫腰背強痛筋骨痛咽喉閉塞頰腮腫痛傷寒項強痛膝脛腫痛手足麻眼赤腫傷寒頭痛表汗不出衝風淚下破傷風搐産後汗出惡風喉痹腳膝腿痛手麻痹申脈二穴主治二十五證必取後溪二穴配合腰背強痛肢節痛手足不遂傷寒頭痛身體腫滿頭面自汗癲癇目赤腫痛傷風自汗頭風癢痛眉稜痛雷頭風手臂痛臂冷産後自汗鼻衄破傷風肢節腫痛腿膝腫痛耳聾手足麻吹奶洗頭風手足攣産後惡風列缺二穴主治三十一證必取照海二穴配合寒痛泄瀉咽喉腫痛婦人血積敗血痛牙齒腫痛小腸氣撮痛死胎胎衣不下脅癖痛吐唾膿血咳嗽寒痰痃氣食噎不下臍腹撮痛心腹痛腸鳴下痢痔癢漏血心痛溫痢産後腰痛産後發狂産後不語米穀不化男子酒癖乳癰腫痛婦人血塊溫病不瘥吐逆不止小便下血小便不通大便閉塞大便下血胃腸痛病諸積為患照海二穴主治二十七證必取列缺二穴配合喉嚨閉塞小便冷痛小便淋澀不通膀胱氣痛婦人血暈胎衣不下臍腹痛小腹脹滿反胃吐食不納腸澼下血酒癖中滿不快泄瀉食不化腸鳴下痢腹痛難産婦人血積兒枕痛嘔吐酒積痃氣氣塊酒痹氣膈食勞黃足熱厥大便不通上法先刺主證之穴隨病左右上下所在取之仍循捫導引按法祛除如病未已必求配合孔穴兼施處治須要停針待氣上下相接快然無所苦而後出針五門針方說四五門者十二經井滎俞經合也臟腑之氣由之開闔若門戶焉故曰五門以十二經分主日時六十六穴周而復始循環無已故錯舉其義謂之子午流注當其時謂之開非其時謂之闔陽病用陽日陽時陰病用陰日陰時又有五行相生之義因其功行一晝夜而始備又謂之大周天針法以之祛邪無邪不去以之調氣無氣不調實隆古之針方也今以其成法述之如下六十六穴日時主治六膽主甲日甲戌時竅陰井膽丙子時前谷滎小腸戊寅時陷谷俞胃過本原丘墟庚辰時陽溪經大腸壬午時委中合膀胱甲申時氣合三焦液門水肝主乙日乙酉時大敦井肝丁亥時少府滎心己丑時太白俞脾過太衝辛卯時經渠經肺癸巳時陰谷合腎乙未時血納包絡勞宮火小腸主丙日丙申時少澤井小腸戊戌時內庭滎胃庚子時三間俞大腸過本原腕骨壬寅時崑崙經膀胱甲辰時陽陵泉合膽丙午時氣納三焦中渚水心主丁日丁未時少衝井心己酉時大都滎脾辛亥時太淵俞肺過神門癸丑時復溜經腎乙卯時曲泉合肝丁巳時血納包絡大陵土胃主戊日戊午時厲兌井胃庚申時二間滎大腸壬戌時束骨俞膀胱過本原衝陽甲子時陽輔經膽丙寅時小海合小腸戊辰時氣納三焦支溝火脾主己日己巳時隱白井脾辛未時魚際滎肺癸酉時太溪俞腎過太白乙亥時中封經肝丁丑時少海合心己卯時血納包絡間使金大腸主庚日庚辰時商陽井大腸壬午時通谷滎膀胱甲申時臨泣俞膽過本原合谷丙戌時陽谷經小腸戊子時三里合胃庚寅時氣納三焦天井土肺主辛日辛卯時少商井肺癸巳時然谷滎腎乙未時太衝俞肝過太淵丁酉時靈道經心己亥時陰陵泉合脾辛丑時血納包絡曲澤水膀胱主壬日壬寅時至陰井膀胱甲辰時俠溪滎膽丙午時後溪俞小腸過本原京骨戊申時解溪經胃庚戌時曲池合大腸壬子時氣納三焦關衝金腎主癸日癸丑時湧泉井腎乙卯時行間滎肝丁巳時神門俞心過太溪己未時商丘經脾辛酉時尺澤合肺癸亥時血納包絡中衝木上子午流注開闔之法乃治神之方也神治而氣血隨之矣蓋自靈樞本輸已發其端古今知者鮮矣惟竇公獨擅其術用以治神然不能無說焉既曰六十甲子循環治時奈何內缺甲午甲寅庚午壬辰壬申丙辰乙丑乙巳辛巳丁卯癸未癸卯豈此十二時中榮衛之氣不行耶又壬寅壬午庚辰丙午甲辰甲申乙未乙卯辛卯丁巳癸巳癸丑皆主兩穴豈一時之中兩穴並開耶言及於此非所以攻昔人之瑕實所以傳昔人之神又賦云六十六穴今但得六十五穴而缺陽池一穴無所安置豈陽池獨外於子午耶語曰民可使由之不可使知之前言治神之方亦妄泄爾難經五門主治七經言所出為井所流為滎所注為俞所行為經所入為合井主心下滿滎主一身熱俞主體重節痛經主喘咳寒熱合主逆氣而泄此五臟六腑井滎俞經合主病也今演其方如下假令得弦脈病人善潔面青善怒此膽病也若心下滿當刺竅陰井身熱刺俠溪滎體重節痛刺臨泣俞喘咳寒熱刺陽輔經逆氣而泄刺陽陵泉合又總取丘墟原得弦脈病人淋溲難轉筋四肢滿閉臍左有動氣此肝病也若心下滿當刺大敦井身熱刺行間滎體重節痛刺太衝俞喘咳寒熱刺中封經逆氣而泄刺曲泉合得浮洪脈病人面赤口乾喜笑此小腸病也若心下滿刺少澤井身熱刺前谷滎體重節痛刺後溪俞喘咳寒熱刺陽谷經逆氣而泄刺小海合又總刺腕骨原得浮洪脈病人煩心心痛掌中熱而噦臍上有動氣此心病也若心下滿刺少衝井身熱刺少府滎體重節痛刺神門俞喘咳寒熱刺靈道經逆氣而泄刺少海合得浮緩脈病人面黃善噫善思善味此胃病也若心下滿刺厲兌井身熱刺內庭滎體重節痛刺陷谷俞喘咳寒熱刺解溪經逆氣而泄刺三里合又總刺衝陽原得浮緩脈病人腹脹滿食不消體重節痛怠惰嗜臥四肢不收當臍有動氣按之牢若痛此脾病也若心下滿刺隱白井身熱刺大都滎體重節痛刺大白俞喘咳寒熱刺商丘經逆氣而泄刺陰陵泉合得浮脈病人面白善嚏悲愁不樂欲哭此大腸病也若心下滿刺商陽井身熱刺二間滎體重節痛刺三間俞喘嗽寒熱刺陽溪經逆氣而泄刺曲池合又總刺合谷原得浮脈病人喘嗽灑淅寒熱臍右有動氣按之牢若痛此肺病也若心下滿刺少商井身熱刺魚際滎體重節痛刺太淵俞喘嗽寒熱刺經渠經逆氣而泄刺尺澤合得沉遲脈病人面黑善恐缺此膀胱病也若心下滿刺至陰井身熱刺通谷滎體重節痛刺束骨俞喘嗽寒熱刺崑崙經逆氣而泄刺委中合又總刺京骨原得沉遲脈病人逆氣小腹急痛泄如下重足脛寒而逆此腎病也若心下滿刺湧泉井身熱刺然合滎體重節痛刺太溪俞喘嗽寒熱刺復溜經逆氣而泄刺陰谷合得洪大脈病人渾渾焞焞耳聾咽痹汗出此三焦病也若心下滿刺關衝井身熱刺液門滎體重節痛刺中渚俞喘嗽寒熱刺支溝經逆氣而泄刺天井合又總刺陽池原得洪大脈病人面赤目黃腋腫胸脅支滿手心熱心中動此心包絡病也若心下滿刺中衝井身熱刺勞營滎體重節痛刺大陵俞喘嗽寒熱刺間使經逆氣而泄刺曲澤合以上五門主治古針方也蓋以陽井金陰井木所以主治心下滿者金病則賁郁木病則不得條達故令心下滿也陽滎水陰滎火水病則陰虧火病則益熾故令身熱陽俞木陰俞土木主筋筋根於節土主肉肉附於體故令體重節痛陽經火陰經金火乘於金則病喘嗽金火相戰金勝則寒火勝則熱故主喘嗽寒熱陽合土陰合水水敗則火失其制而作氣逆土敗則水失其防而作洞泄故主氣逆而泄此五門主治之義也十二經為病補母瀉子成法八肺手太陰為病肺脹膨膨而喘嗽缺盆中痛則交兩手而瞀是為臂厥所生病咳嗽喘喝煩心胸滿臑臂內前廉痛掌中熱氣有餘則肩背痛汗出中風小便數而缺寸口大三倍於人迎虛則肩背痛寒少氣不足以息溺色變卒遺失無度寸口反小於人迎也補太淵為經為土為母瀉尺澤為合為水為子大腸手陽明為病齒痛頰腫是主津所生病目黃口乾鼽衄喉痹肩前臑痛大指次指不用氣有餘則當脈所過者熱腫人迎大三倍於寸口虛則寒栗人迎反小於寸口也補曲池為合為土為母瀉二間為滎為水為子胃足陽明為病灑灑然振寒善伸數缺顏黑惡人與火聞木聲則惕然而驚心動欲閉戶牖而處甚則欲登高而歌棄衣而走賁響腹脹是為骭厥是主血所生病狂瘧濕淫汗出鼽衄口喎唇疹喉痹大腹水腫膝臏腫痛循胸乳氣街股伏兔胻外廉足跗上皆痛中指不用氣有餘則身以前皆熱其有餘於胃則消穀善飢溺色黃人迎大三倍於寸口氣不足則身以前皆寒栗胃中寒則脹滿人迎反小於寸口也補解溪為經為火為母瀉厲兌為井為金為子脾足太陰為病舌本強食則嘔胃脘痛腹脹善噫得後出與氣則快然如衰身體皆重是主脾所生病舌本痛體不能動搖食不下煩心心下急痛寒瘧瘕溏泄水閉黃疸不能臥強立膝股內腫厥足大指不用盛者寸口大三倍於人迎虛者寸口小三倍於人迎也補大都為滎為火為母瀉商丘為經為金為子心手少陰為病嗌乾心痛渴而欲飲是為臂厥主心所生病目黃脅痛臑臂內後廉痛厥掌中熱盛者寸口大再倍於人迎虛者寸口反小於人迎也補少衝為井為木為母瀉神門為俞為土為子小腸手太陽為病嗌痛頷腫不可回顧肩似拔臑似折是主液所生病耳聾目黃頰腫頸頷肩臑肘臂外後廉痛盛者人迎大再倍於寸口虛者人迎反小於寸口也補後溪為俞為木為母瀉小海為合為土為子膀胱足太陽為病頭痛似脫項似拔脊痛腰似折髀不可以曲膕如結腨似裂是為踝厥是主筋所生病痔瘧狂癲頭囟頂痛目黃淚出鼽衄項背腰尻膕腨腳皆痛足小指不用盛者人迎大再倍於氣口虛者人迎反小於氣口也補至陰為井為金為母瀉束骨為俞為木為子腎足少陰為病飢不欲食面黑如炭色咳唾則有血喝喝而喘坐而欲起目䀮䀮然如無所見心如懸飢狀氣不足則善恐心惕然如人將捕之是謂骨厥是主腎所生病足熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸癖脊股內後廉痛痿厥嗜臥足下熱而痛盛者寸口大再倍於人迎虛者寸口反小於人迎也補復溜為經為金為母瀉湧泉為井為木為子心包絡手厥陰為病手心熱臂肘攣痛腋腫甚則胸脅支滿心淡淡大動面赤目黃善笑不休是主心包絡所生病煩心心痛掌中熱盛者寸口大一倍於人迎虛者寸口反小於人迎也補中衝為井為木為母瀉大陵為俞為土為子三焦手少陽為病耳聾渾渾焞焞咽腫喉痹是主氣所生病汁出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也補中渚為俞為木為母瀉天井為合為土為子膽足少陽為病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病頭角頷痛缺盆中腫痛腋下腫馬力夾癭汗出振寒寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也補俠溪為滎為水為母瀉陽輔為經為火為子肝足厥陰經為病腰痛不可俯仰丈夫㿉疝婦人小腹腫甚則嗌乾面塵脫色是主肝所生病胸滿嘔逆洞泄狐疝遺溺癃閉盛者寸口大一倍於人迎虛者寸口反小於人迎也補曲泉為合為水為母瀉行間為滎為火為子
