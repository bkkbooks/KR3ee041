脊臀股內廉痛胻酸洞泄小腹脹氣搶胸脅吐涎嗌乾咳血寒疝淋濁遺精墮損惡血留於腹中婦人無子陰挺陰癢月事不調初生小兒臍風口噤太溪二穴主咳逆咽腫心痛手足寒至節吐血喘息嘔吐善噎痰實口中如膠寒疝嗜臥溺黃消渴手足痿黃疸久瘧少腹痛大便難痃癖寒熱咳嗽不嗜食腹脅痛肌瘦女人經事不調血留凝結東垣曰治痿宜導濕熱不令濕土克腎水其穴在太溪照海二穴主嗌乾悲恐目如見星嘔吐腹痛久瘧暴疝淋瀝陰挺二便不通腹內一切隱疾潔古云癇病夜發灸陰蹻一方出血主噤口喉痹照海為八法之一以其合陰蹻會任脈於喉嚨也大鐘二穴主嘔吐胸滿喘息腹脹便難淋瀝腰脊強脛酸寒濕腳氣少氣嗜臥口中熱多寒欲閉戶而處舌乾食噎善驚恐不樂喉中鳴咳唾氣逆煩悶癃閉水泉二穴主心悶腹痛目䀮䀮不能遠視淋瀝陰挺腳氣踝骨痠痛偏墜木腎女人月事不來復溜二穴主腸澼腰脊內痛不得俯仰起坐舌卷不能言目昏腹脹十般水腫足痿脛寒胃熱蟲動涎出腸風血痔腸鳴腹脹泄利五淋骨蒸寒熱盜汗不止齲齒脈細微欲絶傷寒無汗補合谷穴泄此穴汗立出傷寒汗多補此穴瀉合谷穴汗立止交信二穴主氣淋㿉疝陰急引腨下痢赤白陰汗股樞內痛二便難小腹痛女人血崩陰挺帶下四肢淫濼築賓二穴主足腨痛七疝癲狂妄言罵詈嘔沫陰谷二穴治膝痛不能屈伸舌縱心煩癃閉股內廉痛阻痿陰部濕癢女人血崩腹脹男子如蠱女人不孕足陽明及股凡三十穴第三十二厲兌二穴治尸厥口噤狀如中惡面目腫喉痹齒痛鼻不利口喎唇疹頸腫腹脹不食胸乳氣街伏兔循引而痛膝胻足跗皆痛多驚好睡水腫熱病汗不出寒瘧癲狂黃疸消穀善飢溺黃內庭二穴治四肢厥逆腹脹數欠惡聞人聲振寒耳鳴咽痹頰腫齒痛鼻衄不止瘧疾不嗜食氣喘便血胃中停食冷積腳背紅腫傷寒手足厥冷汗不出赤白痢仲景曰傷寒欲作再經者針足陽明使不傳則愈此穴近之陷谷二穴主面目浮腫水脹善噫腸鳴腹痛熱病汗不出振寒瘧疾若腳背紅腫宜彈針出血衝陽二穴主偏風口眼喎斜齲齒跗腫寒熱腹脹不嗜食振寒而欠足緩狂妄棄衣而走身前痛解溪二穴治面風浮腫顏黑厥氣上衝腹大下重目眩頭痛面目赤熱眉攢煩心悲泣股膝脛腫癲疾霍亂瘛驚豐隆二穴主腿膝酸屈伸難痰飲壅盛喘不得寧頭風厥逆胸滿腹痛面浮四肢腫足清身寒脛枯喉痹不能語言二便不利登高而歌棄衣而走見鬼好笑實者瀉之虛者補之巨虛下廉二穴治小腹痛引睪丸耳前熱肩上熱飧泄足大指間痛足跟痛汗不出毛髮焦枯脫肉少食面無顏色胃熱不嗜飲食唇乾涎出不覺便血暴驚狂言喉痹胻骨腫風痹不遂婦人乳癰條口二穴主膝脛寒酸緩縱不收濕痹麻木足下熱不能久立腳痛胻腫轉筋巨虛上廉二穴治飧泄腹脅支滿夾臍痛飲食不化喘息不能動偏風足脛不仁屈伸難不能久立風水膝腫骨髓冷疼東垣曰脾胃虛弱濕痿汗泄妨食三里氣街出血不愈取上廉出血三里二穴治胃氣不足惡聞食臭喉痹膈咽不通心腹脹滿上支兩脅飲食不化腸鳴腹痛霍亂食氣水氣蠱脹痃癖四肢腫膝胻酸華他云主五勞七傷胸中瘀血女子乳癰外臺云凡人過三十以上能灸此穴則熱氣下眼目增明秦承祖云諸病皆治犢鼻二穴主膝中痛不仁難跪起治鶴膝風膝頭紅腫宜三稜針出血一方膝臏腫潰者不治不潰可治犢鼻堅硬不便攻先用洗尉微刺之愈梁丘二穴治鶴膝風膝頭紅腫冷痹伸屈不得筋緊難開一方云宜三稜針出血陰市二穴主腿腳寒如冰水痠疼無力左癱右瘓小腹脹滿消渴寒疝腳氣伏兔二穴主患風濕膝冷不溫風痹手足攣縮腹脹腳氣婦人八部諸疾東垣云癰疽死地有九伏兔居一髀關二穴主腰痛足麻木膝寒不仁股肉痿痹筋脈急痛小腹引喉痛足少陽及股並陽維四穴凡二十八穴第三十三竅陰二穴主頭痛心煩眼翳喉痹舌強口乾耳聾外眥痛脅痛咳逆寒熱汗不出腰髀膝胻踝跗紅腫轉筋痛痹小指次指不用癰疽夢魘俠溪二穴主胸脅支滿不可轉側痛無常處寒熱汗不出腳氣紅腫五指拘攣痛痹腳心煩熱目外眥赤目眩頰頷腫耳聾地五會二穴禁灸主腋痛內損吐血五指腫痛乳癰臨泣二穴主肩脅腰膝外踝節痛不能轉側枕骨合顱痛胸中滿缺盆腋下馬刀瘡瘍善齧頰灑淅振寒心痛周痹無常處厥逆氣喘不能行痎瘧四肢腫滿此穴大能出水導五臟氣又治患眼一切證候一方云渾身蠱脹可出水腳氣紅腫可出血放水針隨皮過一寸臨泣為八法之一以其連帶脈行目鋭而會陽蹻也丘墟二穴主胸脅滿痛如刺髀樞腿胻外踝皆痛踭風腳氣紅腫陽厥無力目生翳膜轉筋卒疝小腹堅寒瘧懸鐘二穴主風勞身重渾身百節痛左癱右瘓兩足不隨寒濕腳氣心腹脹滿胃中熱不嗜食虛勞咳逆泄注喉痹項強腸痔瘀血陰急鼻衄腦疽大小便澀煩滿狂易遍身生瘡水腫治傷寒發熱不退針曲池穴瀉此穴良陽輔二穴主一切中風癱瘓筋急拘攣腰溶溶如坐水中膝下膚腫百節痠疼實無所知諸節盡痛無常處脅腋腫痿喉痹馬刀夾咽口苦太息面塵善潔面青汗出振寒痎瘧頭角痛目鋭眥痛頷頸痛缺盆胸脅髀膝絶骨外踝皆痛膝下生瘡光明二穴主目青昏胬肉攀睛紅腫解㑊淫濼胻酸不能久立坐不能起熱病汗不出卒狂外丘二穴主頸項痛胸膈滿膚痛惡寒陽厥足外熱腰膝外踝皆痛足小指次指不用瘛犬傷毒不出發寒熱癲疾小兒龜胸陽交二穴主寒厥膝胻不收轉筋痹痛陰虛眩暈喉痹面腫胸脅腫滿驚狂疾走陽陵泉二穴主腰膝腫痛風痹不仁筋緊拘攣不得屈伸半身不遂足冷無血色陽關二穴禁灸主膝外廉痛不可屈伸風痹不仁中瀆二穴主風寒客於分肉間攻痛上下筋痹不仁環跳二穴主風寒濕痹半身不遂髀樞痛不得轉側仁壽官患腳氣偏風甄權奉敕針環跳陽陵泉陽輔巨虛下廉而能起行環跳穴痛恐生附骨疽足太陽及股並陽蹻六穴凡三十六穴第三十四至陰二穴主目翳鼻塞頭重小便不利失精轉筋寒瘧風寒從小指起脈痹上下帶胸脅痛無常處婦人産難通谷二穴主頭重目眩身熱驚衄留飲胸滿食不化失欠本節紅腫疼腫彈針出血腳背紅腫鋒針出血一方云五臟氣亂於頭宜深取通谷束骨此知根結者也束骨二穴主腰痛如折髀不可屈膕如結腨如裂耳聾目眩惡風頭痛項不可以顧眥爛鼻衄身黃淚出腸澼痔腫癲瘧背瘡京骨二穴主目眥赤爛鼻衄不止腰脊痛不可俯仰身後側痛腳氣紅腫燥裂痎瘧寒熱喜驚不欲食筋攣傴僂心痛申脈二穴主風眩癲癇厥氣腰痛不能伸足弱不能立目反上視赤痛從內眥始及諸痛在太陽經者潔古云癇病晝發灸陽蹻申脈為八法之一以其合陽蹻會督脈於內眥也金門二穴主尸厥暴死脈動如故癲癇張口搖頭身反若折霍亂轉筋膝脛痠痛暴疝僕參二穴主腳跟紅腫痿痹不能踐地轉筋尸厥暴死脈動如故吐逆痰涎壅盛頭重如石癲癇狂言見鬼昆倉二穴主頭項肩背腰尻股膝痛腨如結踝如裂足跟不能履地鼽衄喘咳發癇瘛瘲狂易大風傴僂心痛與背相接陰腫婦人孕難胞衣不下附陽二穴主霍亂轉筋痿厥風痹不仁時有寒栗頭項背膂髀樞膝脛皆痛反張瘛瘲飛揚二穴主痔腫體重不能起坐行立腳腨酸腫走痹手足不得屈伸歷節汗出頭背痛目眩暈鼽衄齁䶎癲疾寒瘧承山二穴主腰股膝腨足踝腫痛風痹痔瘻便血臟毒大便艱難轉筋霍亂傷寒水結承筋二穴主寒痹轉筋陰股腫腳腨酸小腹痛大便難背脹腰痛頭痛鼽衄痔瘡腳跟急痛合陽二穴治腰脊強痛引腹陰股熱胻酸腫不能行立寒疝偏墜痔瘻女子血崩帶下委中二穴禁灸四畔紫脈上宜鋒針出血大經不宜出血熱病汗不出腰重不能舉小腹堅滿不得小便足筋緊急膝頭紅腫大風眉發墮落風痹癱瘓癰疽發背便毒等症並宜出血血出痼疾皆愈腳弱不宜出血委陽二穴主腰脊痛不可俯仰股陰痛不得小便風痹淋瀝瘛瘲癲疾小腹堅傷寒寒熱浮郤二穴主霍亂轉筋小腸熱大腸結脛外筋急髀樞不仁二便不利殷門二穴主腰痛不得俯仰腰脊尻臀股陰寒痛惡血泄注外股腫承扶二穴主腰脊尻股引痛五痔泄血大小便難尻臀癰腫季脅凡十二穴第三十五章門二穴主腸鳴盈盈然食不化脅痛不得臥煩熱口乾不嗜食胸脅支滿喘息心痛腰痛不得倒傷食身黃羸瘦奔豚腹腫脊強四肢懈惰善恐少氣厥逆肩臂不舉京門二穴主腰痛不得俯仰寒熱䐜脹引背不得息水道不利溺黃少腹急腫腸鳴洞泄髀樞引痛帶脈二穴主婦人少腹堅痛月脈不調帶下赤白裡急瘛瘲五樞二穴主男子寒疝陰卵上入小腹痛維道二穴主嘔逆不止三焦不調水腫不嗜食居髎二穴主腰引少腹痛肩引胸臂攣急手臂不得舉而至肩
